<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1E2228;
    --surface: #272C34;
    --border: #353B45;
    --text: #DFE4EC;
    --muted: #7E8899;
    --accent: #5C9E78;
    --accent-light: #253630;
    --accent2: #E07B54;
    --tab-active: #DFE4EC;
    --shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 680px;
    margin: 0 auto;
  }

  /* HEADER */
  header {
    padding: 24px 20px 0;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .app-title {
    font-family: 'Instrument Serif', serif;
    font-size: 30px;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .app-date {
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 16px 20px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 14px 10px;
    font-size: 15px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    background: none;
    border-top: none; border-left: none; border-right: none;
    font-family: 'DM Sans', sans-serif;
  }
  .tab.active {
    color: var(--tab-active);
    border-bottom-color: var(--accent);
  }

  /* CONTENT */
  .content { padding: 20px; }
  .section { display: none; }
  .section.active { display: block; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    position: relative;
  }
  .card-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .card-meta {
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
  }
  .card-note {
    font-size: 14px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.5;
  }
  .card-actions {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 6px;
  }
  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 15px;
    padding: 2px 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .btn-icon:hover { color: var(--accent2); }

  /* UPCOMING BADGE */
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .badge-today { background: #3D2820; color: var(--accent2); }
  .badge-soon { background: var(--accent-light); color: var(--accent); }
  .badge-past { background: var(--border); color: var(--muted); }

  /* ADD FORM */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    display: none;
  }
  .add-form.open { display: block; }
  .form-row { margin-bottom: 10px; }
  .form-row:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  input[type="text"], input[type="date"], input[type="time"], textarea, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* BUTTONS */
  .btn {
    padding: 10px 20px;
    border-radius: 7px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-add {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 15px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: border-color 0.15s, color 0.15s;
    margin-bottom: 10px;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }
  .form-btns { display: flex; gap: 8px; margin-top: 12px; }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
    margin-top: 6px;
  }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 16px;
    font-style: italic;
    font-family: 'Instrument Serif', serif;
  }

  /* LISTS TAB */
  .list-group {
    margin-bottom: 20px;
  }
  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .list-name {
    font-size: 18px;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
  }
  .list-count {
    font-size: 12px;
    color: var(--muted);
    background: var(--border);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .list-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    transition: opacity 0.2s;
  }
  .list-item.done { opacity: 0.45; }
  .list-item.done .item-text { text-decoration: line-through; }
  .list-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .list-item.done .list-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .list-check-mark { display: none; color: white; font-size: 10px; }
  .list-item.done .list-check-mark { display: block; }
  .item-text { font-size: 15px; flex: 1; line-height: 1.4; font-weight: 500; }
  .item-sub { font-size: 13px; color: var(--muted); font-weight: 400; }
  .item-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .item-del:hover { color: var(--accent2); }
  .quick-add {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }
  .quick-add input {
    flex: 1;
    padding: 10px 12px;
    font-size: 15px;
  }
  .quick-add button {
    padding: 10px 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* TRAVEL */
  .travel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .travel-header {
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .travel-dest {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
  }
  .travel-dates { font-size: 13px; color: var(--muted); margin-top: 2px; font-weight: 400; }
  .travel-body {
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
    display: none;
  }
  .travel-body.open { display: block; }
  .travel-note {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    padding: 12px 0 8px;
    white-space: pre-wrap;
  }
  .travel-items { margin-top: 8px; }
  .travel-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 0;
    font-size: 15px;
    border-bottom: 1px solid var(--border);
  }
  .travel-item:last-child { border-bottom: none; }
  .travel-add {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .travel-add input {
    flex: 1;
    padding: 9px 12px;
    font-size: 14px;
  }
  .travel-add button {
    padding: 9px 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .chevron { transition: transform 0.2s; font-size: 12px; color: var(--muted); }
  .chevron.open { transform: rotate(180deg); }

  /* NOTES */
  .note-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .note-card:hover { border-color: var(--accent); }
  .note-card-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .note-card-preview {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .note-card-date { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* NOTE EDITOR */
  .note-editor {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    padding: 0;
    flex-direction: column;
    max-width: 680px;
    margin: 0 auto;
  }
  .note-editor.open { display: flex; }
  .note-editor-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .note-back {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    padding: 0;
    line-height: 1;
  }
  .note-editor-title {
    flex: 1;
    font-size: 17px;
    font-weight: 600;
    background: none;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }
  .note-editor-body {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
  }
  .note-editor-area {
    width: 100%;
    min-height: 400px;
    background: none;
    border: none;
    outline: none;
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    line-height: 1.7;
    resize: none;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28,26,22,0.35);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 680px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-title {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    margin-bottom: 16px;
  }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* LIST CATEGORY TABS */
  .cat-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
    margin-bottom: 16px;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .cat-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (min-width: 481px) {
    body { padding-top: 0; }
    header { padding: 28px 24px 0; }
    .tabs { padding: 16px 24px 0; }
    .content { padding: 24px; }
  }
</style>
</head>
<body>

<header>
  <span class="app-title">Planner</span>
  <span class="app-date" id="headerDate"></span>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('appointments')">Randevular</button>
  <button class="tab" onclick="switchTab('travel')">Seyahat</button>
  <button class="tab" onclick="switchTab('lists')">Listeler</button>
  <button class="tab" onclick="switchTab('notes')">Notlar</button>
</div>

<div class="content">

  <!-- ========== RANDEVULAR ========== -->
  <div class="section active" id="sec-appointments">
    <button class="btn-add" onclick="toggleForm('appt-form')">
      <span>+</span> Yeni randevu ekle
    </button>

    <div class="add-form" id="appt-form">
      <div class="modal-title" style="font-size:17px;margin-bottom:14px;">Yeni Randevu</div>
      <div class="form-row">
        <label>Başlık</label>
        <input type="text" id="appt-title" placeholder="Doktor, toplantı...">
      </div>
      <div class="form-row form-row-2">
        <div>
          <label>Tarih</label>
          <input type="date" id="appt-date">
        </div>
        <div>
          <label>Saat</label>
          <input type="time" id="appt-time">
        </div>
      </div>
      <div class="form-row">
        <label>Not (isteğe bağlı)</label>
        <textarea id="appt-note" placeholder="Adres, hatırlatma..."></textarea>
      </div>
      <div class="form-btns">
        <button class="btn btn-primary" onclick="saveAppointment()">Kaydet</button>
        <button class="btn btn-ghost" onclick="toggleForm('appt-form')">İptal</button>
      </div>
    </div>

    <div id="appt-list"></div>
  </div>

  <!-- ========== SEYAHAT ========== -->
  <div class="section" id="sec-travel">
    <button class="btn-add" onclick="openModal('travel-modal')">
      <span>+</span> Yeni destinasyon ekle
    </button>
    <div id="travel-list"></div>
  </div>

  <!-- ========== LİSTELER ========== -->
  <div class="section" id="sec-lists">
    <div class="cat-tabs" id="cat-tabs"></div>
    <div id="list-content"></div>
  </div>

  <!-- ========== NOTLAR ========== -->
  <div class="section" id="sec-notes">
    <button class="btn-add" onclick="openNote(null)">
      <span>+</span> Yeni not
    </button>
    <div id="notes-list"></div>
  </div>

</div>

<!-- NOTE EDITOR -->
<div class="note-editor" id="note-editor">
  <div class="note-editor-header">
    <button class="note-back" onclick="closeNote()">&#8592;</button>
    <input class="note-editor-title" id="note-title-input" placeholder="Başlık...">
    <button class="btn-icon" onclick="deleteCurrentNote()" style="color:var(--accent2);font-size:18px;">&#10005;</button>
  </div>
  <div class="note-editor-body">
    <textarea class="note-editor-area" id="note-body-input" placeholder="Yazmaya başla..."></textarea>
  </div>
</div>

<!-- TRAVEL MODAL -->
<div class="modal-overlay" id="travel-modal">
  <div class="modal">
    <div class="modal-title">Yeni Destinasyon</div>
    <div class="form-row">
      <label>Şehir / Ülke</label>
      <input type="text" id="travel-dest" placeholder="İstanbul, Paris...">
    </div>
    <div class="form-row form-row-2">
      <div>
        <label>Gidiş</label>
        <input type="date" id="travel-start">
      </div>
      <div>
        <label>Dönüş</label>
        <input type="date" id="travel-end">
      </div>
    </div>
    <div class="form-row">
      <label>Notlar</label>
      <textarea id="travel-note" placeholder="Otel, aktiviteler, hatırlatmalar..."></textarea>
    </div>
    <div class="form-btns">
      <button class="btn btn-primary" onclick="saveTravel()">Kaydet</button>
      <button class="btn btn-ghost" onclick="closeModal('travel-modal')">İptal</button>
    </div>
  </div>
</div>

<!-- NEW LIST MODAL -->
<div class="modal-overlay" id="newlist-modal">
  <div class="modal">
    <div class="modal-title">Yeni Liste</div>
    <div class="form-row">
      <label>Liste Adı</label>
      <input type="text" id="newlist-name" placeholder="Yapılacaklar, Alınacaklar...">
    </div>
    <div class="form-btns">
      <button class="btn btn-primary" onclick="saveNewList()">Oluştur</button>
      <button class="btn btn-ghost" onclick="closeModal('newlist-modal')">İptal</button>
    </div>
  </div>
</div>

<script>
// ==================== DATA ====================
const DB = {
  get: (k) => JSON.parse(localStorage.getItem('planner_' + k) || 'null'),
  set: (k, v) => localStorage.setItem('planner_' + k, JSON.stringify(v)),
};

function getData(k, def) {
  const v = DB.get(k);
  return v !== null ? v : def;
}

// ==================== UTILS ====================
function id() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function formatDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  return `${parts[2]}.${parts[1]}.${parts[0]}`;
}

function getDayDiff(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function setBadge(diff) {
  if (diff === null) return '';
  if (diff < 0) return '<span class="badge badge-past">Geçti</span>';
  if (diff === 0) return '<span class="badge badge-today">Bugün</span>';
  if (diff <= 3) return `<span class="badge badge-soon">${diff} gün sonra</span>`;
  return `<span class="badge badge-past">${formatDate(new Date(Date.now() + diff*86400000).toISOString().split('T')[0])}</span>`;
}

// ==================== TABS ====================
function switchTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  const tabs = ['appointments','travel','lists','notes'];
  document.querySelectorAll('.tab')[tabs.indexOf(name)].classList.add('active');
  if (name === 'appointments') renderAppointments();
  if (name === 'travel') renderTravel();
  if (name === 'lists') renderLists();
  if (name === 'notes') renderNotes();
}

function toggleForm(id) {
  const f = document.getElementById(id);
  f.classList.toggle('open');
}

// ==================== MODAL ====================
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

// ==================== APPOINTMENTS ====================
function saveAppointment() {
  const title = document.getElementById('appt-title').value.trim();
  if (!title) return;
  const appts = getData('appts', []);
  appts.push({
    id: id(),
    title,
    date: document.getElementById('appt-date').value,
    time: document.getElementById('appt-time').value,
    note: document.getElementById('appt-note').value.trim(),
  });
  appts.sort((a,b) => (a.date + a.time) < (b.date + b.time) ? -1 : 1);
  DB.set('appts', appts);
  document.getElementById('appt-title').value = '';
  document.getElementById('appt-date').value = '';
  document.getElementById('appt-time').value = '';
  document.getElementById('appt-note').value = '';
  document.getElementById('appt-form').classList.remove('open');
  renderAppointments();
}

function deleteAppointment(aid) {
  const appts = getData('appts', []).filter(a => a.id !== aid);
  DB.set('appts', appts);
  renderAppointments();
}

function renderAppointments() {
  const appts = getData('appts', []);
  const el = document.getElementById('appt-list');
  if (!appts.length) {
    el.innerHTML = '<div class="empty">Henüz randevu yok</div>';
    return;
  }
  el.innerHTML = appts.map(a => {
    const diff = getDayDiff(a.date);
    const badge = diff !== null ? setBadge(diff) : '';
    const timeStr = a.time ? ` · ${a.time}` : '';
    return `<div class="card">
      ${badge}
      <div class="card-title">${esc(a.title)}</div>
      <div class="card-meta">${a.date ? formatDate(a.date) : ''}${timeStr}</div>
      ${a.note ? `<div class="card-note">${esc(a.note)}</div>` : ''}
      <div class="card-actions">
        <button class="btn-icon" onclick="deleteAppointment('${a.id}')">&#10005;</button>
      </div>
    </div>`;
  }).join('');
}

// ==================== TRAVEL ====================
function saveTravel() {
  const dest = document.getElementById('travel-dest').value.trim();
  if (!dest) return;
  const travels = getData('travels', []);
  travels.push({
    id: id(),
    dest,
    start: document.getElementById('travel-start').value,
    end: document.getElementById('travel-end').value,
    note: document.getElementById('travel-note').value.trim(),
    items: [],
  });
  DB.set('travels', travels);
  document.getElementById('travel-dest').value = '';
  document.getElementById('travel-start').value = '';
  document.getElementById('travel-end').value = '';
  document.getElementById('travel-note').value = '';
  closeModal('travel-modal');
  renderTravel();
}

function deleteTravel(tid) {
  DB.set('travels', getData('travels', []).filter(t => t.id !== tid));
  renderTravel();
}

function toggleTravelBody(tid) {
  const b = document.getElementById('tb-' + tid);
  const c = document.getElementById('tc-' + tid);
  b.classList.toggle('open');
  c.classList.toggle('open');
}

function addTravelItem(tid) {
  const inp = document.getElementById('ti-' + tid);
  const val = inp.value.trim();
  if (!val) return;
  const travels = getData('travels', []);
  const t = travels.find(x => x.id === tid);
  if (t) { t.items = t.items || []; t.items.push({ id: id(), text: val, done: false }); }
  DB.set('travels', travels);
  inp.value = '';
  renderTravel();
  // reopen
  setTimeout(() => {
    const b = document.getElementById('tb-' + tid);
    const c = document.getElementById('tc-' + tid);
    if (b) b.classList.add('open');
    if (c) c.classList.add('open');
  }, 10);
}

function toggleTravelItem(tid, iid) {
  const travels = getData('travels', []);
  const t = travels.find(x => x.id === tid);
  if (t) { const item = t.items.find(i => i.id === iid); if (item) item.done = !item.done; }
  DB.set('travels', travels);
  renderTravel();
  setTimeout(() => {
    const b = document.getElementById('tb-' + tid);
    const c = document.getElementById('tc-' + tid);
    if (b) b.classList.add('open');
    if (c) c.classList.add('open');
  }, 10);
}

function renderTravel() {
  const travels = getData('travels', []);
  const el = document.getElementById('travel-list');
  if (!travels.length) {
    el.innerHTML = '<div class="empty">Henüz destinasyon yok</div>';
    return;
  }
  el.innerHTML = travels.map(t => {
    const dateRange = [t.start && formatDate(t.start), t.end && formatDate(t.end)].filter(Boolean).join(' – ');
    const items = (t.items || []).map(i => `
      <div class="travel-item">
        <div class="list-check" onclick="toggleTravelItem('${t.id}','${i.id}')" style="${i.done ? 'background:var(--accent);border-color:var(--accent)' : ''}">
          ${i.done ? '<span class="list-check-mark" style="display:block">&#10003;</span>' : ''}
        </div>
        <span style="${i.done ? 'text-decoration:line-through;opacity:0.5' : ''}">${esc(i.text)}</span>
      </div>`).join('');
    return `<div class="travel-card">
      <div class="travel-header" onclick="toggleTravelBody('${t.id}')">
        <div>
          <div class="travel-dest">${esc(t.dest)}</div>
          <div class="travel-dates">${dateRange}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="btn-icon" onclick="event.stopPropagation();deleteTravel('${t.id}')">&#10005;</button>
          <span class="chevron" id="tc-${t.id}">&#9660;</span>
        </div>
      </div>
      <div class="travel-body" id="tb-${t.id}">
        ${t.note ? `<div class="travel-note">${esc(t.note)}</div>` : ''}
        <div class="travel-items">${items}</div>
        <div class="travel-add">
          <input type="text" id="ti-${t.id}" placeholder="Yapılacak, gezilecek yer..." onkeydown="if(event.key==='Enter')addTravelItem('${t.id}')">
          <button onclick="addTravelItem('${t.id}')">Ekle</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ==================== LISTS ====================
const DEFAULT_LISTS = ['Kitaplar', 'Filmler', 'Alışveriş', 'Gezilecek Yerler'];

function getListCategories() {
  return getData('listcats', DEFAULT_LISTS);
}

function getActiveCat() {
  return getData('activecat', getListCategories()[0]);
}

function renderLists() {
  const cats = getListCategories();
  const active = getActiveCat();
  const tabEl = document.getElementById('cat-tabs');
  tabEl.innerHTML = cats.map(c =>
    `<button class="cat-tab ${c === active ? 'active' : ''}" onclick="setCat('${esc(c)}')">${esc(c)}</button>`
  ).join('') + `<button class="cat-tab" onclick="openModal('newlist-modal')" style="border-style:dashed">+ Yeni</button>`;
  renderListItems(active);
}

function setCat(cat) {
  DB.set('activecat', cat);
  renderLists();
}

function saveNewList() {
  const name = document.getElementById('newlist-name').value.trim();
  if (!name) return;
  const cats = getListCategories();
  if (!cats.includes(name)) cats.push(name);
  DB.set('listcats', cats);
  DB.set('activecat', name);
  document.getElementById('newlist-name').value = '';
  closeModal('newlist-modal');
  renderLists();
}

function addListItem(cat) {
  const inp = document.getElementById('quick-input-' + safeid(cat));
  const val = inp.value.trim();
  if (!val) return;
  const key = 'list_' + cat;
  const items = getData(key, []);
  items.push({ id: id(), text: val, done: false });
  DB.set(key, items);
  inp.value = '';
  renderLists();
}

function toggleListItem(cat, iid) {
  const key = 'list_' + cat;
  const items = getData(key, []);
  const item = items.find(i => i.id === iid);
  if (item) item.done = !item.done;
  DB.set(key, items);
  renderLists();
}

function deleteListItem(cat, iid) {
  const key = 'list_' + cat;
  DB.set(key, getData(key, []).filter(i => i.id !== iid));
  renderLists();
}

function safeid(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

function renderListItems(cat) {
  const el = document.getElementById('list-content');
  const items = getData('list_' + cat, []);
  const done = items.filter(i => i.done);
  const undone = items.filter(i => !i.done);
  const renderItem = (i) => `
    <div class="list-item ${i.done ? 'done' : ''}">
      <div class="list-check" onclick="toggleListItem('${esc(cat)}','${i.id}')">
        <span class="list-check-mark">&#10003;</span>
      </div>
      <span class="item-text">${esc(i.text)}</span>
      <button class="item-del" onclick="deleteListItem('${esc(cat)}','${i.id}')">&#10005;</button>
    </div>`;
  el.innerHTML = `
    <div class="quick-add">
      <input type="text" id="quick-input-${safeid(cat)}" placeholder="${esc(cat)}'e ekle..." onkeydown="if(event.key==='Enter')addListItem('${esc(cat)}')">
      <button onclick="addListItem('${esc(cat)}')">Ekle</button>
    </div>
    ${undone.length ? undone.map(renderItem).join('') : '<div class="empty" style="padding:20px 0">Liste boş</div>'}
    ${done.length ? `<div class="divider"></div><div class="section-label">Tamamlananlar (${done.length})</div>${done.map(renderItem).join('')}` : ''}
  `;
}

// ==================== NOTES ====================
let currentNoteId = null;

function openNote(nid) {
  currentNoteId = nid;
  const notes = getData('notes', []);
  const note = nid ? notes.find(n => n.id === nid) : null;
  document.getElementById('note-title-input').value = note ? note.title : '';
  document.getElementById('note-body-input').value = note ? note.body : '';
  document.getElementById('note-editor').classList.add('open');
  if (!nid) currentNoteId = id();
}

function closeNote() {
  const title = document.getElementById('note-title-input').value.trim();
  const body = document.getElementById('note-body-input').value.trim();
  if (title || body) {
    const notes = getData('notes', []);
    const idx = notes.findIndex(n => n.id === currentNoteId);
    const entry = { id: currentNoteId, title: title || 'Başlıksız', body, updated: new Date().toISOString() };
    if (idx >= 0) notes[idx] = entry; else notes.unshift(entry);
    DB.set('notes', notes);
  }
  document.getElementById('note-editor').classList.remove('open');
  renderNotes();
}

function deleteCurrentNote() {
  if (!currentNoteId) return;
  DB.set('notes', getData('notes', []).filter(n => n.id !== currentNoteId));
  document.getElementById('note-editor').classList.remove('open');
  renderNotes();
}

function renderNotes() {
  const notes = getData('notes', []);
  const el = document.getElementById('notes-list');
  if (!notes.length) {
    el.innerHTML = '<div class="empty">Henüz not yok</div>';
    return;
  }
  el.innerHTML = notes.map(n => {
    const d = new Date(n.updated);
    const dateStr = `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
    return `<div class="note-card" onclick="openNote('${n.id}')">
      <div class="note-card-title">${esc(n.title)}</div>
      <div class="note-card-preview">${esc(n.body)}</div>
      <div class="note-card-date">${dateStr}</div>
    </div>`;
  }).join('');
}

// ==================== ESCAPE ====================
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== INIT ====================
function init() {
  const now = new Date();
  const days = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const months = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  document.getElementById('headerDate').textContent =
    `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
  // set today as default date
  const today = now.toISOString().split('T')[0];
  document.getElementById('appt-date').value = today;
  renderAppointments();
}

init();
</script>
