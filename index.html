<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planner Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ================= TEMALAR ================= */
  :root {
    --bg: #1E2228;
    --surface: #272C34;
    --border: #353B45;
    --text: #DFE4EC;
    --muted: #7E8899;
    --accent: #5C9E78; 
    --accent-work: #5C8BB8; 
    --accent-light: rgba(92, 158, 120, 0.15);
    --accent-work-light: rgba(92, 139, 184, 0.15);
    --accent-danger: #D86D6D;  
    --shadow: 0 10px 30px rgba(0,0,0,0.3);
    --card-radius: 18px;
  }

  [data-theme="light"] { --bg: #F5F5F7; --surface: #FFFFFF; --border: #E5E5E7; --text: #1D1D1F; --muted: #86868B; --shadow: 0 10px 30px rgba(0,0,0,0.08); }
  [data-theme="sepia"] { --bg: #F4ECD8; --surface: #FCF5E5; --border: #E6D8B8; --text: #433422; --muted: #8B7E66; --shadow: 0 10px 30px rgba(67, 52, 34, 0.1); }
  [data-theme="midnight"] { --bg: #000000; --surface: #121212; --border: #1F1F1F; --text: #E1E1E1; --muted: #666666; --shadow: none; }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
  
  /* ================= SIDEBAR (CARD FAN) ================= */
  .app-shell { display: flex; min-height: 100vh; width: 100%; }

  .sidebar { 
    width: 90px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); 
    display: flex; flex-direction: column; align-items: center; padding: 20px 0; position: sticky; 
    top: 0; height: 100vh; z-index: 100; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .logo-area { margin-bottom: 25px; width: 55px; height: 55px; cursor: pointer; transition: transform 0.2s; }
  .logo-area:hover { transform: rotate(-5deg) scale(1.05); }

  .master-card {
    width: 60px; height: 60px; background: var(--bg); border-radius: var(--card-radius);
    display: flex; align-items: center; justify-content: center; font-size: 24px;
    cursor: pointer; margin-bottom: 20px; border: 1px solid var(--border);
    transition: all 0.3s ease; position: relative; z-index: 5;
  }
  .master-card:hover { transform: scale(1.1); border-color: var(--muted); }
  .master-card.active { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-light); }
  .master-card.active-work { border-color: var(--accent-work); box-shadow: 0 0 15px var(--accent-work-light); }

  .fan-container { position: relative; display: flex; flex-direction: column; align-items: center; width: 100%; }
  .sub-cards-wrapper { display: none; flex-direction: column; gap: 10px; padding: 5px 0 15px; width: 100%; align-items: center; }
  .sub-cards-wrapper.open { display: flex; }

  .sub-card {
    width: 44px; height: 44px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer; opacity: 0; transform: translateY(-15px);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--shadow);
  }
  .sub-cards-wrapper.open .sub-card { opacity: 1; transform: translateY(0); }
  .sub-card:hover { background: var(--bg); transform: scale(1.15) !important; border-color: var(--muted); }
  .sub-card.active { border-color: var(--accent); background: var(--accent-light); }
  .sub-card.active-work { border-color: var(--accent-work); background: var(--accent-work-light); }

  .sidebar-footer { margin-top: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 10px; }

  /* ================= HEADER & SEARCH ================= */
  .main-area { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  header { padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 90; background: var(--bg); border-bottom: 1px solid transparent; }
  
  .header-left { display: flex; align-items: center; gap: 12px; }
  .hamburger { display: none; font-size: 24px; color: var(--text); background: none; border: none; cursor: pointer; }

  .search-container { flex: 1; max-width: 320px; position: relative; margin: 0 20px; }
  .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); padding: 10px 15px 10px 38px; border-radius: 12px; color: var(--text); font-size: 14px; transition: all 0.2s; outline: none; }
  .search-input:focus { border-color: var(--accent); background: var(--bg); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }

  .app-date { font-size: 14px; color: var(--muted); font-weight: 600; white-space: nowrap; }

  /* ================= CONTENT & CARDS ================= */
  .content { padding: 10px 32px 60px; max-width: 850px; margin: 0 auto; width: 100%; }
  .section { display: none; animation: fadeIn 0.4s ease; } .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .section-main-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .context-badge { font-size: 11px; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; box-shadow: var(--shadow); transition: transform 0.2s; }
  .card-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; padding-right: 65px; color: var(--text); }
  .card-meta { font-size: 14px; color: var(--muted); font-weight: 500; }
  .card-note { font-size: 14px; color: var(--muted); margin-top: 10px; line-height: 1.6; white-space: pre-wrap; }
  .card-actions { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; }

  .summary-item { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; box-shadow: var(--shadow); }
  .summary-item:hover { transform: translateX(6px); border-color: var(--muted); }
  .sum-icon { width: 46px; height: 46px; border-radius: 14px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid var(--border); flex-shrink: 0; }
  
  .badge { display: inline-block; font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-safe { background: var(--accent-light); color: var(--accent); }
  .badge-danger { background: rgba(216, 109, 109, 0.15); color: var(--accent-danger); }
  .badge-warning { background: rgba(216, 165, 109, 0.15); color: var(--accent-warning); }

  /* AKORDİYONLAR VE LİSTELER */
  .acc-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .acc-body { display: none; padding-top: 14px; margin-top: 14px; border-top: 1px dashed var(--border); }
  .acc-body.open { display: block; animation: fadeIn 0.2s ease; }
  .chevron { transition: transform 0.2s; font-size: 12px; color: var(--muted); } .chevron.open { transform: rotate(180deg); }
  
  .list-item-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); } 
  .list-item-row:last-child { border-bottom: none; }
  .list-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .list-check.checked { background: var(--accent); border-color: var(--accent); }

  /* ================= MODALS & FORMS ================= */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); width: 92%; max-width: 480px; border-radius: 20px; padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'Instrument Serif', serif; font-size: 26px; margin-bottom: 20px; }

  label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  input, textarea, select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 15px; font-family: inherit; color: var(--text); outline: none; margin-bottom: 15px; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

  /* BUTONLAR */
  .btn-icon { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--muted); transition: color 0.2s; padding: 4px; }
  .btn-icon:hover { color: var(--text); }
  .btn-add { display: flex; align-items: center; gap: 8px; width: 100%; background: var(--surface); border: 1px dashed var(--border); border-radius: 12px; padding: 14px; color: var(--muted); cursor: pointer; font-weight: 700; margin-bottom: 20px; transition: 0.2s; font-size: 15px; }
  .btn-add:hover { border-color: var(--text); color: var(--text); }
  
  .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; font-size: 15px; transition: transform 0.1s; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; font-size: 15px; transition: background 0.2s; }
  .btn-ghost:hover { background: var(--bg); }

  /* MOBİL UYUMLULUK */
  @media (max-width: 768px) {
    .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); width: 90px; box-shadow: 15px 0 40px rgba(0,0,0,0.5); border-right: none; }
    .sidebar.open { transform: translateX(0); }
    .hamburger { display: block; }
    .search-container { margin: 0 10px; }
    header { padding: 15px 20px; }
    .content { padding: 0 16px 40px; }
  }
  .empty { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 16px; font-style: italic; }

  /* NOTE EDITOR FULLSCREEN */
  .note-editor { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 200; flex-direction: column; max-width: 800px; margin: 0 auto; }
  .note-editor.open { display: flex; animation: fadeIn 0.2s; }
  .note-editor-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .note-editor-title { flex: 1; font-size: 18px; font-weight: 700; background: none; border: none; color: var(--text); }
  .note-tabs { display:flex; border-bottom:1px solid var(--border); background:var(--surface); }
  .note-tab { flex:1; padding:12px; text-align:center; cursor:pointer; font-size:14px; font-weight:600; color:var(--muted); border-bottom: 2px solid transparent;}
  .note-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .note-area { flex:1; padding:20px; overflow-y:auto; background:var(--bg); }
  .note-textarea { width: 100%; height:100%; background: none; border: none; color: var(--text); resize: none; display:none; line-height: 1.6; }
  .note-preview { width: 100%; height:100%; display:none; line-height: 1.6; }
  .note-textarea.active, .note-preview.active { display:block; }
</style>
</head>
<body data-theme="dark">

<div class="app-shell">
  <div style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; backdrop-filter: blur(2px);" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <nav class="sidebar" id="sidebar">
    <div class="logo-area" onclick="switchModule('summary')">
      <svg viewBox="0 0 100 100">
        <defs>
          <linearGradient id="pGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:var(--accent);stop-opacity:1" />
            <stop offset="100%" style="stop-color:var(--accent-work);stop-opacity:1" />
          </linearGradient>
        </defs>
        <rect width="90" height="90" x="5" y="5" rx="22" fill="var(--surface)" />
        <path d="M32 25 v50 M32 25 h20 c15 0 15 25 0 25 h-20" fill="none" stroke="url(#pGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M32 38 h12 M32 48 h12" stroke="var(--bg)" stroke-width="3" stroke-linecap="round" />
      </svg>
    </div>

    <div class="master-card active" id="btn-summary" onclick="switchModule('summary')" title="Özet">🏠</div>

    <div class="fan-container">
      <div class="master-card" id="btn-work-master" onclick="toggleFan('work')" title="İş Dünyası">💼</div>
      <div class="sub-cards-wrapper" id="fan-work">
        <div class="sub-card" id="btn-work_appointments" onclick="switchModule('appointments', 'work')" title="Toplantılar">🗓️</div>
        <div class="sub-card" id="btn-work_todos" onclick="switchModule('todos', 'work')" title="Görevler">💼</div>
        <div class="sub-card" id="btn-work_travels" onclick="switchModule('travels', 'work')" title="İş Seyahati">✈️</div>
        <div class="sub-card" id="btn-work_notes" onclick="switchModule('notes', 'work')" title="Notlar">📄</div>
      </div>
    </div>

    <div class="fan-container">
      <div class="master-card" id="btn-pers-master" onclick="toggleFan('pers')" title="Kişisel Yaşam">🌱</div>
      <div class="sub-cards-wrapper" id="fan-pers">
        <div class="sub-card" id="btn-pers_appointments" onclick="switchModule('appointments', 'pers')" title="Randevular">📍</div>
        <div class="sub-card" id="btn-pers_todos" onclick="switchModule('todos', 'pers')" title="Görevler">✅</div>
        <div class="sub-card" id="btn-pers_habits" onclick="switchModule('habits', 'pers')" title="Rutinler">⚡</div>
        <div class="sub-card" id="btn-pers_lists" onclick="switchModule('lists', 'pers')" title="Listeler">📈</div>
        <div class="sub-card" id="btn-pers_travels" onclick="switchModule('travels', 'pers')" title="Seyahat">🎒</div>
        <div class="sub-card" id="btn-pers_birthdays" onclick="switchModule('birthdays', 'pers')" title="D.Günü">🎂</div>
        <div class="sub-card" id="btn-pers_notes" onclick="switchModule('notes', 'pers')" title="Notlar">✍️</div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-icon" onclick="exportData()" title="Yedekle">💾</button>
      <button class="btn-icon" onclick="document.getElementById('imp').click()" title="Yükle">📂</button>
      <input type="file" id="imp" style="display:none" onchange="importData(event)">
    </div>
  </nav>

  <main class="main-area">
    <header>
      <div class="header-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
      </div>

      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="global-search" placeholder="Listede ara..." oninput="handleSearch(this.value)">
      </div>

      <div style="display:flex; align-items:center; gap:15px;">
        <span class="app-date" id="headerDate"></span>
        <button class="btn-settings" onclick="openModal('modal-settings')">⚙️</button>
      </div>
    </header>

    <div class="content">
        <div class="section-main-title" id="module-header" style="display:none;">
            <span id="module-title"></span>
            <span id="module-badge" class="context-badge"></span>
        </div>

        <div class="section active" id="sec-summary"><div id="summary-list"></div></div>
        
        <div class="section" id="sec-appointments">
          <button class="btn-add" onclick="openForm('modal-appt')">+ Yeni Kayıt Ekle</button>
          <div id="appt-list"></div>
        </div>

        <div class="section" id="sec-todos">
          <button class="btn-add" onclick="openForm('modal-todo')">+ Yeni Görev Ekle</button>
          <div id="todo-list"></div>
        </div>
        
        <div class="section" id="sec-travels">
          <button class="btn-add" onclick="openForm('modal-travel')">+ Yeni Seyahat Planla</button>
          <div id="travel-list"></div>
        </div>

        <div class="section" id="sec-habits">
            <button class="btn-add" onclick="openForm('modal-habit')">+ Yeni Alışkanlık Ekle</button>
            <div id="habit-list"></div>
        </div>

        <div class="section" id="sec-lists">
            <div id="goal-container"></div>
            <div style="display:flex; gap:8px; overflow-x:auto; margin-bottom:16px; padding-bottom:5px;" id="cat-tabs"></div>
            <div id="list-content"></div>
        </div>

        <div class="section" id="sec-birthdays">
            <button class="btn-add" onclick="openForm('modal-bday')">+ Yeni Kişi Ekle</button>
            <div id="bday-list"></div>
        </div>
        
        <div class="section" id="sec-notes">
          <button class="btn-add" onclick="openNoteEditor()">+ Yeni Not Ekle</button>
          <div id="notes-list"></div>
        </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-settings">
  <div class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2 class="modal-title" style="margin:0;">Ayarlar</h2>
      <button class="btn-icon" onclick="closeModal('modal-settings')" style="font-size:24px;">✕</button>
    </div>
    <label>Görünüm Teması</label>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
      <button class="btn-ghost" onclick="setTheme('dark')">Koyu</button>
      <button class="btn-ghost" style="background:#fff; color:#111;" onclick="setTheme('light')">Aydınlık</button>
      <button class="btn-ghost" style="background:#F4ECD8; color:#433422;" onclick="setTheme('sepia')">Bej</button>
      <button class="btn-ghost" style="background:#000; color:#eee;" onclick="setTheme('midnight')">Gece</button>
    </div>
    <label>Dil / Language</label>
    <select onchange="setLang(this.value)" id="lang-select">
      <option value="tr">Türkçe</option><option value="en">English</option>
    </select>
    <div class="form-row-2" style="margin-top:20px;">
      <button class="btn-ghost" onclick="closeModal('modal-settings')" style="grid-column: span 2;">Kapat</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-appt">
  <div class="modal">
    <h2 class="modal-title" id="appt-modal-title">Randevu / Etkinlik</h2>
    <label>Başlık</label><input type="text" id="m-appt-title" placeholder="Kiminle / Nerede?">
    <div class="form-row-2">
      <div><label>Tarih</label><input type="date" id="m-appt-date"></div>
      <div><label>Saat</label><input type="time" id="m-appt-time"></div>
    </div>
    <label>Not</label><textarea id="m-appt-note" style="min-height:70px;" placeholder="Ekstra detaylar..."></textarea>
    
    <div class="form-row-2" style="margin-top: 15px;">
        <button class="btn-primary" onclick="saveData('appts')">Kaydet</button>
        <button class="btn-ghost" onclick="closeModal('modal-appt')">İptal</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-todo">
  <div class="modal">
    <h2 class="modal-title">Görev</h2>
    <label>Görev Adı</label><input type="text" id="m-todo-title" placeholder="Ne yapılacak?">
    <div class="form-row-2">
      <div><label>Öncelik</label><select id="m-todo-pri"><option value="normal">Normal</option><option value="high">Yüksek</option></select></div>
      <div><label>Tekrar</label><select id="m-todo-rec"><option value="">Tek Seferlik</option><option value="1">Günlük</option><option value="7">Haftalık</option></select></div>
    </div>
    <label>Son Tarih</label><input type="date" id="m-todo-date">
    <label>Not</label><input type="text" id="m-todo-note" placeholder="Detay...">
    
    <div class="form-row-2" style="margin-top: 15px;">
        <button class="btn-primary" onclick="saveData('todos')">Kaydet</button>
        <button class="btn-ghost" onclick="closeModal('modal-todo')">İptal</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-travel">
  <div class="modal">
    <h2 class="modal-title">Seyahat / Rota</h2>
    <label>Destinasyon</label><input type="text" id="m-travel-dest" placeholder="Nereye?">
    <div class="form-row-2">
      <div><label>Gidiş</label><input type="date" id="m-travel-start"></div>
      <div><label>Dönüş</label><input type="date" id="m-travel-end"></div>
    </div>
    <label>Not</label><textarea id="m-travel-note" style="min-height:60px;" placeholder="Konaklama, ulaşım vs."></textarea>
    
    <div class="form-row-2" style="margin-top: 15px;">
        <button class="btn-primary" onclick="saveData('travels')">Kaydet</button>
        <button class="btn-ghost" onclick="closeModal('modal-travel')">İptal</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-habit">
  <div class="modal">
    <h2 class="modal-title">Alışkanlık / Rutin</h2>
    <label>Alışkanlık Adı</label><input type="text" id="m-habit-name" placeholder="Örn: Spor, Kitap...">
    <label>Haftalık Hedef</label>
    <select id="m-habit-target">
        <option value="7">Her Gün (7 Gün)</option>
        <option value="5">Hafta İçi (5 Gün)</option>
        <option value="3">Haftada 3 Gün</option>
        <option value="1">Haftada 1 Gün</option>
    </select>
    
    <div class="form-row-2" style="margin-top: 15px;">
        <button class="btn-primary" onclick="saveData('habits')">Kaydet</button>
        <button class="btn-ghost" onclick="closeModal('modal-habit')">İptal</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-bday">
  <div class="modal">
    <h2 class="modal-title">Doğum Günü</h2>
    <label>Kişinin Adı</label><input type="text" id="m-bday-name" placeholder="Ad Soyad">
    <div class="form-row-2">
      <div><label>Ay</label>
        <select id="m-bday-month">
            <option value="1">Ocak</option><option value="2">Şubat</option><option value="3">Mart</option>
            <option value="4">Nisan</option><option value="5">Mayıs</option><option value="6">Haziran</option>
            <option value="7">Temmuz</option><option value="8">Ağustos</option><option value="9">Eylül</option>
            <option value="10">Ekim</option><option value="11">Kasım</option><option value="12">Aralık</option>
        </select>
      </div>
      <div><label>Gün</label><input type="number" id="m-bday-day" min="1" max="31" placeholder="15"></div>
    </div>
    
    <div class="form-row-2" style="margin-top: 15px;">
        <button class="btn-primary" onclick="saveData('birthdays')">Kaydet</button>
        <button class="btn-ghost" onclick="closeModal('modal-bday')">İptal</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-newlist">
  <div class="modal">
    <h2 class="modal-title">Yeni Liste Türü</h2>
    <label>Kategori Adı</label><input type="text" id="m-newlist-name" placeholder="Örn: İzlenecekler, Market...">
    <div class="form-row-2" style="margin-top: 15px;">
        <button class="btn-primary" onclick="saveNewListCat()">Kaydet</button>
        <button class="btn-ghost" onclick="closeModal('modal-newlist')">İptal</button>
    </div>
  </div>
</div>

<div class="note-editor" id="note-editor">
  <div class="note-editor-header">
    <button class="btn-icon" onclick="closeNoteEditor()" style="font-size:24px;">&#8592;</button>
    <input class="note-editor-title" id="m-note-title" placeholder="Başlık...">
    <button class="btn-icon" onclick="deleteData(currentEditId, true)" style="color:var(--accent-danger); font-size:22px;">✕</button>
  </div>
  <div class="note-tabs">
    <div class="note-tab active" id="tab-write" onclick="switchNoteTab('write')">✏️ Düzenle</div>
    <div class="note-tab" id="tab-preview" onclick="switchNoteTab('preview')">👁️ Önizle</div>
  </div>
  <div class="note-area">
    <textarea class="note-textarea active" id="m-note-body" placeholder="Karalamaya başla..."></textarea>
    <div class="note-preview" id="m-note-preview"></div>
  </div>
  <div style="padding:15px; border-top:1px solid var(--border); background:var(--surface);">
    <button class="btn-primary" onclick="closeNoteEditor()">Kaydet ve Çık</button>
  </div>
</div>

<script>
// ==================== CORE ====================
let currentContext = 'pers'; 
let currentModule = 'summary';
let currentEditId = null;
const MONTHS_TR = ['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

const DB = {
  get: (k, def) => JSON.parse(localStorage.getItem('planner_' + k)) || def,
  set: (k, v) => localStorage.setItem('planner_' + k, JSON.stringify(v))
};

// ==================== UI CONTROLS ====================
const modTitles = { 'appointments': 'Takvim & Randevu', 'todos': 'Görevler', 'travels': 'Seyahat', 'notes': 'Notlar', 'habits': 'Alışkanlık & Rutin', 'birthdays': 'Doğum Günleri', 'lists': 'Finans & Listeler' };

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); currentEditId = null; }
function toggleSidebar() { const s = document.getElementById('sidebar'); s.classList.toggle('open'); document.getElementById('sidebar-overlay').style.display = s.classList.contains('open') ? 'block' : 'none'; }

function openForm(modalId, editId = null) {
    currentEditId = editId;
    document.querySelectorAll('.modal input, .modal textarea').forEach(i => i.value = '');
    
    if(editId) {
        const item = DB.get(`${currentContext}_${currentModule}`, []).find(x => x.id === editId);
        if(item) {
            if(modalId === 'modal-appt') { document.getElementById('m-appt-title').value = item.title; document.getElementById('m-appt-date').value = item.date; document.getElementById('m-appt-time').value = item.time; document.getElementById('m-appt-note').value = item.note; }
            if(modalId === 'modal-todo') { document.getElementById('m-todo-title').value = item.title; document.getElementById('m-todo-pri').value = item.pri; document.getElementById('m-todo-rec').value = item.rec; document.getElementById('m-todo-date').value = item.date; document.getElementById('m-todo-note').value = item.note; }
            if(modalId === 'modal-travel'){ document.getElementById('m-travel-dest').value = item.dest; document.getElementById('m-travel-start').value = item.start; document.getElementById('m-travel-end').value = item.end; document.getElementById('m-travel-note').value = item.note; }
            if(modalId === 'modal-bday') { document.getElementById('m-bday-name').value = item.name; document.getElementById('m-bday-month').value = item.month; document.getElementById('m-bday-day').value = item.day; }
        }
    } else {
        const today = new Date().toISOString().split('T')[0];
        if(document.getElementById('m-appt-date')) document.getElementById('m-appt-date').value = today;
        if(document.getElementById('m-todo-date')) document.getElementById('m-todo-date').value = today;
    }
    document.getElementById(modalId).classList.add('open');
}

function toggleFan(type) {
  const fan = document.getElementById('fan-' + type);
  const isOp = !fan.classList.contains('open');
  document.querySelectorAll('.sub-cards-wrapper').forEach(w => w.classList.remove('open'));
  if(isOp) { fan.classList.add('open'); fan.querySelectorAll('.sub-card').forEach((c, i) => c.style.transitionDelay = (i * 0.04) + 's'); }
}

function setTheme(t) { document.body.setAttribute('data-theme', t); localStorage.setItem('planner_theme', t); closeModal('modal-settings'); }
function setLang(l) { localStorage.setItem('planner_lang', l); location.reload(); }

function switchModule(mod, ctx = '') {
  currentModule = mod; if(ctx) currentContext = ctx;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + mod).classList.add('active');
  
  document.querySelectorAll('.master-card, .sub-card').forEach(el => el.classList.remove('active', 'active-work'));
  if(mod === 'summary') {
      document.getElementById('btn-summary').classList.add('active');
      document.getElementById('module-header').style.display = 'none';
  } else {
      const mCard = document.getElementById(`btn-${currentContext}-master`);
      if(mCard) mCard.classList.add(currentContext==='work' ? 'active-work' : 'active');
      const sCard = document.getElementById(`btn-${currentContext}_${mod}`);
      if(sCard) sCard.classList.add(currentContext==='work' ? 'active-work' : 'active');
      
      document.getElementById('module-header').style.display = 'flex';
      document.getElementById('module-title').innerText = modTitles[mod];
      const badge = document.getElementById('module-badge');
      badge.innerText = currentContext==='work' ? 'İŞ DÜNYASI' : 'KİŞİSEL';
      badge.style.background = currentContext==='work' ? 'var(--accent-work)' : 'var(--accent)';
  }

  if(window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').style.display = 'none';
  }
  renderActiveModule();
}

// ==================== UNIVERSAL DATA SAVE/DELETE ====================
function saveData(type) {
    const key = `${currentContext}_${type}`;
    const items = DB.get(key, []);
    let payload = { id: currentEditId || Date.now().toString(36) };
    
    if(type === 'appts') {
        payload.title = document.getElementById('m-appt-title').value.trim();
        payload.date = document.getElementById('m-appt-date').value;
        payload.time = document.getElementById('m-appt-time').value;
        payload.note = document.getElementById('m-appt-note').value;
        if(!payload.title || !payload.date) return;
    } 
    else if(type === 'todos') {
        payload.title = document.getElementById('m-todo-title').value.trim();
        payload.pri = document.getElementById('m-todo-pri').value;
        payload.rec = document.getElementById('m-todo-rec').value;
        payload.date = document.getElementById('m-todo-date').value;
        payload.note = document.getElementById('m-todo-note').value;
        payload.done = false;
        if(!payload.title) return;
    }
    else if(type === 'travels') {
        payload.dest = document.getElementById('m-travel-dest').value.trim();
        payload.start = document.getElementById('m-travel-start').value;
        payload.end = document.getElementById('m-travel-end').value;
        payload.note = document.getElementById('m-travel-note').value;
        payload.items = [];
        if(!payload.dest) return;
    }
    else if(type === 'habits') {
        payload.name = document.getElementById('m-habit-name').value.trim();
        payload.target = document.getElementById('m-habit-target').value;
        payload.checks = {};
        if(!payload.name) return;
    }
    else if(type === 'birthdays') {
        payload.name = document.getElementById('m-bday-name').value.trim();
        payload.month = document.getElementById('m-bday-month').value;
        payload.day = document.getElementById('m-bday-day').value;
        payload.items = [];
        if(!payload.name || !payload.day) return;
    }

    if(currentEditId) {
        const i = items.findIndex(x => x.id === currentEditId);
        if(type === 'todos') payload.done = items[i].done; 
        if(type === 'travels') payload.items = items[i].items; 
        if(type === 'birthdays') payload.items = items[i].items; 
        items[i] = payload;
    } else {
        items.push(payload);
    }
    
    DB.set(key, items);
    closeModal(`modal-${type.replace('appts','appt').replace('todos','todo').replace('travels','travel').replace('habits','habit').replace('birthdays','bday')}`);
    renderActiveModule();
}

function deleteData(id, isNote = false) {
    if(!confirm("Silinsin mi?")) return;
    const key = `${currentContext}_${currentModule}`;
    DB.set(key, DB.get(key, []).filter(x => x.id !== id));
    if(isNote) document.getElementById('note-editor').style.display='none';
    renderActiveModule();
}

function handleSearch(q) {
    const term = q.toLowerCase();
    document.querySelectorAll('.section.active .card, .section.active .summary-item').forEach(c => {
        c.style.display = c.innerText.toLowerCase().includes(term) ? '' : 'none';
    });
}

// ==================== RENDERS ====================
function renderActiveModule() {
  if(currentModule === 'summary') renderSummary();
  else if(currentModule === 'appointments') renderAppts();
  else if(currentModule === 'todos') renderTodos();
  else if(currentModule === 'travels') renderTravels();
  else if(currentModule === 'notes') renderNotes();
  else if(currentModule === 'habits') renderHabits();
  else if(currentModule === 'birthdays') renderBdays();
  else if(currentModule === 'lists') { renderGoal(); renderLists(); }
}

function formatDate(d) { if(!d) return ''; const p = d.split('-'); return p[2]+'.'+p[1]+'.'+p[0]; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getCountdown(d, t) { if(!d) return null; const target = new Date(d + (t ? 'T'+t : 'T23:59:59')); const ms = target - new Date(); if(ms < 0) return {t:'Geçti', c:'badge-past'}; const diffD = Math.floor(ms/86400000); if(diffD > 0) return {t: diffD + ' gün', c: diffD > 3 ? 'badge-safe' : 'badge-warning'}; return {t: 'Bugün', c: 'badge-danger'}; }
function downloadICS(title, dStr, tStr, note, endStr=null) { if(!dStr) return; const fmt=d=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z'; const fmtAll=d=>d.toISOString().split('T')[0].replace(/-/g,''); let ics=`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:${title}\nDESCRIPTION:${note||''}\n`; if(endStr&&!tStr){ const s=new Date(dStr); const e=new Date(endStr); if(e>=s){ e.setDate(e.getDate()+1); ics+=`DTSTART;VALUE=DATE:${fmtAll(s)}\nDTEND;VALUE=DATE:${fmtAll(e)}\n`; }else{ ics+=`DTSTART;VALUE=DATE:${fmtAll(s)}\nDTEND;VALUE=DATE:${fmtAll(s)}\n`; } } else{ const s=new Date(dStr+(tStr?'T'+tStr:'T00:00')); let e=new Date(s.getTime()+(tStr?3600000:86400000)); ics+=`DTSTART:${fmt(s)}\nDTEND:${fmt(e)}\n`; } ics+=`END:VEVENT\nEND:VCALENDAR`; const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${title.replace(/ /g,'_')}.ics`; document.body.appendChild(a); a.click(); document.body.removeChild(a); }

// ==================== TAM KAPSAMLI ÖZET (DASHBOARD) ====================
function renderSummary() {
    const el = document.getElementById('summary-list');
    let evs = [];
    const now = new Date();
    const tMs = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    
    // Yardımcı fonksiyon: Veriyi evs dizisine aktarır
    const pushEv = (key, icon, extractFn) => {
        DB.get(key, []).forEach(i => {
            const e = extractFn(i);
            if(e && e.t >= tMs) evs.push({...e, icon, ctx: key.includes('work')?'work':'pers', mod: key.split('_')[1]});
        });
    };
    
    // Tüm modülleri tara
    pushEv('work_appts', '🗓️', i => i.date ? {t:new Date(i.date+'T00:00').getTime(), tObj:new Date(i.date+(i.time?'T'+i.time:'T23:59:59')), title:i.title, sub:formatDate(i.date)+(i.time?' '+i.time:'')} : null);
    pushEv('pers_appts', '📍', i => i.date ? {t:new Date(i.date+'T00:00').getTime(), tObj:new Date(i.date+(i.time?'T'+i.time:'T23:59:59')), title:i.title, sub:formatDate(i.date)+(i.time?' '+i.time:'')} : null);
    pushEv('work_travels', '✈️', i => i.start ? {t:new Date(i.start+'T00:00').getTime(), tObj:new Date(i.start+'T23:59:59'), title:i.dest, sub:formatDate(i.start)} : null);
    pushEv('pers_travels', '🎒', i => i.start ? {t:new Date(i.start+'T00:00').getTime(), tObj:new Date(i.start+'T23:59:59'), title:i.dest, sub:formatDate(i.start)} : null);
    pushEv('work_todos', '💼', i => (i.date && !i.done) ? {t:new Date(i.date+'T00:00').getTime(), tObj:new Date(i.date+'T23:59:59'), title:i.title, sub:formatDate(i.date)} : null);
    pushEv('pers_todos', '✅', i => (i.date && !i.done) ? {t:new Date(i.date+'T00:00').getTime(), tObj:new Date(i.date+'T23:59:59'), title:i.title, sub:formatDate(i.date)} : null);
    
    // Doğum Günleri için özel yıl hesabı
    const ty = now.getFullYear();
    DB.get('pers_birthdays', []).forEach(b => {
        let n = new Date(ty, b.month-1, b.day);
        if(n.getTime() < tMs) n = new Date(ty+1, b.month-1, b.day);
        evs.push({t: n.getTime(), tObj: new Date(n.getFullYear(), b.month-1, b.day, 23, 59, 59), title: b.name, sub: `${b.day} ${MONTHS_TR[b.month]}`, icon: '🎂', ctx: 'pers', mod: 'birthdays'});
    });

    evs.sort((a,b) => a.t - b.t);
    
    if(!evs.length) { el.innerHTML = '<div class="empty">Planlanmış bir şey yok.</div>'; return; }
    
    el.innerHTML = '<div class="section-label">Yaklaşan Tüm Planlar</div>' + evs.map(e => {
        // Saat kaymalarını önlemek için güvenli format
        const pad = n => String(n).padStart(2, '0');
        const dStr = `${e.tObj.getFullYear()}-${pad(e.tObj.getMonth()+1)}-${pad(e.tObj.getDate())}`;
        const tStr = `${pad(e.tObj.getHours())}:${pad(e.tObj.getMinutes())}`;
        const cd = getCountdown(dStr, tStr==='23:59'?null:tStr);
        
        return `<div class="summary-item" onclick="switchModule('${e.mod}', '${e.ctx}')">
            <div class="sum-icon">${e.icon}</div>
            <div style="flex:1;">
                <div style="font-weight:700; font-size:16px;">${esc(e.title)}</div>
                <div style="font-size:13px; color:var(--muted); margin-top:4px;">${e.sub}</div>
            </div>
            <div style="text-align:right;">
                ${cd ? `<span class="badge ${cd.c}" style="display:block; margin-bottom:6px;">${cd.t}</span>` : ''}
                <span class="badge ${e.ctx==='work'?'badge-danger':'badge-safe'}" style="margin:0;">${e.ctx==='work'?'İŞ':'KİŞİSEL'}</span>
            </div>
        </div>`;
    }).join('');
}

function renderAppts() {
    const arr = DB.get(`${currentContext}_appts`, []).sort((a,b)=> (a.date+a.time)<(b.date+b.time)?-1:1);
    const el = document.getElementById('appt-list');
    if(!arr.length) { el.innerHTML = '<div class="empty">Kayıt yok.</div>'; return; }
    el.innerHTML = arr.map(a => `<div class="card">
        <div class="card-actions"><button class="btn-icon" onclick="openForm('modal-appt', '${a.id}')">&#9998;</button><button class="btn-icon" onclick="deleteData('${a.id}')">✕</button></div>
        ${getCountdown(a.date, a.time) ? `<span class="badge ${getCountdown(a.date, a.time).c}">${getCountdown(a.date, a.time).t}</span>` : ''}
        <div class="card-title">${esc(a.title)}</div>
        <div class="card-meta">🗓️ ${formatDate(a.date)} ${a.time ? '· 🕒 '+a.time : ''}</div>
        ${a.note ? `<div class="card-note">${esc(a.note)}</div>` : ''}
    </div>`).join('');
}

// TODO
function toggleTodoDone(id) { const key = `${currentContext}_todos`; const arr = DB.get(key, []); const t = arr.find(x => x.id === id); if(t) { t.done = !t.done; DB.set(key, arr); renderTodos(); } }
function renderTodos() {
    const arr = DB.get(`${currentContext}_todos`, []); const el = document.getElementById('todo-list');
    if(!arr.length) { el.innerHTML = '<div class="empty">Görev yok.</div>'; return; }
    el.innerHTML = arr.map(t => `<div class="card" style="${t.done?'opacity:0.5':''}">
        <div class="card-actions"><button class="btn-icon" onclick="openForm('modal-todo', '${t.id}')">&#9998;</button><button class="btn-icon" onclick="deleteData('${t.id}')">✕</button></div>
        <div style="display:flex; align-items:flex-start; gap:10px;">
            <input type="checkbox" style="width:20px; height:20px; accent-color:var(--accent); cursor:pointer;" ${t.done?'checked':''} onchange="toggleTodoDone('${t.id}')">
            <div>
                <div class="card-title" style="margin:0; ${t.done?'text-decoration:line-through':''}">${esc(t.title)}</div>
                <div class="card-meta" style="margin-top:5px;">${t.date ? formatDate(t.date) : 'Tarihsiz'} ${t.pri==='high'?'<span style="color:var(--accent-danger)">· Yüksek</span>':''}</div>
                ${t.note ? `<div class="card-note">${esc(t.note)}</div>` : ''}
            </div>
        </div>
    </div>`).join('');
}

// TRAVEL ACCORDION
function toggleAcc(id) { document.getElementById('bdy-'+id).classList.toggle('open'); document.getElementById('chv-'+id).classList.toggle('open'); }
function addTravItem(id){ const v=document.getElementById('ti-'+id).value.trim(); if(!v)return; const k=`${currentContext}_travels`; const arr=DB.get(k,[]); const o=arr.find(x=>x.id===id); if(o){o.items.push({id:Date.now().toString(36),t:v,d:false}); DB.set(k,arr); renderTravels(); setTimeout(()=>toggleAcc(id),10);} }
function togTravItem(tid,iid){ const k=`${currentContext}_travels`; const arr=DB.get(k,[]); const o=arr.find(x=>x.id===tid); if(o){const i=o.items.find(x=>x.id===iid); if(i)i.d=!i.d; DB.set(k,arr); renderTravels(); setTimeout(()=>toggleAcc(tid),10);} }
function delTravItem(tid,iid){ const k=`${currentContext}_travels`; const arr=DB.get(k,[]); const o=arr.find(x=>x.id===tid); if(o){o.items=o.items.filter(x=>x.id!==iid); DB.set(k,arr); renderTravels(); setTimeout(()=>toggleAcc(tid),10);} }

function renderTravels() {
    const arr = DB.get(`${currentContext}_travels`, []); const el = document.getElementById('travel-list');
    if(!arr.length) { el.innerHTML = '<div class="empty">Seyahat yok.</div>'; return; }
    el.innerHTML = arr.map(a => {
        const items = (a.items||[]).map(i=>`<div class="list-item-row"><div class="list-check ${i.d?'checked':''}" onclick="togTravItem('${a.id}','${i.id}')">${i.d?'✓':''}</div><span style="flex:1;font-size:14px;${i.d?'text-decoration:line-through;opacity:0.5':''}">${esc(i.t)}</span><button class="btn-icon" onclick="delTravItem('${a.id}','${i.id}')">✕</button></div>`).join('');
        return `<div class="card"><div class="acc-header" onclick="toggleAcc('${a.id}')"><div><div class="card-title" style="margin:0;">${esc(a.dest)}</div><div class="card-meta">${formatDate(a.start)} - ${formatDate(a.end)}</div></div><div style="display:flex;gap:12px;"><button class="btn-icon" onclick="event.stopPropagation();downloadICS('${a.dest}','${a.start}',null,'${a.note}','${a.end}')">&#128197;</button><button class="btn-icon" onclick="event.stopPropagation();openForm('modal-travel','${a.id}')">&#9998;</button><span class="chevron" id="chv-${a.id}">▼</span></div></div><div class="acc-body" id="bdy-${a.id}">${a.note?`<div class="card-note">${esc(a.note)}</div>`:''}<div>${items}</div><div style="display:flex;gap:8px;margin-top:10px;"><input type="text" id="ti-${a.id}" placeholder="Eşya/Rota..." style="margin:0;"><button class="btn-primary" style="width:auto;padding:12px;" onclick="addTravItem('${a.id}')">+</button></div><button class="btn-ghost" style="width:100%;margin-top:10px;color:var(--accent-danger);border-color:var(--accent-danger);" onclick="deleteData('${a.id}')">Seyahati Sil</button></div></div>`;
    }).join('');
}

// BDAY ACCORDION
function addBdayItem(id){ const v=document.getElementById('bi-'+id).value.trim(); if(!v)return; const k=`pers_birthdays`; const arr=DB.get(k,[]); const o=arr.find(x=>x.id===id); if(o){o.items.push({id:Date.now().toString(36),t:v,d:false}); DB.set(k,arr); renderBdays(); setTimeout(()=>toggleAcc(id),10);} }
function togBdayItem(tid,iid){ const k=`pers_birthdays`; const arr=DB.get(k,[]); const o=arr.find(x=>x.id===tid); if(o){const i=o.items.find(x=>x.id===iid); if(i)i.d=!i.d; DB.set(k,arr); renderBdays(); setTimeout(()=>toggleAcc(tid),10);} }
function delBdayItem(tid,iid){ const k=`pers_birthdays`; const arr=DB.get(k,[]); const o=arr.find(x=>x.id===tid); if(o){o.items=o.items.filter(x=>x.id!==iid); DB.set(k,arr); renderBdays(); setTimeout(()=>toggleAcc(tid),10);} }

function renderBdays() {
    const arr = DB.get(`pers_birthdays`, []); const el = document.getElementById('bday-list');
    if(!arr.length) { el.innerHTML = '<div class="empty">Kayıt yok.</div>'; return; }
    
    const ty=new Date().getFullYear(); arr.forEach(x=>{ let n=new Date(ty,x.month-1,x.day); if(n.getTime()<new Date().getTime())n=new Date(ty+1,x.month-1,x.day); x._n=n.getTime(); }); arr.sort((a,b)=>a._n-b._n);
    
    el.innerHTML = arr.map(b => {
        const nDate=new Date(b._n); const dStr=`${nDate.getFullYear()}-${String(b.month).padStart(2,'0')}-${String(b.day).padStart(2,'0')}`;
        const items = (b.items||[]).map(i=>`<div class="list-item-row"><div class="list-check ${i.d?'checked':''}" onclick="togBdayItem('${b.id}','${i.id}')">${i.d?'✓':''}</div><span style="flex:1;font-size:14px;${i.d?'text-decoration:line-through;opacity:0.5':''}">${esc(i.t)}</span><button class="btn-icon" onclick="delBdayItem('${b.id}','${i.id}')">✕</button></div>`).join('');
        return `<div class="card"><div class="acc-header" onclick="toggleAcc('${b.id}')"><div style="display:flex;gap:15px;align-items:center;"><div style="width:45px;height:45px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;">${esc(b.name).charAt(0)}</div><div><div class="card-title" style="margin:0;">${esc(b.name)}</div><div class="card-meta">${b.day} ${MONTHS_TR[b.month]}</div></div></div><div style="display:flex;gap:12px;"><button class="btn-icon" onclick="event.stopPropagation();downloadICS('${b.name} D.Günü','${dStr}',null,'Kutlama')">&#128197;</button><button class="btn-icon" onclick="event.stopPropagation();openForm('modal-bday','${b.id}')">&#9998;</button><span class="chevron" id="chv-${b.id}">▼</span></div></div><div class="acc-body" id="bdy-${b.id}"><div>${items}</div><div style="display:flex;gap:8px;margin-top:10px;"><input type="text" id="bi-${b.id}" placeholder="Hediye/Sürpriz fikri..." style="margin:0;"><button class="btn-primary" style="width:auto;padding:12px;" onclick="addBdayItem('${b.id}')">+</button></div><button class="btn-ghost" style="width:100%;margin-top:10px;color:var(--accent-danger);border-color:var(--accent-danger);" onclick="deleteData('${b.id}')">Kişiyi Sil</button></div></div>`;
    }).join('');
}

// HABITS
function toggleHabitDay(hid, dStr) { const arr=DB.get('pers_habits',[]); const o=arr.find(x=>x.id===hid); if(o){o.checks[dStr]=!o.checks[dStr]; DB.set('pers_habits',arr); renderHabits();} }
function renderHabits() {
    const arr = DB.get(`pers_habits`, []); const el = document.getElementById('habit-list');
    if(!arr.length) { el.innerHTML = '<div class="empty">Alışkanlık yok.</div>'; return; }
    const wDays=(()=>{ const t=new Date(); t.setHours(0,0,0,0); const m=new Date(t); m.setDate(t.getDate()-((t.getDay()+6)%7)); const d=[]; const l=['Pt','Sa','Ça','Pe','Cu','Ct','Pz']; for(let i=0;i<7;i++){const x=new Date(m); x.setDate(m.getDate()+i); d.push({ds:x.toISOString().split('T')[0], lb:l[i], n:x.getDate(), td:x.toDateString()===t.toDateString()});} return d; })();
    el.innerHTML = arr.map(h => {
        const ch=h.checks||{}; const dw=wDays.filter(d=>ch[d.ds]).length; const pct=Math.min(100, Math.round((dw/h.target)*100));
        const dots=wDays.map(d=>`<div style="flex:1;aspect-ratio:1;border-radius:8px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer; ${ch[d.ds]?'background:var(--accent);color:#fff;border-color:var(--accent);':(d.td?'border-color:var(--accent-warning);':'background:var(--bg);')}" onclick="toggleHabitDay('${h.id}','${d.ds}')"><span style="font-size:10px;">${d.lb}</span><span style="font-size:13px;font-weight:700;">${d.n}</span></div>`).join('');
        return `<div class="card"><div class="card-actions"><button class="btn-icon" onclick="deleteData('${h.id}')">✕</button></div><div class="card-title">${esc(h.name)}</div><div class="card-meta">Hedef: ${h.target} Gün (Bu Hafta: ${dw})</div><div style="display:flex;gap:8px;margin-top:15px;">${dots}</div></div>`;
    }).join('');
}

// LISTS & GOALS
function renderGoal() { const g=DB.get('pers_goal',null); const c=document.getElementById('goal-container'); if(!g){c.innerHTML=`<button class="btn-add" style="border-style:solid;" onclick="editGoal()">+ Finansal Hedef Ekle</button>`;return;} const pct=g.tg>0?Math.min(100,Math.round((g.cr/g.tg)*100)):0; c.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-end;"><div style="font-weight:700;font-size:16px;">${esc(g.t)}</div><div style="font-size:14px;color:var(--muted)"><strong style="color:var(--accent);font-size:16px;">${g.cr.toLocaleString()}</strong> / ${g.tg.toLocaleString()}</div></div><div style="width:100%;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;border:1px solid var(--border);margin:12px 0;"><div style="height:100%;background:var(--accent);width:${pct}%"></div></div><div style="display:flex;gap:8px;margin-top:12px;"><input type="number" id="goal-val" placeholder="Miktar" style="margin:0;"><button class="btn-primary" style="width:auto;padding:12px;" onclick="addGoal()">+</button><button class="btn-ghost" style="width:auto;padding:12px;" onclick="editGoal()">&#9998;</button><button class="btn-ghost" style="width:auto;padding:12px;color:var(--accent-danger);border-color:var(--accent-danger);" onclick="if(confirm('Silinsin mi?')){DB.set('pers_goal',null);renderGoal();}">✕</button></div></div>`; }
function addGoal(){ const v=parseInt(document.getElementById('goal-val').value); if(!v||v<=0)return; const g=DB.get('pers_goal',null); if(g){g.cr+=v; DB.set('pers_goal',g); renderGoal();} }
function editGoal(){ const g=DB.get('pers_goal',{t:'Hedef',cr:0,tg:0}); const t=prompt("Başlık:",g.t); if(!t)return; const tg=prompt("Hedef Miktar:",g.tg); if(!tg)return; const c=prompt("Mevcut:",g.cr); if(!c)return; DB.set('pers_goal',{t:t,tg:parseInt(tg)||0,cr:parseInt(c)||0}); renderGoal(); }

function renderLists() { const cats=DB.get('pers_listcats',['Alışveriş','Kitaplar']); const ac=DB.get('pers_activecat',cats[0]); document.getElementById('cat-tabs').innerHTML=cats.map(c=>`<button class="badge" style="cursor:pointer; font-size:13px; padding:8px 16px; margin:0; flex-shrink:0; ${c===ac?'background:var(--accent);color:#fff;':'background:var(--surface);color:var(--muted);border:1px solid var(--border)'}" onclick="DB.set('pers_activecat','${esc(c)}');renderLists()">${esc(c)}</button>`).join('')+`<button class="badge" style="cursor:pointer; font-size:13px; padding:8px 16px; margin:0; background:transparent; border:1px dashed var(--border); color:var(--text); flex-shrink:0;" onclick="openModal('modal-newlist')">+ Yeni</button>`; renderListItems(ac); }
function saveNewListCat(){ const n=document.getElementById('m-newlist-name').value.trim(); if(!n)return; const c=DB.get('pers_listcats',[]); if(!c.includes(n))c.push(n); DB.set('pers_listcats',c); DB.set('pers_activecat',n); closeModal('modal-newlist'); renderLists(); }
function safe(s) { return s.replace(/[^a-zA-Z0-9]/g,'_'); }
function addLItem(cat){ const v=document.getElementById('li-'+safe(cat)).value.trim(); if(!v)return; const arr=DB.get('pers_list_'+cat,[]); arr.push({id:Date.now().toString(36),t:v,d:false,p:'',n:''}); DB.set('pers_list_'+cat,arr); renderLists(); }
function togLItem(cat,id){ const arr=DB.get('pers_list_'+cat,[]); const o=arr.find(x=>x.id===id); if(o){o.d=!o.d; DB.set('pers_list_'+cat,arr); renderLists();} }
function delLItem(cat,id){ DB.set('pers_list_'+cat, DB.get('pers_list_'+cat,[]).filter(x=>x.id!==id)); renderLists(); }
function updLItem(cat,id){ const arr=DB.get('pers_list_'+cat,[]); const o=arr.find(x=>x.id===id); if(o){o.p=document.getElementById('lp-'+id).value.trim(); o.n=document.getElementById('ln-'+id).value.trim(); DB.set('pers_list_'+cat,arr);} }
function togLBody(id){ document.getElementById('lb-'+id).classList.toggle('open'); document.getElementById('lc-'+id).classList.toggle('open'); }
function renderListItems(cat) { const el=document.getElementById('list-content'); const arr=DB.get('pers_list_'+cat,[]); 
  const r=(i)=>`<div class="card" style="padding:12px 16px; margin-bottom:8px; ${i.d?'opacity:0.5;box-shadow:none;':''}"><div class="acc-header" onclick="togLBody('${i.id}')"><div class="list-check ${i.d?'checked':''}" style="width:20px;height:20px;" onclick="event.stopPropagation();togLItem('${esc(cat)}','${i.id}')">${i.d?'✓':''}</div><div style="flex:1;font-weight:600;font-size:15px;margin-left:12px;${i.d?'text-decoration:line-through':''}">${esc(i.t)}</div>${i.p&&!i.d?`<span style="font-size:11px;background:var(--bg);padding:2px 6px;border-radius:4px;border:1px solid var(--border);margin-right:10px;color:var(--muted)">${esc(i.p)}</span>`:''}<span class="chevron" id="lc-${i.id}">▼</span></div><div class="acc-body" id="lb-${i.id}"><input type="text" id="lp-${i.id}" value="${esc(i.p)}" placeholder="İlerleme (Örn: Sayfa 4)" onchange="updLItem('${esc(cat)}','${i.id}')" style="padding:8px;font-size:13px;margin-bottom:8px;"><textarea id="ln-${i.id}" placeholder="Link veya Not" onchange="updLItem('${esc(cat)}','${i.id}')" style="padding:8px;font-size:13px;min-height:50px;margin-bottom:8px;">${esc(i.n)}</textarea><div style="text-align:right"><button class="btn-icon" style="color:var(--accent-danger)" onclick="delLItem('${esc(cat)}','${i.id}')">Sil</button></div></div></div>`;
  const un=arr.filter(i=>!i.d); const dn=arr.filter(i=>i.d);
  el.innerHTML=`<div style="display:flex;gap:8px;margin-bottom:16px;"><input type="text" id="li-${safe(cat)}" placeholder="Öğe ekle..." onkeydown="if(event.key==='Enter')addLItem('${esc(cat)}')"><button class="btn-primary" style="width:auto;padding:12px;" onclick="addLItem('${esc(cat)}')">+</button></div>${un.length?un.map(r).join(''):'<div class="empty">Liste boş.</div>'}${dn.length?`<div style="height:1px;background:var(--border);margin:20px 0;"></div><div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:12px;">Tamamlananlar</div>${dn.map(r).join('')}`:''}`;
}

// NOTE EDITOR
function parseMD(t) { return esc(t).replace(/^### (.*$)/gim,'<h3>$1</h3>').replace(/^## (.*$)/gim,'<h2>$1</h2>').replace(/^# (.*$)/gim,'<h1>$1</h1>').replace(/\*\*(.*?)\*\*/gim,'<strong>$1</strong>').replace(/\*(.*?)\*/gim,'<em>$1</em>').replace(/^\- (.*$)/gim,'<ul><li>$1</li></ul>').replace(/<\/ul>\n<ul>/gim,'').replace(/\n/gim,'<br>'); }
function openNoteEditor(eid=null) { currentEditId=eid; const n=eid?DB.get(`${currentContext}_notes`,[]).find(x=>x.id===eid):null; document.getElementById('m-note-title').value=n?n.title:''; document.getElementById('m-note-body').value=n?n.body:''; switchNoteTab('write'); document.getElementById('note-editor').style.display='flex'; if(!eid)currentEditId=Date.now().toString(36); }
function switchNoteTab(m) { document.getElementById('tab-write').classList.remove('active'); document.getElementById('tab-preview').classList.remove('active'); document.getElementById('m-note-body').classList.remove('active'); document.getElementById('m-note-preview').classList.remove('active'); if(m==='write'){ document.getElementById('tab-write').classList.add('active'); document.getElementById('m-note-body').classList.add('active'); }else{ document.getElementById('tab-preview').classList.add('active'); document.getElementById('m-note-preview').innerHTML=parseMD(document.getElementById('m-note-body').value); document.getElementById('m-note-preview').classList.add('active'); } }
function closeNoteEditor() { const t=document.getElementById('m-note-title').value.trim(); const b=document.getElementById('m-note-body').value.trim(); if(t||b){ const k=`${currentContext}_notes`; const arr=DB.get(k,[]); const idx=arr.findIndex(x=>x.id===currentEditId); const e={id:currentEditId, title:t||'İsimsiz', body:b, d:new Date().toISOString()}; if(idx>-1)arr[idx]=e; else arr.unshift(e); DB.set(k,arr); } document.getElementById('note-editor').style.display='none'; renderNotes(); }
function deleteNote() { if(confirm("Silinsin mi?")){ DB.set(`${currentContext}_notes`,DB.get(`${currentContext}_notes`,[]).filter(x=>x.id!==currentEditId)); document.getElementById('note-editor').style.display='none'; renderNotes(); } }
function renderNotes() { const arr=DB.get(`${currentContext}_notes`,[]); const el=document.getElementById('notes-list'); if(!arr.length){el.innerHTML=`<div class="empty">Not yok.</div>`;return;} el.innerHTML=arr.map(n=>{ const d=new Date(n.d); return `<div class="card" style="cursor:pointer;" onclick="openNoteEditor('${n.id}')"><div class="card-title">${esc(n.title)}</div><div style="font-size:14px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;">${esc(n.body)}</div><div style="font-size:11px;color:var(--muted);margin-top:10px;font-weight:700;">${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}</div></div>`; }).join(''); }

// EXPORT/IMPORT
function exportData() { const d={}; for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i); if(k.startsWith('planner_'))d[k]=localStorage.getItem(k);} const blob=new Blob([JSON.stringify(d,null,2)],{type:'text/plain;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`planner_yedek_${new Date().toISOString().split('T')[0]}.txt`; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
function importData(e) { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{const d=JSON.parse(ev.target.result); Object.keys(d).forEach(k=>localStorage.setItem(k,d[k])); location.reload();}; r.readAsText(f); }

// INIT
function init() {
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('tr-TR', {weekday:'long', day:'numeric', month:'long'});
  setTheme(localStorage.getItem('planner_theme') || 'dark');
  switchModule('summary');
}
init();
</script>
