<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1E2228;
    --surface: #272C34;
    --border: #353B45;
    --text: #DFE4EC;
    --muted: #7E8899;
    --accent: #5C9E78;
    --accent-light: #253630;
    --accent2: #E07B54;
    --tab-active: #DFE4EC;
    --shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    margin: 0;
  }
  .app-shell {
    max-width: 680px;
    margin: 0 auto;
    position: relative;
    display: flex;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 20px 20px 0;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .app-title {
    font-family: 'Instrument Serif', serif;
    font-size: 30px;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .app-date {
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
  }

  /* ── SHARED NAV STYLES ── */
  .nav-item {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    transition: color 0.15s, background 0.15s;
  }
  .nav-item:hover { color: var(--text); }
  .nav-item.active { color: var(--accent); }
  .nav-icon { line-height: 1; }
  .sidebar-logo {
    font-family: 'Instrument Serif', serif;
    color: var(--accent);
  }

  /* ── MOBILE: left sidebar (< 600px) ── */
  @media (max-width: 599px) {
    body { max-width: 100vw; }
    .app-shell { display: flex; min-height: 100vh; }
    .sidebar {
      width: 64px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 10px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      align-self: flex-start;
      z-index: 50;
      gap: 2px;
    }
    .sidebar-header {
      padding: 8px 4px 12px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .sidebar-logo { font-size: 18px; }
    .nav-item {
      flex-direction: column;
      padding: 9px 4px;
      gap: 3px;
      border-radius: 8px;
      margin: 0 5px;
    }
    .nav-item.active { background: var(--accent-light); }
    .nav-icon { font-size: 18px; }
    .nav-label { font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; display: block; }
    .main-area { flex: 1; min-width: 0; }
    .content { padding: 16px; }
    header { padding: 18px 16px 0; }
  }

  /* ── DESKTOP: top bar (≥ 600px) ── */
  @media (min-width: 600px) {
    body { max-width: 700px; margin: 0 auto; }
    .app-shell { display: block; }
    .sidebar {
      display: flex;
      flex-direction: row;
      align-items: center;
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 8px;
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 2px;
    }
    .sidebar-header {
      padding: 10px 12px 10px 8px;
      border-bottom: none;
      border-right: 1px solid var(--border);
      margin-right: 4px;
    }
    .sidebar-logo { font-size: 20px; letter-spacing: -0.5px; }
    .nav-item {
      flex-direction: column;
      padding: 10px 10px 9px;
      gap: 3px;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      margin: 0;
    }
    .nav-item.active { background: none; border-bottom-color: var(--accent); }
    .nav-icon { font-size: 17px; }
    .nav-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; display: block; }
    .main-area { width: 100%; }
    .content { padding: 24px; }
    header { padding: 24px 24px 0; }
  }

  /* CONTENT */
  .content { padding: 20px; }
  .section { display: none; }
  .section.active { display: block; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    position: relative;
  }
  .card-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .card-meta {
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
  }
  .card-note {
    font-size: 14px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.5;
  }
  .card-actions {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 6px;
  }
  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 15px;
    padding: 2px 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .btn-icon:hover { color: var(--accent2); }

  /* UPCOMING BADGE */
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .badge-today { background: #3D2820; color: var(--accent2); }
  .badge-soon { background: var(--accent-light); color: var(--accent); }
  .badge-past { background: var(--border); color: var(--muted); }

  /* ADD FORM */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    display: none;
  }
  .add-form.open { display: block; }
  .form-row { margin-bottom: 10px; }
  .form-row:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  input[type="text"], input[type="date"], input[type="time"], textarea, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* BUTTONS */
  .btn {
    padding: 10px 20px;
    border-radius: 7px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-add {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 15px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: border-color 0.15s, color 0.15s;
    margin-bottom: 10px;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }
  .form-btns { display: flex; gap: 8px; margin-top: 12px; }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
    margin-top: 6px;
  }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 16px;
    font-style: italic;
    font-family: 'Instrument Serif', serif;
  }

  /* LISTS TAB */
  .list-group {
    margin-bottom: 20px;
  }
  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .list-name {
    font-size: 18px;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
  }
  .list-count {
    font-size: 12px;
    color: var(--muted);
    background: var(--border);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .list-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    transition: opacity 0.2s;
  }
  .list-item.done { opacity: 0.45; }
  .list-item.done .item-text { text-decoration: line-through; }
  .list-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .list-item.done .list-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .list-check-mark { display: none; color: white; font-size: 10px; }
  .list-item.done .list-check-mark { display: block; }
  .item-text { font-size: 15px; flex: 1; line-height: 1.4; font-weight: 500; }
  .item-sub { font-size: 13px; color: var(--muted); font-weight: 400; }
  .item-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .item-del:hover { color: var(--accent2); }
  .quick-add {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }
  .quick-add input {
    flex: 1;
    padding: 10px 12px;
    font-size: 15px;
  }
  .quick-add button {
    padding: 10px 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  /* TRAVEL */
  .travel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .travel-header {
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .travel-dest {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
  }
  .travel-dates { font-size: 13px; color: var(--muted); margin-top: 2px; font-weight: 400; }
  .travel-body {
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
    display: none;
  }
  .travel-body.open { display: block; }
  .travel-note {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    padding: 12px 0 8px;
    white-space: pre-wrap;
  }
  .travel-items { margin-top: 8px; }
  .travel-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 0;
    font-size: 15px;
    border-bottom: 1px solid var(--border);
  }
  .travel-item:last-child { border-bottom: none; }
  .travel-add {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .travel-add input {
    flex: 1;
    padding: 9px 12px;
    font-size: 14px;
  }
  .travel-add button {
    padding: 9px 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .chevron { transition: transform 0.2s; font-size: 12px; color: var(--muted); }
  .chevron.open { transform: rotate(180deg); }

  /* NOTES */
  .note-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .note-card:hover { border-color: var(--accent); }
  .note-card-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .note-card-preview {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .note-card-date { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* NOTE EDITOR */
  .note-editor {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    padding: 0;
    flex-direction: column;
    max-width: 680px;
    margin: 0 auto;
  }
  .note-editor.open { display: flex; }
  .note-editor-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .note-back {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    padding: 0;
    line-height: 1;
  }
  .note-editor-title {
    flex: 1;
    font-size: 17px;
    font-weight: 600;
    background: none;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }
  .note-editor-body {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
  }
  .note-editor-area {
    width: 100%;
    min-height: 400px;
    background: none;
    border: none;
    outline: none;
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    line-height: 1.7;
    resize: none;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28,26,22,0.35);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 680px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-title {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    margin-bottom: 16px;
  }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* LIST CATEGORY TABS */
  .cat-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
    margin-bottom: 16px;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .cat-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* TODO */
  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    transition: opacity 0.2s;
    border-left: 3px solid var(--border);
  }
  .todo-item.priority-high { border-left-color: var(--accent2); }
  .todo-item.priority-normal { border-left-color: var(--accent); }
  .todo-item.priority-low { border-left-color: var(--muted); }
  .todo-item.done { opacity: 0.4; }
  .todo-item.done .todo-text { text-decoration: line-through; }
  .todo-text { font-size: 15px; font-weight: 500; flex: 1; line-height: 1.4; }
  .todo-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .todo-del { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 15px; padding: 0 2px; transition: color 0.15s; flex-shrink: 0; }
  .todo-del:hover { color: var(--accent2); }

  /* HABIT */
  .habit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .habit-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .habit-name { font-size: 16px; font-weight: 600; }
  .habit-streak { font-size: 12px; color: var(--accent); font-weight: 600; }
  .habit-days {
    display: flex;
    gap: 6px;
  }
  .habit-day {
    flex: 1;
    aspect-ratio: 1;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: background 0.15s, border-color 0.15s;
    min-width: 32px;
  }
  .habit-day.checked { background: var(--accent); border-color: var(--accent); }
  .habit-day.today { border-color: var(--accent2); }
  .habit-day-label { font-size: 9px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
  .habit-day.checked .habit-day-label { color: rgba(255,255,255,0.7); }
  .habit-day-num { font-size: 12px; font-weight: 600; color: var(--text); }
  .habit-day.checked .habit-day-num { color: #fff; }
  .habit-progress {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .habit-bar-bg {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .habit-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }
  .habit-target-text { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .habit-del { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; transition: color 0.15s; }
  .habit-del:hover { color: var(--accent2); }

  /* BIRTHDAY */
  .bday-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
  }
  .bday-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-family: 'Instrument Serif', serif;
    color: var(--accent);
    flex-shrink: 0;
    font-weight: 600;
  }
  .bday-name { font-size: 16px; font-weight: 600; }
  .bday-date { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .bday-badge { margin-top: 4px; }


  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }


</style>
</head>
<body>

<div class="app-shell">

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">P</div>
  </div>
  <button class="nav-item active" onclick="switchTab('appointments')">
    <span class="nav-icon">&#128197;</span>
    <span class="nav-label">Randevu</span>
  </button>
  <button class="nav-item" onclick="switchTab('travel')">
    <span class="nav-icon">&#9992;</span>
    <span class="nav-label">Seyahat</span>
  </button>
  <button class="nav-item" onclick="switchTab('lists')">
    <span class="nav-icon">&#128203;</span>
    <span class="nav-label">Listeler</span>
  </button>
  <button class="nav-item" onclick="switchTab('todo')">
    <span class="nav-icon">&#9989;</span>
    <span class="nav-label">Yapılacak</span>
  </button>
  <button class="nav-item" onclick="switchTab('habits')">
    <span class="nav-icon">&#128293;</span>
    <span class="nav-label">Alışkanlık</span>
  </button>
  <button class="nav-item" onclick="switchTab('birthdays')">
    <span class="nav-icon">&#127874;</span>
    <span class="nav-label">D.Günü</span>
  </button>

<script>
// ==================== DATA ====================
const DB = {
  get: (k) => JSON.parse(localStorage.getItem('planner_' + k) || 'null'),
  set: (k, v) => localStorage.setItem('planner_' + k, JSON.stringify(v)),
};

function getData(k, def) {
  const v = DB.get(k);
  return v !== null ? v : def;
}

// ==================== UTILS ====================
function id() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function formatDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  return `${parts[2]}.${parts[1]}.${parts[0]}`;
}

function getDayDiff(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function setBadge(diff) {
  if (diff === null) return '';
  if (diff < 0) return '<span class="badge badge-past">Geçti</span>';
  if (diff === 0) return '<span class="badge badge-today">Bugün</span>';
  if (diff <= 3) return `<span class="badge badge-soon">${diff} gün sonra</span>`;
  return `<span class="badge badge-past">${formatDate(new Date(Date.now() + diff*86400000).toISOString().split('T')[0])}</span>`;
}

// ==================== TABS ====================
function switchTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  const tabs = ['appointments','travel','lists','todo','habits','birthdays','notes'];
  document.querySelectorAll('.nav-item')[tabs.indexOf(name)].classList.add('active');
  if (name === 'appointments') renderAppointments();
  if (name === 'travel') renderTravel();
  if (name === 'lists') renderLists();
  if (name === 'todo') renderTodo();
  if (name === 'habits') renderHabits();
  if (name === 'birthdays') renderBirthdays();
  if (name === 'notes') renderNotes();
}

function toggleForm(id) {
  const f = document.getElementById(id);
  f.classList.toggle('open');
}

// ==================== MODAL ====================
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

// ==================== APPOINTMENTS ====================
function saveAppointment() {
  const title = document.getElementById('appt-title').value.trim();
  if (!title) return;
  const appts = getData('appts', []);
  appts.push({
    id: id(),
    title,
    date: document.getElementById('appt-date').value,
    time: document.getElementById('appt-time').value,
    note: document.getElementById('appt-note').value.trim(),
  });
  appts.sort((a,b) => (a.date + a.time) < (b.date + b.time) ? -1 : 1);
  DB.set('appts', appts);
  document.getElementById('appt-title').value = '';
  document.getElementById('appt-date').value = '';
  document.getElementById('appt-time').value = '';
  document.getElementById('appt-note').value = '';
  document.getElementById('appt-form').classList.remove('open');
  renderAppointments();
}

function deleteAppointment(aid) {
  const appts = getData('appts', []).filter(a => a.id !== aid);
  DB.set('appts', appts);
  renderAppointments();
}

function renderAppointments() {
  const appts = getData('appts', []);
  const el = document.getElementById('appt-list');
  if (!appts.length) {
    el.innerHTML = '<div class="empty">Henüz randevu yok</div>';
    return;
  }
  el.innerHTML = appts.map(a => {
    const diff = getDayDiff(a.date);
    const badge = diff !== null ? setBadge(diff) : '';
    const timeStr = a.time ? ` · ${a.time}` : '';
    return `<div class="card">
      ${badge}
      <div class="card-title">${esc(a.title)}</div>
      <div class="card-meta">${a.date ? formatDate(a.date) : ''}${timeStr}</div>
      ${a.note ? `<div class="card-note">${esc(a.note)}</div>` : ''}
      <div class="card-actions">
        <button class="btn-icon" onclick="deleteAppointment('${a.id}')">&#10005;</button>
      </div>
    </div>`;
  }).join('');
}

// ==================== TRAVEL ====================
function saveTravel() {
  const dest = document.getElementById('travel-dest').value.trim();
  if (!dest) return;
  const travels = getData('travels', []);
  travels.push({
    id: id(),
    dest,
    start: document.getElementById('travel-start').value,
    end: document.getElementById('travel-end').value,
    note: document.getElementById('travel-note').value.trim(),
    items: [],
  });
  DB.set('travels', travels);
  document.getElementById('travel-dest').value = '';
  document.getElementById('travel-start').value = '';
  document.getElementById('travel-end').value = '';
  document.getElementById('travel-note').value = '';
  closeModal('travel-modal');
  renderTravel();
}

function deleteTravel(tid) {
  DB.set('travels', getData('travels', []).filter(t => t.id !== tid));
  renderTravel();
}

function toggleTravelBody(tid) {
  const b = document.getElementById('tb-' + tid);
  const c = document.getElementById('tc-' + tid);
  b.classList.toggle('open');
  c.classList.toggle('open');
}

function addTravelItem(tid) {
  const inp = document.getElementById('ti-' + tid);
  const val = inp.value.trim();
  if (!val) return;
  const travels = getData('travels', []);
  const t = travels.find(x => x.id === tid);
  if (t) { t.items = t.items || []; t.items.push({ id: id(), text: val, done: false }); }
  DB.set('travels', travels);
  inp.value = '';
  renderTravel();
  // reopen
  setTimeout(() => {
    const b = document.getElementById('tb-' + tid);
    const c = document.getElementById('tc-' + tid);
    if (b) b.classList.add('open');
    if (c) c.classList.add('open');
  }, 10);
}

function toggleTravelItem(tid, iid) {
  const travels = getData('travels', []);
  const t = travels.find(x => x.id === tid);
  if (t) { const item = t.items.find(i => i.id === iid); if (item) item.done = !item.done; }
  DB.set('travels', travels);
  renderTravel();
  setTimeout(() => {
    const b = document.getElementById('tb-' + tid);
    const c = document.getElementById('tc-' + tid);
    if (b) b.classList.add('open');
    if (c) c.classList.add('open');
  }, 10);
}

function renderTravel() {
  const travels = getData('travels', []);
  const el = document.getElementById('travel-list');
  if (!travels.length) {
    el.innerHTML = '<div class="empty">Henüz destinasyon yok</div>';
    return;
  }
  el.innerHTML = travels.map(t => {
    const dateRange = [t.start && formatDate(t.start), t.end && formatDate(t.end)].filter(Boolean).join(' – ');
    const items = (t.items || []).map(i => `
      <div class="travel-item">
        <div class="list-check" onclick="toggleTravelItem('${t.id}','${i.id}')" style="${i.done ? 'background:var(--accent);border-color:var(--accent)' : ''}">
          ${i.done ? '<span class="list-check-mark" style="display:block">&#10003;</span>' : ''}
        </div>
        <span style="${i.done ? 'text-decoration:line-through;opacity:0.5' : ''}">${esc(i.text)}</span>
      </div>`).join('');
    return `<div class="travel-card">
      <div class="travel-header" onclick="toggleTravelBody('${t.id}')">
        <div>
          <div class="travel-dest">${esc(t.dest)}</div>
          <div class="travel-dates">${dateRange}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="btn-icon" onclick="event.stopPropagation();deleteTravel('${t.id}')">&#10005;</button>
          <span class="chevron" id="tc-${t.id}">&#9660;</span>
        </div>
      </div>
      <div class="travel-body" id="tb-${t.id}">
        ${t.note ? `<div class="travel-note">${esc(t.note)}</div>` : ''}
        <div class="travel-items">${items}</div>
        <div class="travel-add">
          <input type="text" id="ti-${t.id}" placeholder="Yapılacak, gezilecek yer..." onkeydown="if(event.key==='Enter')addTravelItem('${t.id}')">
          <button onclick="addTravelItem('${t.id}')">Ekle</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ==================== LISTS ====================
const DEFAULT_LISTS = ['Kitaplar', 'Filmler', 'Alışveriş', 'Gezilecek Yerler'];

function getListCategories() {
  return getData('listcats', DEFAULT_LISTS);
}

function getActiveCat() {
  return getData('activecat', getListCategories()[0]);
}

function renderLists() {
  const cats = getListCategories();
  const active = getActiveCat();
  const tabEl = document.getElementById('cat-tabs');
  tabEl.innerHTML = cats.map(c =>
    `<button class="cat-tab ${c === active ? 'active' : ''}" onclick="setCat('${esc(c)}')">${esc(c)}</button>`
  ).join('') + `<button class="cat-tab" onclick="openModal('newlist-modal')" style="border-style:dashed">+ Yeni</button>`;
  renderListItems(active);
}

function setCat(cat) {
  DB.set('activecat', cat);
  renderLists();
}

function saveNewList() {
  const name = document.getElementById('newlist-name').value.trim();
  if (!name) return;
  const cats = getListCategories();
  if (!cats.includes(name)) cats.push(name);
  DB.set('listcats', cats);
  DB.set('activecat', name);
  document.getElementById('newlist-name').value = '';
  closeModal('newlist-modal');
  renderLists();
}

function addListItem(cat) {
  const inp = document.getElementById('quick-input-' + safeid(cat));
  const val = inp.value.trim();
  if (!val) return;
  const key = 'list_' + cat;
  const items = getData(key, []);
  items.push({ id: id(), text: val, done: false });
  DB.set(key, items);
  inp.value = '';
  renderLists();
}

function toggleListItem(cat, iid) {
  const key = 'list_' + cat;
  const items = getData(key, []);
  const item = items.find(i => i.id === iid);
  if (item) item.done = !item.done;
  DB.set(key, items);
  renderLists();
}

function deleteListItem(cat, iid) {
  const key = 'list_' + cat;
  DB.set(key, getData(key, []).filter(i => i.id !== iid));
  renderLists();
}

function safeid(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

function renderListItems(cat) {
  const el = document.getElementById('list-content');
  const items = getData('list_' + cat, []);
  const done = items.filter(i => i.done);
  const undone = items.filter(i => !i.done);
  const renderItem = (i) => `
    <div class="list-item ${i.done ? 'done' : ''}">
      <div class="list-check" onclick="toggleListItem('${esc(cat)}','${i.id}')">
        <span class="list-check-mark">&#10003;</span>
      </div>
      <span class="item-text">${esc(i.text)}</span>
      <button class="item-del" onclick="deleteListItem('${esc(cat)}','${i.id}')">&#10005;</button>
    </div>`;
  el.innerHTML = `
    <div class="quick-add">
      <input type="text" id="quick-input-${safeid(cat)}" placeholder="${esc(cat)}'e ekle..." onkeydown="if(event.key==='Enter')addListItem('${esc(cat)}')">
      <button onclick="addListItem('${esc(cat)}')">Ekle</button>
    </div>
    ${undone.length ? undone.map(renderItem).join('') : '<div class="empty" style="padding:20px 0">Liste boş</div>'}
    ${done.length ? `<div class="divider"></div><div class="section-label">Tamamlananlar (${done.length})</div>${done.map(renderItem).join('')}` : ''}
  `;
}

// ==================== NOTES ====================
let currentNoteId = null;

function openNote(nid) {
  currentNoteId = nid;
  const notes = getData('notes', []);
  const note = nid ? notes.find(n => n.id === nid) : null;
  document.getElementById('note-title-input').value = note ? note.title : '';
  document.getElementById('note-body-input').value = note ? note.body : '';
  document.getElementById('note-editor').classList.add('open');
  if (!nid) currentNoteId = id();
}

function closeNote() {
  const title = document.getElementById('note-title-input').value.trim();
  const body = document.getElementById('note-body-input').value.trim();
  if (title || body) {
    const notes = getData('notes', []);
    const idx = notes.findIndex(n => n.id === currentNoteId);
    const entry = { id: currentNoteId, title: title || 'Başlıksız', body, updated: new Date().toISOString() };
    if (idx >= 0) notes[idx] = entry; else notes.unshift(entry);
    DB.set('notes', notes);
  }
  document.getElementById('note-editor').classList.remove('open');
  renderNotes();
}

function deleteCurrentNote() {
  if (!currentNoteId) return;
  DB.set('notes', getData('notes', []).filter(n => n.id !== currentNoteId));
  document.getElementById('note-editor').classList.remove('open');
  renderNotes();
}

function renderNotes() {
  const notes = getData('notes', []);
  const el = document.getElementById('notes-list');
  if (!notes.length) {
    el.innerHTML = '<div class="empty">Henüz not yok</div>';
    return;
  }
  el.innerHTML = notes.map(n => {
    const d = new Date(n.updated);
    const dateStr = `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
    return `<div class="note-card" onclick="openNote('${n.id}')">
      <div class="note-card-title">${esc(n.title)}</div>
      <div class="note-card-preview">${esc(n.body)}</div>
      <div class="note-card-date">${dateStr}</div>
    </div>`;
  }).join('');
}

// ==================== TO-DO ====================
function saveTodo() {
  const title = document.getElementById('todo-title').value.trim();
  if (!title) return;
  const todos = getData('todos', []);
  todos.push({
    id: id(),
    title,
    priority: document.getElementById('todo-priority').value,
    date: document.getElementById('todo-date').value,
    note: document.getElementById('todo-note').value.trim(),
    done: false,
    created: new Date().toISOString(),
  });
  DB.set('todos', todos);
  document.getElementById('todo-title').value = '';
  document.getElementById('todo-priority').value = 'normal';
  document.getElementById('todo-date').value = '';
  document.getElementById('todo-note').value = '';
  document.getElementById('todo-form').classList.remove('open');
  renderTodo();
}

function toggleTodo(tid) {
  const todos = getData('todos', []);
  const t = todos.find(x => x.id === tid);
  if (t) t.done = !t.done;
  DB.set('todos', todos);
  renderTodo();
}

function deleteTodo(tid) {
  DB.set('todos', getData('todos', []).filter(t => t.id !== tid));
  renderTodo();
}

function renderTodo() {
  const todos = getData('todos', []);
  const el = document.getElementById('todo-list');
  if (!todos.length) {
    el.innerHTML = '<div class="empty">Yapılacak bir şey yok</div>';
    return;
  }
  const priorityOrder = { high: 0, normal: 1, low: 2 };
  const undone = todos.filter(t => !t.done).sort((a,b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
  const done = todos.filter(t => t.done);

  const priorityLabel = { high: 'Yüksek', normal: 'Normal', low: 'Düşük' };
  const renderItem = (t) => {
    const diff = t.date ? getDayDiff(t.date) : null;
    let dateBadge = '';
    if (diff !== null) {
      if (diff < 0) dateBadge = `<span style="color:var(--accent2);font-size:12px;">Gecikti</span>`;
      else if (diff === 0) dateBadge = `<span style="color:var(--accent2);font-size:12px;">Bugün</span>`;
      else dateBadge = `<span style="color:var(--muted);font-size:12px;">${formatDate(t.date)}</span>`;
    }
    return `<div class="todo-item priority-${t.priority} ${t.done ? 'done' : ''}">
      <div class="list-check" onclick="toggleTodo('${t.id}')" style="${t.done ? 'background:var(--accent);border-color:var(--accent)' : ''}">
        <span class="list-check-mark" style="${t.done ? 'display:block' : ''}">&#10003;</span>
      </div>
      <div style="flex:1;min-width:0;">
        <div class="todo-text">${esc(t.title)}</div>
        <div class="todo-sub">${priorityLabel[t.priority]}${dateBadge ? ' · ' + dateBadge : ''}${t.note ? ' · ' + esc(t.note) : ''}</div>
      </div>
      <button class="todo-del" onclick="deleteTodo('${t.id}')">&#10005;</button>
    </div>`;
  };

  el.innerHTML =
    (undone.length ? undone.map(renderItem).join('') : '<div class="empty" style="padding:16px 0">Hepsi tamamlandı!</div>') +
    (done.length ? `<div class="divider"></div><div class="section-label">Tamamlananlar (${done.length})</div>${done.map(renderItem).join('')}` : '');
}

// ==================== HABITS ====================
function getWeekDays() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((today.getDay() + 6) % 7));
  const days = [];
  const labels = ['Pt','Sa','Ça','Pe','Cu','Ct','Pz'];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push({ date: d.toISOString().split('T')[0], label: labels[i], num: d.getDate(), isToday: d.toDateString() === today.toDateString() });
  }
  return days;
}

function saveHabit() {
  const name = document.getElementById('habit-name').value.trim();
  if (!name) return;
  const habits = getData('habits', []);
  habits.push({ id: id(), name, target: parseInt(document.getElementById('habit-target').value), checks: {} });
  DB.set('habits', habits);
  document.getElementById('habit-name').value = '';
  closeModal('habit-modal');
  renderHabits();
}

function toggleHabitDay(hid, dateStr) {
  const habits = getData('habits', []);
  const h = habits.find(x => x.id === hid);
  if (h) { h.checks = h.checks || {}; h.checks[dateStr] = !h.checks[dateStr]; }
  DB.set('habits', habits);
  renderHabits();
}

function deleteHabit(hid) {
  DB.set('habits', getData('habits', []).filter(h => h.id !== hid));
  renderHabits();
}

function renderHabits() {
  const habits = getData('habits', []);
  const el = document.getElementById('habits-list');
  const weekDays = getWeekDays();

  if (!habits.length) {
    el.innerHTML = '<div class="empty">Henüz alışkanlık yok</div>';
    return;
  }

  el.innerHTML = habits.map(h => {
    const checks = h.checks || {};
    const doneThisWeek = weekDays.filter(d => checks[d.date]).length;
    const pct = Math.round((doneThisWeek / h.target) * 100);

    const dayDots = weekDays.map(d => `
      <div class="habit-day ${checks[d.date] ? 'checked' : ''} ${d.isToday ? 'today' : ''}" onclick="toggleHabitDay('${h.id}','${d.date}')">
        <span class="habit-day-label">${d.label}</span>
        <span class="habit-day-num">${d.num}</span>
      </div>`).join('');

    return `<div class="habit-card">
      <div class="habit-header">
        <div>
          <div class="habit-name">${esc(h.name)}</div>
          <div class="habit-streak">${doneThisWeek}/${h.target} bu hafta</div>
        </div>
        <button class="habit-del" onclick="deleteHabit('${h.id}')">&#10005;</button>
      </div>
      <div class="habit-days">${dayDots}</div>
      <div class="habit-progress">
        <div class="habit-bar-bg"><div class="habit-bar-fill" style="width:${Math.min(pct,100)}%"></div></div>
        <span class="habit-target-text">%${Math.min(pct,100)}</span>
      </div>
    </div>`;
  }).join('');
}

// ==================== BIRTHDAYS ====================
const MONTHS_TR = ['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

function saveBirthday() {
  const name = document.getElementById('bday-name').value.trim();
  const day = parseInt(document.getElementById('bday-day').value);
  const month = parseInt(document.getElementById('bday-month').value);
  if (!name || !day || !month) return;
  const bdays = getData('birthdays', []);
  bdays.push({ id: id(), name, day, month, note: document.getElementById('bday-note').value.trim() });
  bdays.sort((a,b) => a.month !== b.month ? a.month - b.month : a.day - b.day);
  DB.set('birthdays', bdays);
  document.getElementById('bday-name').value = '';
  document.getElementById('bday-day').value = '';
  document.getElementById('bday-note').value = '';
  document.getElementById('bday-form').classList.remove('open');
  renderBirthdays();
}

function deleteBirthday(bid) {
  DB.set('birthdays', getData('birthdays', []).filter(b => b.id !== bid));
  renderBirthdays();
}

function getDaysUntilBirthday(month, day) {
  const today = new Date(); today.setHours(0,0,0,0);
  const thisYear = today.getFullYear();
  let next = new Date(thisYear, month - 1, day);
  if (next < today) next = new Date(thisYear + 1, month - 1, day);
  return Math.round((next - today) / 86400000);
}

function renderBirthdays() {
  const bdays = getData('birthdays', []);
  const el = document.getElementById('birthdays-list');
  if (!bdays.length) {
    el.innerHTML = '<div class="empty">Henüz doğum günü yok</div>';
    return;
  }
  // Sort by upcoming
  const sorted = [...bdays].sort((a,b) => getDaysUntilBirthday(a.month, a.day) - getDaysUntilBirthday(b.month, b.day));

  el.innerHTML = sorted.map(b => {
    const diff = getDaysUntilBirthday(b.month, b.day);
    let badge = '';
    if (diff === 0) badge = '<span class="badge badge-today">Bugün!</span>';
    else if (diff <= 7) badge = `<span class="badge badge-soon">${diff} gün kaldı</span>`;
    else badge = `<span class="badge badge-past">${diff} gün kaldı</span>`;
    const initial = b.name.charAt(0).toUpperCase();
    return `<div class="bday-card">
      <div class="bday-avatar">${initial}</div>
      <div style="flex:1;">
        <div class="bday-name">${esc(b.name)}</div>
        <div class="bday-date">${b.day} ${MONTHS_TR[b.month]}${b.note ? ' · ' + esc(b.note) : ''}</div>
        <div class="bday-badge">${badge}</div>
      </div>
      <button class="btn-icon" onclick="deleteBirthday('${b.id}')">&#10005;</button>
    </div>`;
  }).join('');
}


function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ==================== INIT ====================

  const now = new Date();
  const days = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const months = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  document.getElementById('headerDate').textContent =
    `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
  // set today as default date
  const today = now.toISOString().split('T')[0];
  document.getElementById('appt-date').value = today;
  renderAppointments();
}

init();
