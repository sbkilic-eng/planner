<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planner Pro</title>
<!-- PWA Meta Tags -->
<meta name="theme-color" content="#1E2228">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planner Pro">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%233A6EA8'/><stop offset='100%25' stop-color='%233E8A5C'/></linearGradient></defs><rect width='100' height='100' rx='24' fill='url(%23g)'/><rect x='21' y='16' width='14' height='68' rx='7' fill='white'/><path d='M35 22C58 18 78 28 78 38.5C78 49 58 59 35 55' fill='none' stroke='white' stroke-width='14' stroke-linecap='round'/><circle cx='77' cy='38.5' r='7.5' fill='%23E07B54'/></svg>">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ================= TEMALAR ================= */
  :root {
    --bg: #1E2228;
    --surface: #272C34;
    --border: #353B45;
    --text: #DFE4EC;
    --muted: #7E8899;
    --accent: #5C9E78;
    --accent-work: #5C8BB8;
    --accent-light: rgba(92, 158, 120, 0.15);
    --accent-work-light: rgba(92, 139, 184, 0.15);
    --accent2: #E07B54;
    --accent-warning: #D8A56D;
    --accent-danger: #D86D6D;
    --shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  [data-theme="light"] { --bg: #F5F5F7; --surface: #FFFFFF; --border: #E5E5E7; --text: #1D1D1F; --muted: #86868B; --shadow: 0 4px 15px rgba(0,0,0,0.05); }
  [data-theme="sepia"] { --bg: #F4ECD8; --surface: #FCF5E5; --border: #E6D8B8; --text: #433422; --muted: #8B7E66; --shadow: 0 4px 15px rgba(67,52,34,0.08); }
  [data-theme="midnight"] { --bg: #000000; --surface: #121212; --border: #1F1F1F; --text: #E1E1E1; --muted: #666666; --shadow: none; }

  /* ================= GENEL YAPI ================= */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
  .app-shell { display: flex; min-height: 100vh; min-height: 100dvh; width: 100%; position: relative; }

  /* ================= SIDEBAR ================= */
  .sidebar { width: 260px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; height: 100dvh; overflow: hidden; z-index: 100; transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
  .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .app-logo-img { height: 42px; width: 42px; border-radius: 12px; display: block; flex-shrink: 0; }
  .mobile-logo-img { display: none; height: 32px; width: 32px; border-radius: 9px; flex-shrink: 0; margin-left: 4px; }
  .logo-wrap { display: flex; align-items: center; gap: 10px; }
  .logo-wordmark { display: flex; flex-direction: column; line-height: 1; }
  .logo-wordmark-main { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.2px; }
  .logo-wordmark-sub { font-size: 10px; font-weight: 800; letter-spacing: 2.5px; color: var(--accent); text-transform: uppercase; margin-top: 1px; }
  .mobile-logo-wrap { display: none; align-items: center; gap: 8px; margin-left: 8px; }
  .mobile-close-btn { display: none; font-size: 24px; color: var(--muted); background: none; border: none; cursor: pointer; }
  .sidebar-scroll-area { flex: 1; overflow-y: auto; padding: 12px 0 20px; }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; background: var(--surface); flex-shrink: 0; }

  /* ================= NAV SUMMARY ITEM ================= */
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--muted); border: none; background: none; width: 100%; text-align: left; transition: all 0.2s; }
  .nav-item:hover { color: var(--text); background: rgba(126,136,153,0.05); }
  .nav-item.active { color: var(--text); font-weight: 700; border-right: 4px solid var(--accent); background: var(--accent-light); }
  .nav-item.active-work { border-right-color: var(--accent-work); background: var(--accent-work-light); }
  .nav-icon { font-size: 16px; opacity: 0.8; }

  /* ================= FAN MENU ================= */
  .fan-group { margin-bottom: 4px; }
  .fan-header {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px; margin: 0 8px;
    border-radius: 14px; cursor: pointer; border: none; background: none; width: calc(100% - 16px);
    text-align: left; transition: background 0.2s; position: relative;
  }
  .fan-header:hover { background: rgba(126,136,153,0.06); }
  .fan-header-icon {
    width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center;
    justify-content: center; font-size: 22px; flex-shrink: 0; transition: transform 0.3s;
    box-shadow: 0 3px 10px rgba(0,0,0,0.2);
  }
  .fan-header-icon.work { background: linear-gradient(135deg, #3A6EA8, #2E5A8E); }
  .fan-header-icon.personal { background: linear-gradient(135deg, #3E8A5C, #2E7048); }
  .fan-header-text { flex: 1; }
  .fan-header-title { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.3px; }
  .fan-header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .fan-arrow { font-size: 11px; color: var(--muted); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
  .fan-header.open .fan-arrow { transform: rotate(180deg); }
  .fan-header.open .fan-header-icon { transform: scale(0.92); }

  .fan-items {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; padding: 6px 12px 10px;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease, padding 0.3s ease;
  }
  .fan-items.open { max-height: 500px; opacity: 1; }

  .fan-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 10px 6px; border-radius: 14px; cursor: pointer;
    border: none; background: var(--bg); text-align: center;
    border: 1px solid var(--border);
    transition: transform 0.18s, background 0.18s, box-shadow 0.18s;
    transform: translateY(-8px) scale(0.94);
    opacity: 0;
    animation: none;
  }
  .fan-items.open .fan-item { animation: fanItemIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  .fan-items.open .fan-item:nth-child(1) { animation-delay: 0.02s; }
  .fan-items.open .fan-item:nth-child(2) { animation-delay: 0.06s; }
  .fan-items.open .fan-item:nth-child(3) { animation-delay: 0.10s; }
  .fan-items.open .fan-item:nth-child(4) { animation-delay: 0.14s; }
  .fan-items.open .fan-item:nth-child(5) { animation-delay: 0.18s; }
  .fan-items.open .fan-item:nth-child(6) { animation-delay: 0.22s; }
  .fan-items.open .fan-item:nth-child(7) { animation-delay: 0.26s; }
  @keyframes fanItemIn {
    from { transform: translateY(-10px) scale(0.92); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  .fan-item:hover { background: var(--surface); transform: scale(1.04); box-shadow: var(--shadow); }
  .fan-item:active { transform: scale(0.96); }
  .fan-item.active { background: var(--accent-light); border-color: var(--accent); }
  .fan-item.active-work { background: var(--accent-work-light); border-color: var(--accent-work); }
  .fan-item-icon { font-size: 22px; line-height: 1; }
  .fan-item-label { font-size: 10px; font-weight: 600; color: var(--muted); line-height: 1.2; }
  .fan-item.active .fan-item-label { color: var(--accent); }
  .fan-item.active-work .fan-item-label { color: var(--accent-work); }

  /* ================= ANA ALAN ================= */
  .main-area { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  header { padding: 20px 28px; display: flex; justify-content: space-between; align-items: center; background: var(--bg); position: sticky; top: 0; z-index: 90; gap: 12px; }
  .header-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .hamburger { display: none; font-size: 24px; color: var(--text); background: none; border: none; cursor: pointer; padding: 4px; flex-shrink: 0; }
  .app-date { font-size: 14px; color: var(--muted); font-weight: 500; margin-left: 4px; white-space: nowrap; }
  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .btn-header-icon { background: var(--surface); border: 1px solid var(--border); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 18px; flex-shrink: 0; }
  .btn-header-icon:hover { color: var(--text); border-color: var(--muted); }
  .btn-settings:hover { transform: rotate(45deg); }
  .notif-dot { width: 8px; height: 8px; background: var(--accent-danger); border-radius: 50%; position: absolute; top: 6px; right: 6px; display: none; animation: pulse 2s infinite; }
  .btn-header-icon { position: relative; }

  .content { padding: 0 28px 100px; max-width: 820px; }
  .section { display: none; animation: fadeIn 0.3s ease; } .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .section-main-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .context-badge { font-size: 11px; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }

  /* ================= ARAMA ================= */
  .search-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; backdrop-filter: blur(6px); padding: 80px 20px 20px; }
  .search-overlay.open { display: flex; flex-direction: column; animation: fadeIn 0.2s ease; }
  .search-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .search-input { flex: 1; background: none; border: none; font-size: 17px; font-family: inherit; color: var(--text); outline: none; }
  .search-input::placeholder { color: var(--muted); }
  .search-close { background: none; border: none; font-size: 20px; color: var(--muted); cursor: pointer; padding: 4px; }
  .search-results { flex: 1; overflow-y: auto; }
  .search-result-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: transform 0.15s; }
  .search-result-item:hover { transform: translateX(4px); border-color: var(--muted); }
  .search-result-icon { font-size: 22px; width: 40px; height: 40px; border-radius: 10px; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .search-result-meta { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .search-empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 16px; font-style: italic; }

  /* ================= MOBİL ================= */
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; backdrop-filter: blur(2px); }
  @media (max-width: 768px) {
    .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); width: 285px; box-shadow: var(--shadow); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .hamburger { display: block; }
    .mobile-logo-wrap { display: flex; }
    .mobile-close-btn { display: block; }
    header { padding: 14px 16px; }
    .app-date { display: none; }
    .content { padding: 0 16px 100px; }
  }

  /* ================= ORTAK BİLEŞENLER ================= */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 12px; position: relative; box-shadow: var(--shadow); }
  .card-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; padding-right: 60px; }
  .card-meta { font-size: 14px; color: var(--muted); }
  .card-note { font-size: 14px; color: var(--muted); margin-top: 8px; line-height: 1.5; white-space: pre-wrap; }
  .card-actions { position: absolute; top: 16px; right: 16px; display: flex; gap: 8px; }
  .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; margin-bottom: 8px; }
  .badge-past { background: var(--border); color: var(--muted); }
  .badge-safe { background: var(--accent-light); color: var(--accent); }
  .badge-warning { background: rgba(216,165,109,0.15); color: var(--accent-warning); }
  .badge-danger { background: rgba(216,109,109,0.15); color: var(--accent-danger); animation: pulse 2s infinite; }
  @keyframes pulse { 0%{opacity:1} 50%{opacity:0.7} 100%{opacity:1} }

  .btn-add { display: flex; align-items: center; gap: 8px; width: 100%; background: var(--surface); border: 1px dashed var(--border); border-radius: 12px; padding: 14px 18px; color: var(--muted); cursor: pointer; font-weight: 600; font-size: 15px; margin-bottom: 16px; transition: all 0.2s; }
  .btn-add:hover { border-color: var(--text); color: var(--text); }
  .btn-primary { background: var(--accent); color: #fff; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; font-family: inherit; transition: transform 0.1s; font-size: 14px; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; font-family: inherit; }
  .btn-icon { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; transition: color 0.2s; }
  .btn-icon:hover { color: var(--accent2); }

  .form-row { margin-bottom: 12px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  input, textarea, select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 15px; font-family: inherit; color: var(--text); outline: none; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 18px; font-style: italic; }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .section-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; margin-top: 8px; }

  /* ================= ETİKETLER ================= */
  .tag-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; letter-spacing: 0.3px; margin-right: 4px; }
  .tag-blue   { background: rgba(92,139,184,0.2); color: #5C8BB8; }
  .tag-green  { background: rgba(92,158,120,0.2); color: #5C9E78; }
  .tag-orange { background: rgba(224,123,84,0.2); color: #E07B54; }
  .tag-red    { background: rgba(216,109,109,0.2); color: #D86D6D; }
  .tag-purple { background: rgba(140,100,200,0.2); color: #9B6FD0; }
  .tag-yellow { background: rgba(216,165,109,0.2); color: #D8A56D; }
  .tag-filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .tag-filter-btn { font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .tag-filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .tag-color-row { display: flex; gap: 8px; margin-top: 6px; }
  .tag-color-swatch { width: 28px; height: 28px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s; }
  .tag-color-swatch:hover { transform: scale(1.1); }
  .tag-color-swatch.selected { border-color: var(--text); transform: scale(1.1); }

  /* ================= FAB ================= */
  .fab-container { position: fixed; bottom: 28px; right: 28px; z-index: 200; display: flex; flex-direction: column-reverse; align-items: flex-end; gap: 10px; }
  .fab { width: 58px; height: 58px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; color: white; font-size: 26px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 24px rgba(92,158,120,0.45); transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), background 0.2s; }
  .fab:hover { transform: scale(1.08); }
  .fab.open { transform: rotate(45deg); background: var(--accent2); box-shadow: 0 6px 24px rgba(224,123,84,0.45); }
  .fab-menu { display: flex; flex-direction: column-reverse; gap: 10px; overflow: hidden; }
  .fab-option { display: flex; align-items: center; gap: 10px; opacity: 0; transform: translateY(10px) scale(0.9); transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
  .fab-option.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  .fab-option:nth-child(1) { transition-delay: 0.00s; }
  .fab-option:nth-child(2) { transition-delay: 0.04s; }
  .fab-option:nth-child(3) { transition-delay: 0.08s; }
  .fab-option-label { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; box-shadow: var(--shadow); }
  .fab-option-btn { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: var(--shadow); flex-shrink: 0; }

  /* ================= BİLDİRİM ÇUBUĞU ================= */
  .notif-bar { background: linear-gradient(90deg, rgba(92,139,184,0.15), rgba(92,158,120,0.15)); border-bottom: 1px solid var(--border); padding: 10px 20px; display: none; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; font-size: 13px; }
  .notif-bar.visible { display: flex; animation: fadeIn 0.3s ease; }
  .notif-bar-text { color: var(--text); font-weight: 500; }
  .notif-bar-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .notif-bar-btn { font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 8px; cursor: pointer; border: none; font-family: inherit; }
  .notif-bar-allow { background: var(--accent); color: white; }
  .notif-bar-dismiss { background: var(--border); color: var(--muted); }

  /* ================= MODÜL SPESİFİK ================= */
  .summary-item { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; cursor: pointer; box-shadow: var(--shadow); transition: transform 0.2s; border-left: 4px solid var(--border); }
  .summary-item:hover { transform: translateX(6px); border-color: var(--muted); }
  .summary-item.ctx-work { border-left-color: #5C8BB8; }
  .summary-item.ctx-pers { border-left-color: #5C9E78; }
  .summary-item.ctx-past { opacity: 0.55; border-left-color: var(--border); }
  .sum-icon { font-size: 22px; width: 44px; height: 44px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); flex-shrink: 0; }
  .sum-icon.ctx-work { background: rgba(92,139,184,0.18); border-color: rgba(92,139,184,0.35); }
  .sum-icon.ctx-pers { background: rgba(92,158,120,0.18); border-color: rgba(92,158,120,0.35); }
  .sum-past-toggle { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; border-radius: 12px; border: 1px dashed var(--border); background: none; width: 100%; color: var(--muted); font-size: 13px; font-weight: 700; font-family: inherit; transition: background 0.2s; margin-top: 8px; }
  .sum-past-toggle:hover { background: var(--surface); }
  .sum-past-list { overflow: hidden; max-height: 0; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1); }
  .sum-past-list.open { max-height: 2000px; }
  .todo-item { display: flex; align-items: flex-start; gap: 12px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; transition: opacity 0.2s; border-left: 4px solid var(--border); box-shadow: var(--shadow); }
  .todo-item.priority-high { border-left-color: var(--accent-danger); }
  .todo-item.done { opacity: 0.4; } .todo-item.done .todo-text { text-decoration: line-through; }
  .list-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .list-check.checked { background: var(--accent); border-color: var(--accent); }
  .acc-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .acc-body { display: none; padding-top: 14px; margin-top: 14px; border-top: 1px solid var(--border); }

<script>
// ==================== DİL & ÇEVİRİ ====================
const translations = {
  tr: {
    nav_summary:"Özet", nav_work:"İş Dünyası", nav_work_cal:"Toplantı & Takvim", nav_work_todo:"İş Görevleri", nav_work_travel:"İş Seyahati", nav_work_notes:"Şirket Notları",
    nav_personal:"Kişisel Yaşam", nav_pers_cal:"Randevular", nav_pers_todo:"Görevler", nav_pers_habits:"Gelişim & Rutin", nav_pers_lists:"Hedef & Listeler", nav_pers_travel:"Seyahat", nav_pers_bday:"Doğum Günleri", nav_pers_notes:"Kişisel Notlar",
    settings:"Ayarlar", theme:"Görünüm Teması", language:"Dil / Language", export:"Yedekle (TXT)", import:"Veri Yükle", add_new:"Yeni Ekle", title:"Başlık", date:"Tarih", time:"Saat", empty:"Şu an planlanmış bir şey yok."
  },
  en: {
    nav_summary:"Overview", nav_work:"Business", nav_work_cal:"Meetings", nav_work_todo:"Work Tasks", nav_work_travel:"Business Trip", nav_work_notes:"Work Notes",
    nav_personal:"Personal", nav_pers_cal:"Appointments", nav_pers_todo:"Tasks", nav_pers_habits:"Habits", nav_pers_lists:"Goals & Lists", nav_pers_travel:"Travel", nav_pers_bday:"Birthdays", nav_pers_notes:"Notes",
    settings:"Settings", theme:"Theme", language:"Language", export:"Export (TXT)", import:"Import", add_new:"Add New", title:"Title", date:"Date", time:"Time", empty:"Nothing here yet."
  }
};
const MONTHS_TR = ['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

// ==================== GLOBAL STATE ====================
let currentLang = localStorage.getItem('planner_lang') || 'tr';
let currentTheme = localStorage.getItem('planner_theme') || 'dark';
let currentModule = 'summary';
let currentContext = '';
let currentEditId = null;
let selectedTagColor = 'blue';
let activeTagFilter = '';
let fabOpen = false;

const DB = {
  get: (k, def) => { try { return JSON.parse(localStorage.getItem('planner_' + k)) || def; } catch(e) { return def; } },
  set: (k, v) => localStorage.setItem('planner_' + k, JSON.stringify(v)),
};

function id() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(d) { if(!d) return ''; const p=d.split('-'); return `${p[2]}.${p[1]}.${p[0]}`; }

// ==================== MODALS & SIDEBAR ====================
function openModal(mid) { document.getElementById(mid).classList.add('open'); }
function closeModal(mid) { document.getElementById(mid).classList.remove('open'); currentEditId=null; }
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', function(e) { if(e.target===this) closeModal(this.id); }));

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

// ==================== FAN MENU ====================
let fanState = { work: false, pers: false };

function toggleFanGroup(group) {
  const wasOpen = fanState[group];
  // Close all
  Object.keys(fanState).forEach(g => {
    fanState[g] = false;
    document.getElementById('fan-'+g).classList.remove('open');
    document.getElementById('fan-items-'+g).classList.remove('open');
  });
  // Open clicked if was closed
  if (!wasOpen) {
    fanState[group] = true;
    const header = document.getElementById('fan-'+group);
    const items = document.getElementById('fan-items-'+group);
    header.classList.add('open');
    items.classList.add('open');
  }
}

function updateFanActiveState(mod, ctx) {
  document.querySelectorAll('.fan-item').forEach(el => el.classList.remove('active','active-work'));
  if (mod !== 'summary' && ctx) {
    const el = document.getElementById(`fani-${ctx}-${mod}`);
    if (el) { el.classList.add(ctx === 'work' ? 'active-work' : 'active'); }
    // Auto-open the fan group
    const group = ctx;
    if (!fanState[group]) {
      fanState[group] = true;
      document.getElementById('fan-'+group).classList.add('open');
      document.getElementById('fan-items-'+group).classList.add('open');
    }
  }
  // Summary nav
  const sumNav = document.getElementById('nav-summary');
  sumNav.classList.toggle('active', mod === 'summary');
}

// ==================== THEME & LANG ====================
function setTheme(t) { currentTheme=t; document.body.setAttribute('data-theme',t); localStorage.setItem('planner_theme',t); document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active')); document.getElementById('t-'+t).classList.add('active'); updateThemeColors(); }
function setLang(l) { currentLang=l; localStorage.setItem('planner_lang',l); applyTranslations(); updateHeaderDate(); switchModule(currentModule,currentContext); }
function applyTranslations() { document.querySelectorAll('[data-i18n]').forEach(el => { const k=el.getAttribute('data-i18n'); el.innerText=translations[currentLang][k]||k; }); document.getElementById('lang-select').value=currentLang; }
function updateHeaderDate() { const n=new Date(); const d={tr:['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'],en:['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']}; const m={tr:['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'],en:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']}; document.getElementById('headerDate').textContent=`${d[currentLang][n.getDay()]}, ${n.getDate()} ${m[currentLang][n.getMonth()]}`; }

// ==================== CORE NAVIGATION ====================
function updateThemeColors() {
  const root = document.querySelector(':root');
  if(currentContext === 'work') {
    root.style.setProperty('--accent','#5C8BB8');
    root.style.setProperty('--accent-light','rgba(92,139,184,0.15)');
  } else {
    root.style.setProperty('--accent','#5C9E78');
    root.style.setProperty('--accent-light','rgba(92,158,120,0.15)');
  }
}

function switchModule(mod, ctx='') {
  currentModule=mod; currentContext=ctx;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+mod).classList.add('active');
  if(window.innerWidth<=768) { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

  updateFanActiveState(mod, ctx);
  updateThemeColors();

  const header=document.getElementById('module-header');
  if(mod==='summary') { header.style.display='none'; renderSummary(); return; }

  header.style.display='flex';
  const fanItem = ctx ? document.getElementById(`fani-${ctx}-${mod}`) : null;
  document.getElementById('module-title').innerText = fanItem ? fanItem.querySelector('.fan-item-label').innerText : mod;
  const badge=document.getElementById('module-badge');
  badge.innerText=ctx==='work'?(currentLang==='tr'?'İŞ':'WORK'):(currentLang==='tr'?'KİŞİSEL':'PERSONAL');
  badge.className='context-badge '+(ctx==='work'?'tag-work':'tag-personal');

  activeTagFilter = '';
  if(mod==='appointments') renderAppts();
  if(mod==='todos') { renderTodoTagFilter(); renderTodos(); }
  if(mod==='travels') renderTravels();
  if(mod==='notes') renderNotes();
  if(mod==='habits') renderHabits();
  if(mod==='birthdays') renderBdays();
  if(mod==='lists') { renderGoal(); renderLists(); }
}

// ==================== FAB ====================
function toggleFAB() {
  fabOpen = !fabOpen;
  document.getElementById('fab-main').classList.toggle('open', fabOpen);
  document.querySelectorAll('.fab-option').forEach((el,i) => {
    setTimeout(() => el.classList.toggle('visible', fabOpen), fabOpen ? i*40 : (2-i)*40);
  });
}
function fabAction(type) {
  toggleFAB();
  setTimeout(() => {
    if(type==='appt') { openApptForm(); }
    else if(type==='todo') { openTodoForm(); }
    else if(type==='note') { openNoteEditor(); }
  }, 200);
}
document.addEventListener('click', function(e) {
  if(fabOpen && !e.target.closest('.fab-container')) toggleFAB();
});

// ==================== ARAMA ====================
function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(() => document.getElementById('search-input').focus(), 100);
}
function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
}
document.getElementById('search-overlay').addEventListener('click', function(e) { if(e.target===this) closeSearch(); });

function performSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const el = document.getElementById('search-results');
  if(q.length < 2) { el.innerHTML = '<div class="search-empty">En az 2 karakter girin...</div>'; return; }

  const results = [];
  const push = (items, icon, ctx, mod, getTitle, getSub) => {
    (items||[]).forEach(i => {
      const t = getTitle(i); const s = getSub(i);
      if((t+' '+s).toLowerCase().includes(q)) results.push({icon, ctx, mod, title:t, sub:s});
    });
  };
  push(DB.get('work_appts',[]),'🗓️','work','appointments',i=>i.title,i=>formatDate(i.date)+(i.time?' '+i.time:''));
  push(DB.get('pers_appts',[]),'📍','pers','appointments',i=>i.title,i=>formatDate(i.date));
  push(DB.get('work_todos',[]),'💼','work','todos',i=>i.title,i=>i.note||'');
  push(DB.get('pers_todos',[]),'✅','pers','todos',i=>i.title,i=>i.note||'');
  push(DB.get('work_travels',[]),'✈️','work','travels',i=>i.dest,i=>formatDate(i.start));
  push(DB.get('pers_travels',[]),'🎒','pers','travels',i=>i.dest,i=>formatDate(i.start));
  push(DB.get('pers_birthdays',[]),'🎂','pers','birthdays',i=>i.name,i=>`${i.day} ${MONTHS_TR[i.month]}`);
  push(DB.get('pers_habits',[]),'⚡','pers','habits',i=>i.n,i=>'');

  // Search notes
  ['work_notes','pers_notes'].forEach(key => {
    const ctx = key.includes('work')?'work':'pers';
    (DB.get(key,[])||[]).forEach(n => {
      if((n.title+' '+n.body).toLowerCase().includes(q))
        results.push({icon:'✍️', ctx, mod:'notes', title:n.title, sub:n.body.slice(0,60)});
    });
  });

  if(!results.length) { el.innerHTML='<div class="search-empty">Sonuç bulunamadı.</div>'; return; }

  el.innerHTML = results.slice(0,12).map(r => `
    <div class="search-result-item" onclick="closeSearch();switchModule('${r.mod}','${r.ctx}')">
      <div class="search-result-icon">${r.icon}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:15px;">${esc(r.title)}</div>
        <div class="search-result-meta">${r.sub}</div>
      </div>
    </div>
  `).join('');
}

// ==================== BİLDİRİMLER ====================
function initNotifications() {
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default' && !localStorage.getItem('planner_notif_dismissed')) {
    document.getElementById('notif-bar').classList.add('visible');
  }
  if(Notification.permission === 'granted') {
    checkAndNotify();
    updateNotifSettingsBtn();
  }
}

function allowNotifications() {
  if(!('Notification' in window)) return;
  Notification.requestPermission().then(p => {
    document.getElementById('notif-bar').classList.remove('visible');
    if(p === 'granted') { checkAndNotify(); updateNotifSettingsBtn(); }
  });
}

function dismissNotifBar() {
  document.getElementById('notif-bar').classList.remove('visible');
  localStorage.setItem('planner_notif_dismissed', '1');
}

function updateNotifSettingsBtn() {
  const btn = document.getElementById('notif-settings-btn');
  if(!btn) return;
  if(Notification.permission === 'granted') btn.textContent = '✅ Bildirimler Açık';
  else if(Notification.permission === 'denied') btn.textContent = '🚫 Bildirimler Engellendi (Tarayıcı ayarından aç)';
}

function checkAndNotify() {
  if(Notification.permission !== 'granted') return;
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const tomorrowStr = new Date(now.getTime()+86400000).toISOString().split('T')[0];
  const notified = DB.get('notif_sent', {});

  const tryNotify = (key, title, body) => {
    if(notified[key]) return;
    notified[key] = true;
    DB.set('notif_sent', notified);
    new Notification('Planner Pro — ' + title, { body, icon: 'logo.svg', badge: 'logo.svg' });
  };

  // Appointments
  [...DB.get('work_appts',[]), ...DB.get('pers_appts',[])].forEach(a => {
    if(a.date === todayStr) tryNotify('appt_'+a.id+'_today', 'Bugün!', `${a.title} — ${a.time||'Tüm gün'}`);
    if(a.date === tomorrowStr) tryNotify('appt_'+a.id+'_tmr', 'Yarın', `${a.title} yarın`);
  });

  // Birthdays
  const ty = now.getFullYear();
  DB.get('pers_birthdays',[]).forEach(b => {
    const bStr = `${ty}-${String(b.month).padStart(2,'0')}-${String(b.day).padStart(2,'0')}`;
    if(bStr === todayStr) tryNotify('bday_'+b.id+'_'+ty, '🎂 Doğum Günü!', `${b.name} bugün doğum günü!`);
    if(bStr === tomorrowStr) tryNotify('bday_'+b.id+'_tmr_'+ty, '🎂 Yarın Doğum Günü', `${b.name} yarın doğum günü!`);
  });

  // Due todos
  [...DB.get('work_todos',[]), ...DB.get('pers_todos',[])].filter(t=>!t.done&&t.date).forEach(t => {
    if(t.date === todayStr) tryNotify('todo_'+t.id+'_today', 'Bugün Son Gün!', t.title);
  });

  // Clear old keys daily
  if(!notified['_date'] || notified['_date'] !== todayStr) {
    DB.set('notif_sent', { _date: todayStr });
  }
}

// ==================== ETİKETLER ====================
function selectTagColor(color, el) {
  selectedTagColor = color;
  document.querySelectorAll('.tag-color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

function tagPill(tag, color) {
  if(!tag) return '';
  return `<span class="tag-pill tag-${color||'blue'}">#${esc(tag)}</span>`;
}

function renderTodoTagFilter() {
  const arr = DB.get(getTodoKey(), []);
  const tags = [...new Set(arr.filter(t=>t.tag).map(t=>t.tag+':'+t.tagColor))];
  const el = document.getElementById('todo-tag-filter');
  if(!tags.length) { el.innerHTML=''; return; }
  el.innerHTML = `<button class="tag-filter-btn ${activeTagFilter===''?'active':''}" onclick="setTagFilter('')">Tümü</button>` +
    tags.map(tc => {
      const [tag,color] = tc.split(':');

    }).join('');
}

// ==================== TIME & EXPORT UTILS ====================
function getCountdown(dateStr, timeStr) {
  if(!dateStr) return null;
  const t=new Date(dateStr+(timeStr?'T'+timeStr:'T23:59:59')); const ms=t-new Date();
  if(ms<0) return { t:currentLang==='tr'?'Geçti':'Passed', c:'badge-past' };
  const d=Math.floor(ms/86400000); const h=Math.floor((ms%86400000)/3600000);
  if(d>0) return { t:`${d} ${currentLang==='tr'?'gün':'days'}`, c:d>7?'badge-safe':'badge-warning' };
  if(h>0) return { t:`${h} ${currentLang==='tr'?'saat':'hrs'}`, c:'badge-danger' };
  return { t:`${Math.floor((ms%3600000)/60000)} ${currentLang==='tr'?'dk':'mins'}`, c:'badge-danger' };
}
function downloadICS(title, dStr, tStr, note, endStr=null) {
  if(!dStr) return;
  const fmt=d=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const fmtAll=d=>d.toISOString().split('T')[0].replace(/-/g,'');
  let ics=`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:${title}\nDESCRIPTION:${note||''}\n`;
  if(endStr&&!tStr){ const s=new Date(dStr); const e=new Date(endStr); if(e>=s){e.setDate(e.getDate()+1);ics+=`DTSTART;VALUE=DATE:${fmtAll(s)}\nDTEND;VALUE=DATE:${fmtAll(e)}\n`;}else{ics+=`DTSTART;VALUE=DATE:${fmtAll(s)}\nDTEND;VALUE=DATE:${fmtAll(s)}\n`;} }
  else { const s=new Date(dStr+(tStr?'T'+tStr:'T00:00')); let e=new Date(s.getTime()+(tStr?3600000:86400000)); ics+=`DTSTART:${fmt(s)}\nDTEND:${fmt(e)}\n`; }
  ics+=`END:VEVENT\nEND:VCALENDAR`;
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${title.replace(/ /g,'_')}.ics`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
function exportData() { const d={}; for(let i=0;i<localStorage.length;i++){let k=localStorage.key(i);if(k.startsWith('planner_'))d[k]=localStorage.getItem(k);} const blob=new Blob([JSON.stringify(d,null,2)],{type:'text/plain;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`planner_yedek_${new Date().toISOString().split('T')[0]}.txt`; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
function importData(e) { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{try{const d=JSON.parse(ev.target.result);Object.keys(d).forEach(k=>{if(k.startsWith('planner_'))localStorage.setItem(k,d[k]);});location.reload();}catch(err){alert("Format error");}};r.readAsText(f); }

let pastOpen = false;

function togglePastSection() {
  pastOpen = !pastOpen;
  const list = document.getElementById('sum-past-list');
  const arrow = document.getElementById('sum-past-arrow');
  const count = document.getElementById('sum-past-count');
  list.classList.toggle('open', pastOpen);
  arrow.style.transform = pastOpen ? 'rotate(180deg)' : '';
}

function renderSummary() {
  const el = document.getElementById('summary-list');
  const now = new Date();
  const tMs = new Date(now.setHours(0,0,0,0)).getTime();
  const nowMs = Date.now();

  let active = [], past = [];

  const pushEv = (key, icon, extractFn) => {
    DB.get(key,[]).forEach(i => {
      const e = extractFn(i);
      if (!e) return;
      const isPast = e.tObj.getTime() < nowMs;
      const ev = { ...e, icon, ctx: key.includes('work') ? 'work' : 'pers', mod: key.split('_')[1] };
      if (isPast) past.push(ev);
      else active.push(ev);
    });
  };

  pushEv('work_appts',  '🗓️', i => i.date ? { t: new Date(i.date+'T00:00').getTime(), tObj: new Date(i.date+(i.time?'T'+i.time:'T23:59:59')), title: i.title, sub: formatDate(i.date)+(i.time?' '+i.time:'') } : null);
  pushEv('pers_appts',  '📍', i => i.date ? { t: new Date(i.date+'T00:00').getTime(), tObj: new Date(i.date+(i.time?'T'+i.time:'T23:59:59')), title: i.title, sub: formatDate(i.date)+(i.time?' '+i.time:'') } : null);
  pushEv('work_travels','✈️', i => i.start ? { t: new Date(i.start+'T00:00').getTime(), tObj: new Date(i.start+'T23:59:59'), title: i.dest, sub: formatDate(i.start) } : null);
  pushEv('pers_travels','🎒', i => i.start ? { t: new Date(i.start+'T00:00').getTime(), tObj: new Date(i.start+'T23:59:59'), title: i.dest, sub: formatDate(i.start) } : null);
  pushEv('work_todos',  '💼', i => (i.date&&!i.done) ? { t: new Date(i.date+'T00:00').getTime(), tObj: new Date(i.date+'T23:59:59'), title: i.title, sub: formatDate(i.date) } : null);
  pushEv('pers_todos',  '✅', i => (i.date&&!i.done) ? { t: new Date(i.date+'T00:00').getTime(), tObj: new Date(i.date+'T23:59:59'), title: i.title, sub: formatDate(i.date) } : null);

  // Doğum günleri — her zaman aktif (gelecek tarihli)
  const ty = new Date().getFullYear();
  DB.get('pers_birthdays',[]).forEach(b => {
    let n = new Date(ty, b.month-1, b.day);
    if (n.getTime() < tMs) n = new Date(ty+1, b.month-1, b.day);
    active.push({ t: n.getTime(), tObj: new Date(n.getFullYear(), b.month-1, b.day, 23, 59, 59), title: b.name, sub: `${b.day} ${MONTHS_TR[b.month]}`, icon: '🎂', ctx: 'pers', mod: 'birthdays' });
  });

  active.sort((a,b) => a.t - b.t);
  past.sort((a,b) => b.t - a.t); // Geçmişi ters sıra (en yakın geçmiş önce)

  const cardHTML = (e, isPast=false) => {
    const dStr = e.tObj.toISOString().split('T')[0];
    const tStr = e.tObj.toISOString().split('T')[1].substring(0,5);
    const cd   = getCountdown(dStr, tStr==='23:59'?null:tStr);
    const ctxClass = isPast ? 'ctx-past' : `ctx-${e.ctx}`;
    const iconClass = isPast ? '' : `ctx-${e.ctx}`;
    return `
      <div class="summary-item ${ctxClass}" onclick="switchModule('${e.mod}','${e.ctx}')">
        <div class="sum-icon ${iconClass}">${e.icon}</div>
        <div style="flex:1;min-width:0;">
          <div class="card-title" style="font-size:15px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(e.title)}</div>
          <div class="card-meta" style="font-size:12px;margin-top:2px;">${e.sub}</div>
        </div>
        ${cd ? `<span class="badge ${cd.c}" style="margin:0;flex-shrink:0;">${cd.t}</span>` : ''}
      </div>`;
  };

  let html = '';

  if (!active.length && !past.length) {
    html = `<div class="empty">${translations[currentLang].empty}</div>`;
  } else {
    html = active.map(e => cardHTML(e, false)).join('');

    if (past.length) {
      html += `
        <button class="sum-past-toggle" onclick="togglePastSection()">
          <span style="flex:1;text-align:left;">🗂️ Geçmiş Kayıtlar</span>
          <span id="sum-past-count" style="background:var(--border);padding:2px 8px;border-radius:6px;font-size:11px;">${past.length}</span>
          <span id="sum-past-arrow" style="font-size:11px;transition:transform 0.3s;">▼</span>
        </button>
        <div class="sum-past-list ${pastOpen?'open':''}" id="sum-past-list">
          <div style="padding-top:8px;">
            ${past.map(e => cardHTML(e, true)).join('')}
          </div>
        </div>`;
    }
  }

  el.innerHTML = html;
}

function addGoal(){ const v=parseInt(document.getElementById('goal-val').value); if(!v||v<=0)return; const g=DB.get('pers_goal',null); if(g){g.cr+=v;DB.set('pers_goal',g);renderGoal();} }
function editGoal(){ const g=DB.get('pers_goal',{t:'Hedef',cr:0,tg:0}); const t=prompt("Başlık / Title:",g.t); if(t===null)return; const tg=prompt("Hedef / Target:",g.tg); if(tg===null)return; const c=prompt("Mevcut / Current:",g.cr); if(c===null)return; DB.set('pers_goal',{t:t,tg:parseInt(tg)||0,cr:parseInt(c)||0}); renderGoal(); }

function getCatKeys() { return DB.get('pers_listcats',['Alışveriş','İzlenecekler','Kitaplar']); }
function getActiveCat() { return DB.get('pers_activecat',getCatKeys()[0]); }
function safe(s) { return s.replace(/[^a-zA-Z0-9]/g,'_'); }
function renderLists() { const cats=getCatKeys(); const ac=getActiveCat(); document.getElementById('cat-tabs').innerHTML=cats.map(c=>`<button class="badge" style="cursor:pointer;font-size:13px;padding:8px 16px;margin:0;flex-shrink:0;${c===ac?'background:var(--accent);color:#fff;':'background:var(--surface);color:var(--muted);border:1px solid var(--border)'}" onclick="DB.set('pers_activecat','${esc(c)}');renderLists()">${esc(c)}</button>`).join('')+`<button class="badge" style="cursor:pointer;font-size:13px;padding:8px 16px;margin:0;background:transparent;border:1px dashed var(--border);color:var(--text);flex-shrink:0;" onclick="openModal('modal-newlist')">+ Yeni</button>`; renderListItems(ac); }
function saveNewListCat(){ const n=document.getElementById('m-newlist-name').value.trim(); if(!n)return; const c=getCatKeys(); if(!c.includes(n))c.push(n); DB.set('pers_listcats',c); DB.set('pers_activecat',n); closeModal('modal-newlist'); renderLists(); }
function addLItem(cat){ const v=document.getElementById('li-'+safe(cat)).value.trim(); if(!v)return; const arr=DB.get('pers_list_'+cat,[]); arr.push({id:id(),t:v,d:false,p:'',n:''}); DB.set('pers_list_'+cat,arr); renderLists(); }
function togLItem(cat,id){ const arr=DB.get('pers_list_'+cat,[]); const o=arr.find(x=>x.id===id); if(o){o.d=!o.d;DB.set('pers_list_'+cat,arr);renderLists();} }
function delLItem(cat,id){ DB.set('pers_list_'+cat,DB.get('pers_list_'+cat,[]).filter(x=>x.id!==id)); renderLists(); }
function updLItem(cat,id){ const arr=DB.get('pers_list_'+cat,[]); const o=arr.find(x=>x.id===id); if(o){o.p=document.getElementById('lp-'+id).value.trim();o.n=document.getElementById('ln-'+id).value.trim();DB.set('pers_list_'+cat,arr);} }
function togLBody(id){ document.getElementById('lb-'+id).classList.toggle('open'); document.getElementById('lc-'+id).classList.toggle('open'); }
function renderListItems(cat) { const el=document.getElementById('list-content'); const arr=DB.get('pers_list_'+cat,[]);
  const r=(i)=>`<div class="card" style="padding:12px 16px;margin-bottom:8px;${i.d?'opacity:0.5;box-shadow:none;':''}"><div class="acc-header" onclick="togLBody('${i.id}')"><div class="list-check ${i.d?'checked':''}" style="width:20px;height:20px;" onclick="event.stopPropagation();togLItem('${esc(cat)}','${i.id}')">${i.d?'✓':''}</div><div style="flex:1;font-weight:600;font-size:15px;margin-left:12px;${i.d?'text-decoration:line-through':''}">${esc(i.t)}</div>${i.p&&!i.d?`<span style="font-size:11px;background:var(--bg);padding:2px 6px;border-radius:4px;border:1px solid var(--border);margin-right:10px;color:var(--muted)">${esc(i.p)}</span>`:''}<span class="chevron" id="lc-${i.id}">▼</span></div><div class="acc-body" id="lb-${i.id}"><input type="text" id="lp-${i.id}" value="${esc(i.p)}" placeholder="${currentLang==='tr'?'İlerleme (Örn: Sayfa 4)':'Progress'}" onchange="updLItem('${esc(cat)}','${i.id}')" style="padding:8px;font-size:13px;margin-bottom:8px;"><textarea id="ln-${i.id}" placeholder="${currentLang==='tr'?'Link veya Not':'Note or Link'}" onchange="updLItem('${esc(cat)}','${i.id}')" style="padding:8px;font-size:13px;min-height:50px;margin-bottom:8px;">${esc(i.n)}</textarea><div style="text-align:right"><button class="btn-icon" style="color:var(--accent-danger)" onclick="delLItem('${esc(cat)}','${i.id}')">Sil</button></div></div></div>`;
  const un=arr.filter(i=>!i.d); const dn=arr.filter(i=>i.d);
  el.innerHTML=`<div style="display:flex;gap:8px;margin-bottom:16px;"><input type="text" id="li-${safe(cat)}" placeholder="${esc(cat)}..." onkeydown="if(event.key==='Enter')addLItem('${esc(cat)}')"><button class="btn-primary" onclick="addLItem('${esc(cat)}')">+</button></div>${un.length?un.map(r).join(''):'<div class="empty">Liste boş.</div>'}${dn.length?`<div class="divider"></div><div class="section-label">Tamamlananlar</div>${dn.map(r).join('')}`:''}`;
}

function saveBday() { const n=document.getElementById('m-bday-name').value.trim(); const m=parseInt(document.getElementById('m-bday-month').value); const d=parseInt(document.getElementById('m-bday-day').value); if(!n||!m||!d)return; const arr=DB.get('pers_birthdays',[]); arr.push({id:id(),name:n,month:m,day:d,note:document.getElementById('m-bday-note').value.trim(),items:[]}); DB.set('pers_birthdays',arr); closeModal('modal-bday'); renderBdays(); checkAndNotify(); }
function delBday(id) { if(confirm("Silinsin mi?")){DB.set('pers_birthdays',DB.get('pers_birthdays',[]).filter(x=>x.id!==id));renderBdays();} }
function getBdayCD(m,d) { const t=new Date(); const ty=t.getFullYear(); let n=new Date(ty,m-1,d,23,59,59); if(n<t)n=new Date(ty+1,m-1,d,23,59,59); const ms=n-t; const diff=Math.floor(ms/86400000); if(diff===0)return{t:currentLang==='tr'?'Bugün!':'Today!',c:'badge-danger'}; if(diff<=7)return{t:`${diff} ${currentLang==='tr'?'gün':'days'}`,c:'badge-warning'}; return{t:`${diff} ${currentLang==='tr'?'gün':'days'}`,c:'badge-safe'}; }
function toggleBdayBody(id) { document.getElementById('bb-'+id).classList.toggle('open'); document.getElementById('bc-'+id).classList.toggle('open'); }
function addBdayItem(id){ const v=document.getElementById('bi-'+id).value.trim(); if(!v)return; const arr=DB.get('pers_birthdays',[]); const o=arr.find(x=>x.id===id); if(o){o.items=o.items||[];o.items.push({id:id(),t:v,d:false});DB.set('pers_birthdays',arr);renderBdays();setTimeout(()=>toggleBdayBody(id),10);} }
function togBdayItem(bid,iid){ const arr=DB.get('pers_birthdays',[]); const o=arr.find(x=>x.id===bid); if(o){const i=o.items.find(x=>x.id===iid);if(i)i.d=!i.d;DB.set('pers_birthdays',arr);renderBdays();setTimeout(()=>toggleBdayBody(bid),10);} }
function delBdayItem(bid,iid){ const arr=DB.get('pers_birthdays',[]); const o=arr.find(x=>x.id===bid); if(o){o.items=o.items.filter(x=>x.id!==iid);DB.set('pers_birthdays',arr);renderBdays();setTimeout(()=>toggleBdayBody(bid),10);} }
function renderBdays() { const arr=DB.get('pers_birthdays',[]); const el=document.getElementById('bday-list'); if(!arr.length){el.innerHTML=`<div class="empty">${translations[currentLang].empty}</div>`;return;} const ty=new Date().getFullYear(); arr.forEach(x=>{let n=new Date(ty,x.month-1,x.day);if(n.getTime()<new Date().getTime())n=new Date(ty+1,x.month-1,x.day);x._n=n.getTime();}); arr.sort((a,b)=>a._n-b._n); el.innerHTML=arr.map(x=>{const nDate=new Date(x._n);const cd=getBdayCD(x.month,x.day);const dStr=`${nDate.getFullYear()}-${String(x.month).padStart(2,'0')}-${String(x.day).padStart(2,'0')}`;const items=(x.items||[]).map(i=>`<div class="list-item-row"><div class="list-check ${i.d?'checked':''}" style="width:16px;height:16px;" onclick="togBdayItem('${x.id}','${i.id}')">${i.d?'✓':''}</div><span style="flex:1;font-size:14px;${i.d?'text-decoration:line-through;opacity:0.5':''}">${esc(i.t)}</span><button class="btn-icon" style="font-size:12px;" onclick="delBdayItem('${x.id}','${i.id}')">✕</button></div>`).join('');return `<div class="card"><div class="acc-header" onclick="toggleBdayBody('${x.id}')"><div style="display:flex;align-items:center;gap:14px;"><div class="bday-avatar">${x.name.charAt(0).toUpperCase()}</div><div><div style="font-weight:700;font-size:16px;">${esc(x.name)}</div><div class="card-meta" style="margin-top:2px;">${x.day} ${MONTHS_TR[x.month]}</div><div style="margin-top:6px;"><span class="badge ${cd.c}" style="margin:0;">${cd.t}</span></div></div></div><div style="display:flex;gap:12px;align-items:center;"><button class="btn-icon" onclick="event.stopPropagation();downloadICS('${x.name} D.Günü','${dStr}',null,'Kutlama')">&#128197;</button><span class="chevron" id="bc-${x.id}">▼</span></div></div><div class="acc-body" id="bb-${x.id}">${x.note?`<div class="card-note" style="margin-bottom:10px;">${esc(x.note)}</div>`:''}<div>${items}</div><div style="display:flex;gap:8px;margin-top:10px;"><input type="text" id="bi-${x.id}" placeholder="Hediye veya sürpriz planı..." onkeydown="if(event.key==='Enter')addBdayItem('${x.id}')" style="padding:8px;font-size:13px;"><button class="btn-primary" style="padding:8px 12px;" onclick="addBdayItem('${x.id}')">+</button></div><button class="btn-ghost" style="width:100%;margin-top:10px;border-color:var(--accent-danger);color:var(--accent-danger);" onclick="delBday('${x.id}')">Kişiyi Sil</button></div></div>`;}).join(''); }

function getNoteKey() { return currentContext+'_notes'; }
function parseMD(t) { return esc(t).replace(/^### (.*$)/gim,'<h3>$1</h3>').replace(/^## (.*$)/gim,'<h2>$1</h2>').replace(/^# (.*$)/gim,'<h1>$1</h1>').replace(/\*\*(.*?)\*\*/gim,'<strong>$1</strong>').replace(/\*(.*?)\*/gim,'<em>$1</em>').replace(/^\- (.*$)/gim,'<ul><li>$1</li></ul>').replace(/<\/ul>\n<ul>/gim,'').replace(/\n/gim,'<br>'); }
function openNoteEditor(eid=null) { currentEditId=eid; const n=eid?DB.get(getNoteKey(),[]).find(x=>x.id===eid):null; document.getElementById('m-note-title').value=n?n.title:''; document.getElementById('m-note-body').value=n?n.body:''; switchNoteTab('write'); document.getElementById('note-editor').classList.add('open'); if(!eid)currentEditId=id(); }
function switchNoteTab(m) { document.getElementById('tab-write').classList.remove('active'); document.getElementById('tab-preview').classList.remove('active'); document.getElementById('m-note-body').classList.remove('active'); document.getElementById('m-note-preview').classList.remove('active'); if(m==='write'){document.getElementById('tab-write').classList.add('active');document.getElementById('m-note-body').classList.add('active');}else{document.getElementById('tab-preview').classList.add('active');const md=document.getElementById('m-note-body').value;document.getElementById('m-note-preview').innerHTML=md?parseMD(md):'<div style="color:var(--muted);font-style:italic">Boş...</div>';document.getElementById('m-note-preview').classList.add('active');} }
function closeNoteEditor() { const t=document.getElementById('m-note-title').value.trim(); const b=document.getElementById('m-note-body').value.trim(); if(t||b){const k=getNoteKey();const arr=DB.get(k,[]);const idx=arr.findIndex(x=>x.id===currentEditId);const e={id:currentEditId,title:t||'İsimsiz',body:b,d:new Date().toISOString()};if(idx>-1)arr[idx]=e;else arr.unshift(e);DB.set(k,arr);} document.getElementById('note-editor').classList.remove('open'); renderNotes(); }
function deleteNote() { if(confirm("Silinsin mi?")){const k=getNoteKey();DB.set(k,DB.get(k,[]).filter(x=>x.id!==currentEditId));document.getElementById('note-editor').classList.remove('open');renderNotes();} }
function renderNotes() { const arr=DB.get(getNoteKey(),[]); const el=document.getElementById('notes-list'); if(!arr.length){el.innerHTML=`<div class="empty">${translations[currentLang].empty}</div>`;return;} el.innerHTML=arr.map(n=>{const d=new Date(n.d);return `<div class="card" style="cursor:pointer;" onclick="openNoteEditor('${n.id}')"><div class="card-title">${esc(n.title)}</div><div style="font-size:14px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;">${esc(n.body)}</div><div style="font-size:11px;color:var(--muted);margin-top:10px;font-weight:700;">${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}</div></div>`;}).join(''); }

// ==================== PWA ====================
function registerSW() {
  if('serviceWorker' in navigator) {
    const sw = `
      self.addEventListener('install', e => { self.skipWaiting(); });
      self.addEventListener('fetch', e => {
        e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
      });
    `;
    const blob = new Blob([sw], {type:'application/javascript'});
    const swURL = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swURL).catch(()=>{});
  }
}

// ==================== YAZDIR ====================
function printPage() {
  const now = new Date();
  const dateStr = now.toLocaleDateString('tr-TR', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  const timeStr = now.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});

  const modLabels = {
    summary:      { tr: 'Günlük Özet',         en: 'Daily Overview' },
    appointments: { tr: currentContext==='work' ? 'Toplantı & Takvim' : 'Randevular', en: currentContext==='work' ? 'Meetings' : 'Appointments' },
    todos:        { tr: currentContext==='work' ? 'İş Görevleri' : 'Görevler',          en: currentContext==='work' ? 'Work Tasks' : 'Tasks' },
    travels:      { tr: currentContext==='work' ? 'İş Seyahati' : 'Seyahat Planı',      en: currentContext==='work' ? 'Business Trip' : 'Travel Plan' },
    habits:       { tr: 'Gelişim & Rutin',     en: 'Habits & Routine' },
    lists:        { tr: 'Hedefler & Listeler', en: 'Goals & Lists' },
    birthdays:    { tr: 'Doğum Günleri',       en: 'Birthdays' },
    notes:        { tr: currentContext==='work' ? 'Şirket Notları' : 'Kişisel Notlar',  en: currentContext==='work' ? 'Work Notes' : 'Personal Notes' },
  };
  const moduleLabel = (modLabels[currentModule]||{tr:currentModule})[currentLang];
  const ctxLabel = currentContext==='work' ? (currentLang==='tr'?'İş Dünyası':'Business') : currentContext==='pers' ? (currentLang==='tr'?'Kişisel Yaşam':'Personal') : '';

  let body = '';

  // ---- ÖZET ----
  if (currentModule === 'summary') {
    const tMs = new Date(new Date().setHours(0,0,0,0)).getTime();
    let evs = [];
    const pushEv = (key, icon, extractFn) => { DB.get(key,[]).forEach(i => { const e=extractFn(i); if(e && e.t >= tMs-86400000) evs.push({...e, icon, ctx: key.includes('work')?'İş':'Kişisel'}); }); };
    pushEv('work_appts',  '📅', i => i.date?{t:new Date(i.date+'T00:00').getTime(), title:i.title, date:formatDate(i.date), time:i.time||''}:null);
    pushEv('pers_appts',  '📍', i => i.date?{t:new Date(i.date+'T00:00').getTime(), title:i.title, date:formatDate(i.date), time:i.time||''}:null);
    pushEv('work_todos',  '💼', i => (i.date&&!i.done)?{t:new Date(i.date+'T00:00').getTime(), title:i.title, date:formatDate(i.date), time:''}:null);
    pushEv('pers_todos',  '✅', i => (i.date&&!i.done)?{t:new Date(i.date+'T00:00').getTime(), title:i.title, date:formatDate(i.date), time:''}:null);
    pushEv('work_travels','✈️', i => i.start?{t:new Date(i.start+'T00:00').getTime(), title:i.dest, date:formatDate(i.start), time:''}:null);
    pushEv('pers_travels','🎒', i => i.start?{t:new Date(i.start+'T00:00').getTime(), title:i.dest, date:formatDate(i.start), time:''}:null);
    const ty=new Date().getFullYear(); DB.get('pers_birthdays',[]).forEach(b=>{let n=new Date(ty,b.month-1,b.day);if(n.getTime()<tMs)n=new Date(ty+1,b.month-1,b.day);evs.push({t:n.getTime(),title:b.name,date:`${b.day} ${MONTHS_TR[b.month]}`,time:'',icon:'🎂',ctx:'Kişisel'});});
    evs.sort((a,b)=>a.t-b.t);
    body = `<div class="pr-section-title">Yaklaşan Etkinlikler</div>` +
      (evs.length ? evs.map(e=>`
        <div class="pr-row">
          <div class="pr-checkbox"></div>
          <div class="pr-row-main">
            <div class="pr-row-title">${esc(e.title)}</div>
            <div class="pr-row-meta">${e.date}${e.time?' · '+e.time:''} &nbsp;·&nbsp; ${e.ctx}</div>
          </div>
        </div>`).join('') : '<p style="color:#999;font-size:13px;padding:12px 0;">Yaklaşan etkinlik yok.</p>');
  }

  // ---- RANDEVULAR ----
  else if (currentModule === 'appointments') {
    const arr = DB.get(currentContext+'_appts', []);
    body = `<div class="pr-section-title">${moduleLabel}</div>` +
      (arr.length ? arr.map(a=>`
        <div class="pr-row">
          <div class="pr-checkbox"></div>
          <div class="pr-row-main">
            <div class="pr-row-title">${esc(a.title)}</div>
            ${a.note?`<div class="pr-row-meta">${esc(a.note)}</div>`:''}
          </div>
          <div class="pr-row-right">${formatDate(a.date)}${a.time?'<br>'+a.time:''}</div>
        </div>`).join('') : '<p style="color:#999;font-size:13px;padding:12px 0;">Kayıt yok.</p>');
  }

  // ---- GÖREVLER ----
  else if (currentModule === 'todos') {
    const arr = DB.get(currentContext+'_todos', []);
    const un = arr.filter(t=>!t.done).sort((a,b)=>(a.pri==='high'?0:1)-(b.pri==='high'?0:1));
    const dn = arr.filter(t=>t.done);
    const row = t => `
      <div class="pr-row">
        ${t.pri==='high'?'<span class="pr-priority"></span>':'<div class="pr-checkbox'+(t.done?' checked':'')+'"></div>'}
        <div class="pr-row-main">
          <div class="pr-row-title ${t.done?'done':''}">${esc(t.title)}${t.tag?`<span class="pr-tag">#${esc(t.tag)}</span>`:''}</div>
          ${t.note?`<div class="pr-row-meta">${esc(t.note)}</div>`:''}
        </div>
        <div class="pr-row-right">${formatDate(t.date)}</div>
      </div>`;
    body = `<div class="pr-section-title">Yapılacaklar (${un.length})</div>${un.length?un.map(row).join(''):'<p style="color:#999;font-size:13px;">Tümü tamamlandı!</p>'}`;
    if(dn.length) body += `<div class="pr-section-title">Tamamlananlar (${dn.length})</div>${dn.map(row).join('')}`;
  }

  // ---- SEYAHAT ----
  else if (currentModule === 'travels') {
    const arr = DB.get(currentContext+'_travels', []);
    body = arr.length ? arr.map(a=>`
      <div class="pr-travel-card">
        <div class="pr-travel-dest">${esc(a.dest)}</div>
        <div class="pr-travel-dates">${formatDate(a.start)}${a.end?' — '+formatDate(a.end):''}</div>
        ${a.note?`<div style="font-size:12px;color:#555;margin-bottom:8px;">${esc(a.note)}</div>`:''}
        ${(a.items||[]).map(i=>`<div class="pr-checklist-item"><div class="pr-checkbox ${i.d?'checked':''}"></div><span style="${i.d?'text-decoration:line-through;color:#aaa':''}">${esc(i.t)}</span></div>`).join('')}
      </div>`).join('') : '<p style="color:#999;font-size:13px;padding:12px 0;">Kayıt yok.</p>';
  }

  // ---- RUTINLER ----
  else if (currentModule === 'habits') {
    const arr = DB.get('pers_habits', []);
    const wDays = (()=>{ const t=new Date();t.setHours(0,0,0,0);const m=new Date(t);m.setDate(t.getDate()-((t.getDay()+6)%7));const d=[];for(let i=0;i<7;i++){const x=new Date(m);x.setDate(m.getDate()+i);d.push({ds:x.toISOString().split('T')[0],lb:['Pt','Sa','Ça','Pe','Cu','Ct','Pz'][i]});}return d;})();
    body = `<div class="pr-section-title">Bu Haftanın Rutinleri</div>` +
      `<table class="pr-table"><thead><tr><th>Alışkanlık</th><th>Hedef</th>${wDays.map(d=>`<th style="text-align:center">${d.lb}</th>`).join('')}<th>%</th></tr></thead><tbody>` +
      arr.map(h=>{const ch=h.c||{};const dw=wDays.filter(d=>ch[d.ds]).length;const pct=Math.min(100,Math.round((dw/h.tg)*100));return `<tr><td>${esc(h.n)}</td><td>${h.tg} gün</td>${wDays.map(d=>`<td style="text-align:center">${ch[d.ds]?'✓':'·'}</td>`).join('')}<td>${pct}%</td></tr>`;}).join('') +
      `</tbody></table>`;
  }

  // ---- DOĞUM GÜNLERİ ----
  else if (currentModule === 'birthdays') {
    const ty=new Date().getFullYear(); const arr=DB.get('pers_birthdays',[]);
    arr.forEach(x=>{let n=new Date(ty,x.month-1,x.day);if(n.getTime()<new Date().getTime())n=new Date(ty+1,x.month-1,x.day);x._n=n.getTime();}); arr.sort((a,b)=>a._n-b._n);
    body = `<div class="pr-section-title">Doğum Günleri</div><table class="pr-table"><thead><tr><th>İsim</th><th>Tarih</th><th>Kalan Gün</th><th>Not</th></tr></thead><tbody>` +
      arr.map(b=>{const cd=getBdayCD(b.month,b.day);const days=Math.floor((b._n-Date.now())/86400000);return `<tr><td>${esc(b.name)}</td><td>${b.day} ${MONTHS_TR[b.month]}</td><td>${days===0?'Bugün!':days+' gün'}</td><td style="color:#777;font-size:12px;">${esc(b.note||'')}</td></tr>`;}).join('') +
      `</tbody></table>`;
  }

  // ---- NOTLAR ----
  else if (currentModule === 'notes') {
    const arr = DB.get(currentContext+'_notes', []);
    body = arr.length ? arr.map(n=>`
      <div class="pr-note-card">
        <div class="pr-note-title">${esc(n.title)}</div>
        <div class="pr-note-body">${parseMD(n.body)}</div>
      </div>`).join('') : '<p style="color:#999;font-size:13px;padding:12px 0;">Not yok.</p>';
  }

  // ---- LİSTELER ----
  else if (currentModule === 'lists') {
    const cats = getCatKeys();
    body = cats.map(cat => {
      const items = DB.get('pers_list_'+cat, []);
      const un = items.filter(i=>!i.d); const dn = items.filter(i=>i.d);
      const row = i => `<div class="pr-row"><div class="pr-checkbox ${i.d?'checked':''}"></div><div class="pr-row-main"><div class="pr-row-title ${i.d?'done':''}">${esc(i.t)}</div>${i.p?`<div class="pr-row-meta">${esc(i.p)}</div>`:''}</div></div>`;
      return `<div class="pr-section-title">${esc(cat)}</div>${un.map(row).join('')}${dn.length?`<div style="margin-top:6px;font-size:10px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:1px;">Tamamlananlar</div>${dn.map(row).join('')}`:''}`;
    }).join('');
  }

  // HTML oluştur
  const html = `
    <div class="pr-page">
      <div class="pr-header">
        <div>
          <div class="pr-logo-text">Planner</div>
          <div class="pr-logo-sub">PRO</div>
        </div>
        <div class="pr-header-meta">
          <strong>${moduleLabel}</strong>
          ${ctxLabel ? ctxLabel+'<br>' : ''}${dateStr}<br>${timeStr}
        </div>
      </div>
      ${body}
      <div class="pr-footer">
        <span>Planner Pro · planner.app</span>
        <span>${dateStr} ${timeStr}</span>
      </div>
    </div>`;

  document.getElementById('print-area').innerHTML = html;
  window.print();
}

// ==================== BAŞLATMA ====================
function init() {
  setTheme(currentTheme);
  applyTranslations();
  updateHeaderDate();
  switchModule('summary');
  initNotifications();
  registerSW();
  setInterval(() => { if(currentModule==='summary') renderSummary(); }, 60000);
}
init();
</script>
