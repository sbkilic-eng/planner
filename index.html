<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1E2228;
    --surface: #272C34;
    --border: #353B45;
    --text: #DFE4EC;
    --muted: #7E8899;
    --accent: #5C9E78;
    --accent-light: #253630;
    --accent2: #E07B54;
    --accent-warning: #D8A56D; /* Pastel Turuncu */
    --accent-danger: #D86D6D;  /* Pastel Kırmızı */
    --tab-active: #DFE4EC;
    --shadow: 0 4px 20px rgba(0,0,0,0.15); /* Daha yumuşak gölge */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; margin: 0; }
  .app-shell { max-width: 680px; margin: 0 auto; position: relative; display: flex; min-height: 100vh; }

  /* HEADER */
  header { padding: 24px 24px 0; display: flex; align-items: baseline; gap: 10px; }
  .app-title { font-family: 'Instrument Serif', serif; font-size: 32px; letter-spacing: -0.5px; color: var(--text); }
  .app-date { font-size: 14px; color: var(--muted); font-weight: 400; }

  /* ── SHARED NAV STYLES ── */
  .nav-item { display: flex; align-items: center; justify-content: center; cursor: pointer; background: none; border: none; font-family: 'DM Sans', sans-serif; color: var(--muted); transition: color 0.15s, background 0.15s; }
  .nav-item:hover { color: var(--text); }
  .nav-item.active { color: var(--accent); }
  .nav-icon { line-height: 1; }
  .sidebar-logo { font-family: 'Instrument Serif', serif; color: var(--accent); }
  .nav-bottom-group { margin-top: auto; padding-top: 10px; border-top: 1px dashed var(--border); display: flex; flex-direction: column; gap: 5px;}

  /* ── MOBILE: left sidebar (< 600px) ── */
  @media (max-width: 599px) {
    body { max-width: 100vw; }
    .app-shell { display: flex; min-height: 100vh; }
    .sidebar { width: 68px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 12px 0; position: sticky; top: 0; height: 100vh; z-index: 50; gap: 4px; }
    .sidebar-header { padding: 8px 4px 16px; text-align: center; margin-bottom: 4px; }
    .sidebar-logo { font-size: 22px; }
    .nav-item { flex-direction: column; padding: 10px 4px; gap: 4px; border-radius: 8px; margin: 0 6px; }
    .nav-item.active { background: var(--accent-light); }
    .nav-icon { font-size: 18px; }
    .nav-label { font-size: 8.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; display: block; }
    .main-area { flex: 1; min-width: 0; }
    .content { padding: 16px; }
    header { padding: 20px 16px 0; }
  }

  /* ── DESKTOP: top bar (≥ 600px) ── */
  @media (min-width: 600px) {
    body { max-width: 700px; margin: 0 auto; }
    .app-shell { display: block; }
    .sidebar { display: flex; flex-direction: row; align-items: center; width: 100%; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 12px; position: sticky; top: 0; z-index: 50; gap: 4px; }
    .sidebar-header { padding: 12px 16px 12px 8px; border-right: 1px solid var(--border); margin-right: 8px; }
    .sidebar-logo { font-size: 24px; letter-spacing: -0.5px; }
    .nav-item { flex-direction: column; padding: 12px 14px 10px; gap: 4px; border-bottom: 2px solid transparent; border-radius: 0; margin: 0; }
    .nav-item.active { background: none; border-bottom-color: var(--accent); }
    .nav-icon { font-size: 18px; }
    .nav-label { font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; display: block; }
    .nav-bottom-group { flex-direction: row; margin-top: 0; margin-left: auto; border-top: none; border-left: 1px dashed var(--border); padding-top: 0; padding-left: 10px; }
    .main-area { width: 100%; }
    .content { padding: 24px; }
  }

  .content { padding: 20px; }
  .section { display: none; animation: fadeIn 0.2s ease; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; position: relative; box-shadow: var(--shadow); }
  .card-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; padding-right: 80px; }
  .card-meta { font-size: 14px; color: var(--muted); font-weight: 400; }
  .card-note { font-size: 14px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .card-actions { position: absolute; top: 14px; right: 14px; display: flex; gap: 8px; }
  
  .btn-icon { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 2px 4px; line-height: 1; transition: color 0.15s; }
  .btn-icon:hover { color: var(--accent2); }
  .btn-icon.edit:hover { color: var(--accent); }

  /* DYNAMIC BADGES */
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.4px; }
  .badge-past { background: var(--border); color: var(--muted); }
  .badge-safe { background: var(--accent-light); color: var(--accent); }
  .badge-warning { background: rgba(216, 165, 109, 0.15); color: var(--accent-warning); }
  .badge-danger { background: rgba(216, 109, 109, 0.15); color: var(--accent-danger); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

  /* ADD FORM */
  .add-form { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 16px; display: none; box-shadow: var(--shadow); }
  .add-form.open { display: block; animation: fadeIn 0.2s ease; }
  .form-row { margin-bottom: 12px; }
  .form-row:last-child { margin-bottom: 0; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  input[type="text"], input[type="number"], input[type="date"], input[type="time"], textarea, select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.15s; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* BUTTONS */
  .btn { padding: 12px 20px; border-radius: 8px; font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-danger-outline { background: transparent; color: var(--accent-danger); border: 1px solid var(--accent-danger); margin-top: 10px; width: 100%; }
  
  .btn-add { display: flex; align-items: center; gap: 8px; width: 100%; background: var(--surface); border: 1px dashed var(--border); border-radius: 12px; padding: 14px 18px; font-size: 15px; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.15s; margin-bottom: 12px; }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(92, 158, 120, 0.05); }
  .form-btns { display: flex; gap: 10px; margin-top: 16px; }

  .section-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; margin-top: 8px; }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 16px; font-style: italic; font-family: 'Instrument Serif', serif; }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* GOAL TRACKER */
  .goal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .goal-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
  .goal-title { font-size: 16px; font-weight: 600; }
  .goal-amounts { font-size: 14px; color: var(--muted); }
  .goal-amounts strong { color: var(--accent); font-size: 16px; }
  .goal-bar-bg { width: 100%; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
  .goal-bar-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }
  .goal-actions { display: flex; gap: 8px; margin-top: 12px; }
  .goal-actions input { flex: 1; padding: 8px 12px; font-size: 14px; }
  .goal-actions button { padding: 8px 16px; font-size: 14px; }

  /* TABS & LISTS */
  .cat-tabs { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; margin-bottom: 16px; }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-tab { padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .cat-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .list-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; transition: opacity 0.2s; }
  .list-wrapper.done { opacity: 0.5; }
  .list-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; }
  .list-wrapper.done .item-text { text-decoration: line-through; }
  .list-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--bg); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .list-wrapper.done .list-check { background: var(--accent); border-color: var(--accent); }
  .list-check-mark { display: none; color: white; font-size: 12px; }
  .list-wrapper.done .list-check-mark { display: block; }
  .item-text { font-size: 15px; flex: 1; line-height: 1.4; font-weight: 500; }
  .item-prog-badge { background: var(--bg); border: 1px solid var(--border); font-size: 11px; padding: 2px 6px; border-radius: 6px; color: var(--muted); }
  .list-body { padding: 0 14px 14px 44px; display: none; border-top: 1px dashed var(--border); margin-top: 4px; padding-top: 12px; }
  .list-body.open { display: block; animation: fadeIn 0.2s ease; }
  
  .quick-add { display: flex; gap: 8px; margin-bottom: 16px; }
  .quick-add input { flex: 1; }

  /* TRAVEL & EXPANDABLE CARDS */
  .travel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; position: relative; box-shadow: var(--shadow); }
  .travel-header { padding: 16px 18px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
  .travel-dest { font-family: 'Instrument Serif', serif; font-size: 22px; }
  .travel-dates { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 400; }
  .travel-body { padding: 0 18px 16px; border-top: 1px solid var(--border); display: none; }
  .travel-body.open { display: block; animation: fadeIn 0.2s ease; }
  .travel-note { font-size: 14px; color: var(--muted); line-height: 1.6; padding: 14px 0 10px; white-space: pre-wrap; }
  .travel-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 15px; border-bottom: 1px solid var(--border); }
  .travel-item:last-child { border-bottom: none; }
  .chevron { transition: transform 0.2s; font-size: 14px; color: var(--muted); }
  .chevron.open { transform: rotate(180deg); }

  /* TODO */
  .todo-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; transition: opacity 0.2s; border-left: 4px solid var(--border); box-shadow: var(--shadow); }
  .todo-item.priority-high { border-left-color: var(--accent-danger); }
  .todo-item.priority-normal { border-left-color: var(--accent); }
  .todo-item.priority-low { border-left-color: var(--muted); }
  .todo-item.done { opacity: 0.4; }
  .todo-item.done .todo-text { text-decoration: line-through; }
  .todo-text { font-size: 15px; font-weight: 500; flex: 1; line-height: 1.4; }
  .todo-sub { font-size: 13px; color: var(--muted); margin-top: 4px; display:flex; gap: 6px; align-items:center; flex-wrap:wrap;}
  .recur-badge { display:inline-flex; align-items:center; background:var(--bg); border:1px solid var(--border); padding:2px 6px; border-radius:4px; font-size:11px; color:var(--muted); }

  /* HABIT */
  .habit-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .habit-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .habit-name { font-size: 17px; font-weight: 600; }
  .habit-streak { font-size: 13px; color: var(--accent); font-weight: 600; }
  .habit-days { display: flex; gap: 8px; }
  .habit-day { flex: 1; aspect-ratio: 1; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; transition: all 0.15s; min-width: 32px; }
  .habit-day.checked { background: var(--accent); border-color: var(--accent); }
  .habit-day.today { border-color: var(--accent-warning); }
  .habit-day-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
  .habit-day.checked .habit-day-label { color: rgba(255,255,255,0.8); }
  .habit-day-num { font-size: 13px; font-weight: 600; color: var(--text); }
  .habit-day.checked .habit-day-num { color: #fff; }
  .habit-progress { margin-top: 12px; display: flex; align-items: center; gap: 10px; }
  .habit-bar-bg { flex: 1; height: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  .habit-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .habit-target-text { font-size: 13px; color: var(--muted); white-space: nowrap; }

  /* BIRTHDAY */
  .bday-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow); }
  .bday-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
  .bday-avatar { width: 46px; height: 46px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; font-family: 'Instrument Serif', serif; color: var(--accent); flex-shrink: 0; font-weight: 600; }
  .bday-name { font-size: 16px; font-weight: 600; }
  .bday-date { font-size: 14px; color: var(--muted); margin-top: 4px; }

  /* NOTES & EDITOR */
  .note-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.15s; box-shadow: var(--shadow); }
  .note-card:hover { border-color: var(--accent); }
  .note-card-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .note-card-preview { font-size: 14px; color: var(--muted); line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  .note-editor { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100; padding: 0; flex-direction: column; max-width: 680px; margin: 0 auto; }
  .note-editor.open { display: flex; animation: fadeIn 0.2s ease; }
  .note-editor-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .note-editor-title { flex: 1; font-size: 18px; font-weight: 600; background: none; border: none; outline: none; font-family: 'DM Sans', sans-serif; color: var(--text); }
  .note-editor-body { flex: 1; position: relative; display: flex; flex-direction: column;}
  .note-tabs { display:flex; border-bottom:1px solid var(--border); background:var(--surface); }
  .note-tab { flex:1; padding:12px; text-align:center; cursor:pointer; font-size:14px; font-weight:600; color:var(--muted); border-bottom: 2px solid transparent;}
  .note-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  
  .note-content-area { flex:1; padding:20px; overflow-y:auto; background:var(--bg); }
  .note-editor-area { width: 100%; height:100%; background: none; border: none; outline: none; font-size: 16px; font-family: 'DM Sans', sans-serif; color: var(--text); line-height: 1.7; resize: none; display:none; }
  .note-editor-area.active { display:block; }
  .note-preview-area { width: 100%; height:100%; font-size: 16px; line-height: 1.7; display:none; color:var(--text); }
  .note-preview-area.active { display:block; }
  
  /* Markdown Styles in Preview */
  .note-preview-area strong { color: var(--accent-warning); }
  .note-preview-area em { color: var(--muted); }
  .note-preview-area ul { margin-left: 20px; margin-bottom: 10px; }
  .note-preview-area h1, .note-preview-area h2, .note-preview-area h3 { font-family: 'Instrument Serif', serif; margin: 15px 0 10px; font-weight:normal;}

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(28,26,22,0.6); z-index: 200; align-items: flex-end; justify-content: center; backdrop-filter: blur(2px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px; width: 100%; max-width: 680px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1); border-top: 1px solid var(--border); }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-title { font-family: 'Instrument Serif', serif; font-size: 26px; margin-bottom: 20px; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
</style>
</head>
<body>

<div class="app-shell">

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header"><div class="sidebar-logo">P</div></div>
  <button class="nav-item active" onclick="switchTab('appointments')"><span class="nav-icon">&#128197;</span><span class="nav-label">Randevu</span></button>
  <button class="nav-item" onclick="switchTab('travel')"><span class="nav-icon">&#9992;</span><span class="nav-label">Seyahat</span></button>
  <button class="nav-item" onclick="switchTab('lists')"><span class="nav-icon">&#128203;</span><span class="nav-label">Listeler</span></button>
  <button class="nav-item" onclick="switchTab('todo')"><span class="nav-icon">&#9989;</span><span class="nav-label">Görev</span></button>
  <button class="nav-item" onclick="switchTab('habits')"><span class="nav-icon">&#128293;</span><span class="nav-label">Rutin</span></button>
  <button class="nav-item" onclick="switchTab('birthdays')"><span class="nav-icon">&#127874;</span><span class="nav-label">D.Günü</span></button>
  <button class="nav-item" onclick="switchTab('notes')"><span class="nav-icon">&#128221;</span><span class="nav-label">Notlar</span></button>
  
  <div class="nav-bottom-group">
    <button class="nav-item" onclick="exportData()" title="Verileri İndir"><span class="nav-icon">&#128190;</span></button>
    <button class="nav-item" onclick="document.getElementById('importFile').click()" title="Verileri Yükle"><span class="nav-icon">&#128194;</span></button>
    <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
  </div>
</nav>

<div class="main-area">
<header>
  <span class="app-title">Planner</span>
  <span class="app-date" id="headerDate"></span>
</header>

<div class="content">

  <div class="section active" id="sec-appointments">
    <button class="btn-add" onclick="openApptForm()"><span>+</span> Yeni randevu ekle</button>
    <div class="add-form" id="appt-form">
      <div class="modal-title" id="appt-form-title">Yeni Randevu</div>
      <div class="form-row"><label>Başlık</label><input type="text" id="appt-title" placeholder="Doktor, şirket toplantısı..."></div>
      <div class="form-row form-row-2">
        <div><label>Tarih</label><input type="date" id="appt-date"></div>
        <div><label>Saat</label><input type="time" id="appt-time"></div>
      </div>
      <div class="form-row"><label>Not</label><textarea id="appt-note" placeholder="Adres, evraklar..."></textarea></div>
      <div class="form-btns">
        <button class="btn btn-primary" onclick="saveAppointment()">Kaydet</button>
        <button class="btn btn-ghost" onclick="toggleForm('appt-form')">İptal</button>
      </div>
    </div>
    <div id="appt-list"></div>
  </div>

  <div class="section" id="sec-travel">
    <button class="btn-add" onclick="openTravelForm()"><span>+</span> Yeni destinasyon ekle</button>
    <div id="travel-list"></div>
  </div>

  <div class="section" id="sec-lists">
    
    <div class="goal-card" id="goal-tracker">
      <div class="goal-header">
        <div class="goal-title" id="goal-title-display">Hedefim</div>
        <div class="goal-amounts"><strong id="goal-current-display">0 TL</strong> / <span id="goal-target-display">0 TL</span></div>
      </div>
      <div class="goal-bar-bg"><div class="goal-bar-fill" id="goal-bar"></div></div>
      <div class="goal-actions">
        <input type="number" id="goal-add-input" placeholder="Miktar ekle (TL)">
        <button class="btn btn-primary" onclick="addGoalFunds()">Ekle</button>

<script>
// ==================== GLOBAL STATE & DB ====================
let currentEditId = null;

const DB = {
  get: (k) => JSON.parse(localStorage.getItem('planner_' + k) || 'null'),
  set: (k, v) => localStorage.setItem('planner_' + k, JSON.stringify(v)),
  getAll: () => {
    let data = {};
    for(let i=0; i<localStorage.length; i++) {
      let key = localStorage.key(i);
      if(key.startsWith('planner_')) data[key] = JSON.parse(localStorage.getItem(key));
    }
    return data;
  },
  import: (dataObj) => {
    for(let key in dataObj) {
      if(key.startsWith('planner_')) localStorage.setItem(key, JSON.stringify(dataObj[key]));
    }
  }
};
function getData(k, def) { const v = DB.get(k); return v !== null ? v : def; }
function id() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function formatDate(d) { if (!d) return ''; const parts = d.split('-'); return `${parts[2]}.${parts[1]}.${parts[0]}`; }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ==================== IMPORT / EXPORT ====================
function exportData() {
  const data = DB.getAll();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const link = document.createElement('a');
  link.href = window.URL.createObjectURL(blob);
  const dateStr = new Date().toISOString().split('T')[0];
  link.setAttribute('download', `planner_yedek_${dateStr}.json`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function importData(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if(confirm("Mevcut tüm verileriniz yüklenen dosya ile değiştirilecek. Onaylıyor musunuz?")) {
        DB.import(data);
        location.reload();
      }
    } catch(err) { alert("Geçersiz dosya formatı!"); }
  };
  reader.readAsText(file);
}

// ==================== ICS GENERATOR (ALL-DAY SUPPORT) ====================
function downloadICS(title, startDateStr, timeStr, desc, endDateStr = null) {
  if(!startDateStr) return;
  const fmt = (d) => d.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
  const fmtAllDay = (d) => d.toISOString().split('T')[0].replace(/-/g, '');
  
  let ics = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:${title}\nDESCRIPTION:${desc || ''}\n`;

  if (endDateStr && !timeStr) {
    // "Tüm Gün" etkinliği (All-Day). Bitiş tarihine +1 gün eklenmeli (ICS standardı)
    const start = new Date(startDateStr);
    const end = new Date(endDateStr);
    if(end >= start) {
      end.setDate(end.getDate() + 1);
      ics += `DTSTART;VALUE=DATE:${fmtAllDay(start)}\nDTEND;VALUE=DATE:${fmtAllDay(end)}\n`;
    } else {
      ics += `DTSTART;VALUE=DATE:${fmtAllDay(start)}\nDTEND;VALUE=DATE:${fmtAllDay(start)}\n`;
    }
  } else {
    // Saatli veya tek günlük etkinlik
    const start = new Date(startDateStr + (timeStr ? 'T' + timeStr : 'T00:00'));
    let end = new Date(start.getTime() + (timeStr ? 60*60*1000 : 24*60*60*1000));
    ics += `DTSTART:${fmt(start)}\nDTEND:${fmt(end)}\n`;
  }
  
  ics += `END:VEVENT\nEND:VCALENDAR`;

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const link = document.createElement('a');
  link.href = window.URL.createObjectURL(blob);
  link.setAttribute('download', `${title.replace(/ /g,'_')}.ics`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

// ==================== TIME LOGIC ====================
function getPreciseCountdown(dateStr, timeStr) {
  if (!dateStr) return null;
  const target = new Date(dateStr + (timeStr ? 'T' + timeStr : 'T23:59:59'));
  const diffMs = target - new Date();
  if (diffMs < 0) return { text: 'Geçti', class: 'badge-past' };

  const diffMins = Math.floor(diffMs / (1000 * 60));
  const diffHours = Math.floor(diffMins / 60);
  const diffDays = Math.floor(diffHours / 24);

  if (diffDays > 0) return { text: `${diffDays} gün kaldı`, class: diffDays > 7 ? 'badge-safe' : 'badge-warning' };
  if (diffHours > 0) return { text: `${diffHours} saat kaldı`, class: 'badge-danger' };
  return { text: `${diffMins} dk kaldı`, class: 'badge-danger' };
}

// ==================== TABS & MODALS ====================
function switchTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  const tabs = ['appointments','travel','lists','todo','habits','birthdays','notes'];
  document.querySelectorAll('.nav-item')[tabs.indexOf(name)].classList.add('active');
  
  if (name === 'appointments') renderAppointments();
  if (name === 'travel') renderTravel();
  if (name === 'lists') { renderGoal(); renderLists(); }
  if (name === 'todo') renderTodo();
  if (name === 'habits') renderHabits();
  if (name === 'birthdays') renderBirthdays();
  if (name === 'notes') renderNotes();
}

function toggleForm(fid) {
  const f = document.getElementById(fid);
  if(f.classList.contains('open')) { f.classList.remove('open'); currentEditId = null; }
  else { f.classList.add('open'); }
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); currentEditId = null; }
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', function(e) { if (e.target === this) closeModal(this.id); }));


// ==================== GOAL TRACKER ====================
function renderGoal() {
  const goal = getData('goal', { title: 'Motosiklet & Ehliyet', current: 0, target: 100000 });
  document.getElementById('goal-title-display').innerText = goal.title;
  document.getElementById('goal-current-display').innerText = goal.current.toLocaleString('tr-TR') + ' TL';
  document.getElementById('goal-target-display').innerText = goal.target.toLocaleString('tr-TR') + ' TL';
  
  let pct = (goal.target > 0) ? Math.min(100, Math.round((goal.current / goal.target) * 100)) : 0;
  document.getElementById('goal-bar').style.width = pct + '%';
}

function addGoalFunds() {
  const inp = document.getElementById('goal-add-input');
  const val = parseInt(inp.value);
  if(!val || val <= 0) return;
  const goal = getData('goal', { title: 'Motosiklet & Ehliyet', current: 0, target: 100000 });
  goal.current += val;
  DB.set('goal', goal);
  inp.value = '';
  renderGoal();
}

function editGoal() {
  const goal = getData('goal', { title: 'Motosiklet & Ehliyet', current: 0, target: 100000 });
  const newTitle = prompt("Hedefin Adı:", goal.title);
  if(newTitle === null) return;
  const newTarget = prompt("Hedef Miktar (TL):", goal.target);
  if(newTarget === null) return;
  const newCurrent = prompt("Şu Anki Birikim (TL):", goal.current);
  if(newCurrent === null) return;
  
  goal.title = newTitle;
  goal.target = parseInt(newTarget) || 0;
  goal.current = parseInt(newCurrent) || 0;
  DB.set('goal', goal);
  renderGoal();
}


// ==================== APPOINTMENTS ====================
function openApptForm(editId = null) {
  currentEditId = editId;
  document.getElementById('appt-form-title').innerText = editId ? "Düzenle" : "Yeni Randevu";
  if (editId) {
    const a = getData('appts', []).find(x => x.id === editId);
    document.getElementById('appt-title').value = a.title;
    document.getElementById('appt-date').value = a.date;
    document.getElementById('appt-time').value = a.time;
    document.getElementById('appt-note').value = a.note;
  } else {
    document.getElementById('appt-title').value = '';
    document.getElementById('appt-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('appt-time').value = '';
    document.getElementById('appt-note').value = '';
  }
  document.getElementById('appt-form').classList.add('open');
}

function saveAppointment() {
  const title = document.getElementById('appt-title').value.trim();
  if (!title) return;
  const appts = getData('appts', []);
  const payload = { id: currentEditId || id(), title, date: document.getElementById('appt-date').value, time: document.getElementById('appt-time').value, note: document.getElementById('appt-note').value.trim() };
  if (currentEditId) { const idx = appts.findIndex(x => x.id === currentEditId); if(idx > -1) appts[idx] = payload; } else { appts.push(payload); }
  appts.sort((a,b) => (a.date + a.time) < (b.date + b.time) ? -1 : 1);
  DB.set('appts', appts); toggleForm('appt-form'); renderAppointments();
}

function deleteAppointment(aid) {
  if(!confirm("Bu randevuyu silmek istediğinize emin misiniz?")) return;
  DB.set('appts', getData('appts', []).filter(a => a.id !== aid)); renderAppointments();
}

function renderAppointments() {
  const appts = getData('appts', []);
  const el = document.getElementById('appt-list');
  if (!appts.length) { el.innerHTML = '<div class="empty">Henüz randevu yok</div>'; return; }
  el.innerHTML = appts.map(a => {
    const cd = getPreciseCountdown(a.date, a.time);
    return `<div class="card">
      ${cd ? `<span class="badge ${cd.class}">${cd.text}</span>` : ''}
      <div class="card-actions">
        <button class="btn-icon edit" onclick="openApptForm('${a.id}')">&#9998;</button>
        <button class="btn-icon" onclick="downloadICS('${a.title}', '${a.date}', '${a.time}', '${a.note}')">&#128197;</button>
        <button class="btn-icon" onclick="deleteAppointment('${a.id}')">&#10005;</button>
      </div>
      <div class="card-title">${esc(a.title)}</div>
      <div class="card-meta">${a.date ? formatDate(a.date) : ''}${a.time ? ' · '+a.time : ''}</div>
      ${a.note ? `<div class="card-note">${esc(a.note)}</div>` : ''}
    </div>`;
  }).join('');
}

// ==================== TRAVEL ====================
function openTravelForm(editId = null) {
  currentEditId = editId;
  document.getElementById('travel-modal-title').innerText = editId ? "Düzenle" : "Yeni Destinasyon";
  if (editId) {
    const t = getData('travels', []).find(x => x.id === editId);
    document.getElementById('travel-dest').value = t.dest; document.getElementById('travel-start').value = t.start; document.getElementById('travel-end').value = t.end; document.getElementById('travel-note').value = t.note;
  } else {
    document.getElementById('travel-dest').value = ''; document.getElementById('travel-start').value = ''; document.getElementById('travel-end').value = ''; document.getElementById('travel-note').value = '';
  }
  openModal('travel-modal');
}

function saveTravel() {
  const dest = document.getElementById('travel-dest').value.trim(); if (!dest) return;
  const travels = getData('travels', []);
  if(currentEditId) {
    const t = travels.find(x => x.id === currentEditId);
    if(t) { t.dest = dest; t.start = document.getElementById('travel-start').value; t.end = document.getElementById('travel-end').value; t.note = document.getElementById('travel-note').value.trim(); }
  } else {
    travels.push({ id: id(), dest, start: document.getElementById('travel-start').value, end: document.getElementById('travel-end').value, note: document.getElementById('travel-note').value.trim(), items: [] });
  }
  DB.set('travels', travels); closeModal('travel-modal'); renderTravel();
}

function toggleTravelBody(tid) { document.getElementById('tb-'+tid).classList.toggle('open'); document.getElementById('tc-'+tid).classList.toggle('open'); }
function deleteTravel(tid) { if(confirm("Seyahati silmek istiyor musunuz?")) { DB.set('travels', getData('travels', []).filter(t => t.id !== tid)); renderTravel(); } }

function addTravelItem(tid) {
  const val = document.getElementById('ti-'+tid).value.trim(); if (!val) return;
  const travels = getData('travels', []); const t = travels.find(x => x.id === tid);
  if (t) { t.items.push({ id: id(), text: val, done: false }); DB.set('travels', travels); renderTravel(); setTimeout(()=>toggleTravelBody(tid), 10); }
}
function toggleTravelItem(tid, iid) {
  const travels = getData('travels', []); const t = travels.find(x => x.id === tid);
  if (t) { const item = t.items.find(i => i.id === iid); if (item) item.done = !item.done; DB.set('travels', travels); renderTravel(); setTimeout(()=>toggleTravelBody(tid), 10); }
}
function deleteTravelItem(tid, iid) {
  const travels = getData('travels', []); const t = travels.find(x => x.id === tid);
  if (t) { t.items = t.items.filter(i => i.id !== iid); DB.set('travels', travels); renderTravel(); setTimeout(()=>toggleTravelBody(tid), 10); }
}

function renderTravel() {
  const travels = getData('travels', []); const el = document.getElementById('travel-list');
  if (!travels.length) { el.innerHTML = '<div class="empty">Henüz destinasyon yok</div>'; return; }
  el.innerHTML = travels.map(t => {
    const cd = getPreciseCountdown(t.start, null);
    const dateRange = [t.start && formatDate(t.start), t.end && formatDate(t.end)].filter(Boolean).join(' – ');
    const items = (t.items || []).map(i => `<div class="travel-item"><div class="list-check" onclick="toggleTravelItem('${t.id}','${i.id}')" style="${i.done?'background:var(--accent);border-color:var(--accent)':''}">${i.done?'<span class="list-check-mark" style="display:block">&#10003;</span>':''}</div><span style="flex:1; ${i.done?'text-decoration:line-through;opacity:0.5':''}">${esc(i.text)}</span><button class="btn-icon" onclick="deleteTravelItem('${t.id}', '${i.id}')">&#10005;</button></div>`).join('');
    
    return `<div class="travel-card">
      <div class="travel-header" onclick="toggleTravelBody('${t.id}')">
        <div>${cd ? `<span class="badge ${cd.class}">${cd.text}</span>` : ''}<div class="travel-dest">${esc(t.dest)}</div><div class="travel-dates">${dateRange}</div></div>
        <div style="display:flex;gap:12px;align-items:center;">
          <button class="btn-icon" onclick="event.stopPropagation();downloadICS('Seyahat: ${t.dest}', '${t.start}', null, '${t.note}', '${t.end}')" title="Takvime Ekle">&#128197;</button>
          <button class="btn-icon edit" onclick="event.stopPropagation();openTravelForm('${t.id}')">&#9998;</button>
          <span class="chevron" id="tc-${t.id}">&#9660;</span>
        </div>
      </div>
      <div class="travel-body" id="tb-${t.id}">
        ${t.note ? `<div class="travel-note">${esc(t.note)}</div>` : ''}
        <div>${items}</div>
        <div style="display:flex;gap:8px;margin-top:12px;"><input type="text" id="ti-${t.id}" style="padding:10px;font-size:14px;border-radius:6px;" placeholder="Gezilecek yer ekle..." onkeydown="if(event.key==='Enter')addTravelItem('${t.id}')"><button class="btn btn-primary" style="padding:8px 14px;" onclick="addTravelItem('${t.id}')">Ekle</button></div>
        <button class="btn btn-danger-outline" onclick="deleteTravel('${t.id}')">Seyahati Sil</button>
      </div>
    </div>`;
  }).join('');
}


// ==================== LISTS (WITH ACCORDION) ====================
function getListCats() { return getData('listcats', ['Kitaplar', 'Diziler/Filmler', 'Alışveriş']); }
function getActiveCat() { return getData('activecat', getListCats()[0]); }
function safeid(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

function renderLists() {
  const cats = getListCats(); const active = getActiveCat();
  document.getElementById('cat-tabs').innerHTML = cats.map(c => `<button class="cat-tab ${c === active ? 'active' : ''}" onclick="setCat('${esc(c)}')">${esc(c)}</button>`).join('') + `<button class="cat-tab" onclick="openModal('newlist-modal')" style="border-style:dashed">+ Yeni</button>`;
  renderListItems(active);
}
function setCat(cat) { DB.set('activecat', cat); renderLists(); }
function saveNewList() {
  const n = document.getElementById('newlist-name').value.trim(); if(!n) return;
  const cats = getListCats(); if(!cats.includes(n)) cats.push(n);
  DB.set('listcats', cats); DB.set('activecat', n); closeModal('newlist-modal'); renderLists();
}

function addListItem(cat) {
  const val = document.getElementById('quick-input-'+safeid(cat)).value.trim(); if(!val) return;
  const items = getData('list_'+cat, []); items.push({ id: id(), text: val, done: false, prog: '', note: '' });
  DB.set('list_'+cat, items); document.getElementById('quick-input-'+safeid(cat)).value = ''; renderLists();
}
function toggleListItem(cat, iid) {
  const items = getData('list_'+cat, []); const i = items.find(x => x.id === iid);
  if(i) { i.done = !i.done; DB.set('list_'+cat, items); renderLists(); }
}
function deleteListItem(cat, iid) { DB.set('list_'+cat, getData('list_'+cat, []).filter(i => i.id !== iid)); renderLists(); }

// List Accordion Logic
function toggleListBody(iid) { 
  const b = document.getElementById('lb-'+iid); const c = document.getElementById('lc-'+iid);
  b.classList.toggle('open'); c.classList.toggle('open');
}
function updateListDetails(cat, iid) {

    i.prog = document.getElementById('lp-'+iid).value.trim();

function renderListItems(cat) {

    <div class="list-wrapper ${i.done ? 'done' : ''}">

        <textarea id="ln-${i.id}" placeholder="Link, not veya inceleme..." onchange="updateListDetails('${esc(cat)}','${i.id}')" style="min-height:50px; padding:8px; font-size:13px; border-radius:6px;">${esc(i.note||'')}</textarea>

// ==================== TO-DO (WITH RECURRING) ====================
function openTodoForm(editId = null) {
  currentEditId = editId; document.getElementById('todo-form-title').innerText = editId ? "Düzenle" : "Yeni Görev";
  if(editId) {
    const t = getData('todos', []).find(x => x.id === editId);
    document.getElementById('todo-title').value = t.title; document.getElementById('todo-priority').value = t.priority; document.getElementById('todo-recur').value = t.recur || ''; document.getElementById('todo-date').value = t.date || ''; document.getElementById('todo-note').value = t.note || '';
  } else {
    document.getElementById('todo-title').value = ''; document.getElementById('todo-priority').value = 'normal'; document.getElementById('todo-recur').value = ''; document.getElementById('todo-date').value = new Date().toISOString().split('T')[0]; document.getElementById('todo-note').value = '';
  }
  document.getElementById('todo-form').classList.add('open');
}

function saveTodo() {
  const title = document.getElementById('todo-title').value.trim(); if (!title) return;
  const todos = getData('todos', []);
  const payload = { id: currentEditId || id(), title, priority: document.getElementById('todo-priority').value, recur: parseInt(document.getElementById('todo-recur').value) || null, date: document.getElementById('todo-date').value, note: document.getElementById('todo-note').value.trim(), done: false };
  if(currentEditId) { const idx = todos.findIndex(x => x.id === currentEditId); if(idx > -1) { payload.done = todos[idx].done; todos[idx] = payload; } } else { todos.push(payload); }
  DB.set('todos', todos); toggleForm('todo-form'); renderTodo();
}

function toggleTodo(tid) {
  const todos = getData('todos', []); const t = todos.find(x => x.id === tid);
  if (t) {
    if (!t.done && t.recur && t.date) {
      // Eğer rutin ve bitiriliyorsa, tarihi ileri atıp tamamlanmamış bırak
      let d = new Date(t.date); d.setDate(d.getDate() + t.recur);
      t.date = d.toISOString().split('T')[0];
    } else {
      t.done = !t.done;
    }
  }
  DB.set('todos', todos); renderTodo();
}

function deleteTodo(tid) { if(confirm("Görevi silmek istiyor musunuz?")) { DB.set('todos', getData('todos', []).filter(t => t.id !== tid)); renderTodo(); } }

function renderTodo() {
  const todos = getData('todos', []); const el = document.getElementById('todo-list');
  if (!todos.length) { el.innerHTML = '<div class="empty">Yapılacak bir şey yok</div>'; return; }
  const pOrder = { high: 0, normal: 1, low: 2 };
  const undone = todos.filter(t => !t.done).sort((a,b) => pOrder[a.priority] - pOrder[b.priority] || (a.date > b.date ? 1 : -1));
  const done = todos.filter(t => t.done);

  const renderItem = (t) => {
    const cd = getPreciseCountdown(t.date, null);
    const dateBadge = cd && !t.done ? `<span style="color:var(--accent-danger);">${cd.text}</span>` : (t.date ? formatDate(t.date) : '');
    const recurLabel = t.recur === 1 ? 'Günlük' : t.recur === 7 ? 'Haftalık' : t.recur === 30 ? 'Aylık' : '';
    
    return `<div class="todo-item priority-${t.priority} ${t.done ? 'done' : ''}">
      <div class="list-check" onclick="toggleTodo('${t.id}')" style="${t.done?'background:var(--accent);border-color:var(--accent)':''}"><span class="list-check-mark" style="${t.done?'display:block':''}">&#10003;</span></div>
      <div style="flex:1;min-width:0;">
        <div class="todo-text">${esc(t.title)}</div>
        <div class="todo-sub">
          ${recurLabel ? `<span class="recur-badge">&#10227; ${recurLabel}</span>` : ''}
          ${dateBadge ? `<span>${dateBadge}</span>` : ''}
          ${t.note ? `<span style="opacity:0.7">· ${esc(t.note)}</span>` : ''}
        </div>
      </div>
      <button class="btn-icon edit" onclick="openTodoForm('${t.id}')">&#9998;</button>
      <button class="btn-icon" onclick="deleteTodo('${t.id}')">&#10005;</button>
    </div>`;
  };

  el.innerHTML = (undone.length ? undone.map(renderItem).join('') : '<div class="empty">Tüm görevler tamam!</div>') +
    (done.length ? `<div class="divider"></div><div class="section-label">Tamamlananlar (${done.length})</div>${done.map(renderItem).join('')}` : '');
}


// ==================== HABITS & BIRTHDAYS (Kept minimal as requested) ====================
// Functions abbreviated structurally, functionality fully intact.
function saveHabit() { const n = document.getElementById('habit-name').value.trim(); if(!n) return; const h = getData('habits', []); h.push({ id: id(), name: n, target: parseInt(document.getElementById('habit-target').value), checks: {} }); DB.set('habits', h); closeModal('habit-modal'); renderHabits(); }
function toggleHabitDay(hid, dStr) { const h = getData('habits', []); const obj = h.find(x => x.id === hid); if(obj) { obj.checks[dStr] = !obj.checks[dStr]; DB.set('habits', h); renderHabits(); } }
function deleteHabit(hid) { if(confirm("Silinsin mi?")) { DB.set('habits', getData('habits', []).filter(x => x.id !== hid)); renderHabits(); } }
function renderHabits() {
  const habits = getData('habits', []); const el = document.getElementById('habits-list');
  const wDays = (() => { const t = new Date(); t.setHours(0,0,0,0); const m = new Date(t); m.setDate(t.getDate() - ((t.getDay() + 6) % 7)); const d = []; const l = ['Pt','Sa','Ça','Pe','Cu','Ct','Pz']; for(let i=0;i<7;i++) { const x = new Date(m); x.setDate(m.getDate() + i); d.push({ date: x.toISOString().split('T')[0], label: l[i], num: x.getDate(), isToday: x.toDateString() === t.toDateString() }); } return d; })();
  if(!habits.length) { el.innerHTML = '<div class="empty">Henüz rutin yok</div>'; return; }
  el.innerHTML = habits.map(h => {
    const c = h.checks || {}; const doneW = wDays.filter(d => c[d.date]).length; const pct = Math.round((doneW / h.target) * 100);
    const dots = wDays.map(d => `<div class="habit-day ${c[d.date]?'checked':''} ${d.isToday?'today':''}" onclick="toggleHabitDay('${h.id}','${d.date}')"><span class="habit-day-label">${d.label}</span><span class="habit-day-num">${d.num}</span></div>`).join('');
    return `<div class="habit-card"><div class="habit-header"><div><div class="habit-name">${esc(h.name)}</div><div class="habit-streak">${doneW}/${h.target} hedef</div></div><button class="btn-icon" onclick="deleteHabit('${h.id}')">&#10005;</button></div><div class="habit-days">${dots}</div><div class="habit-progress"><div class="habit-bar-bg"><div class="habit-bar-fill" style="width:${Math.min(pct,100)}%"></div></div><span class="habit-target-text">%${Math.min(pct,100)}</span></div></div>`;
  }).join('');
}

const MONTHS_TR = ['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
function openBdayForm(eId=null) { currentEditId=eId; document.getElementById('bday-form-title').innerText = eId?"Düzenle":"Doğum Günü"; if(eId) { const b=getData('birthdays',[]).find(x=>x.id===eId); document.getElementById('bday-name').value=b.name; document.getElementById('bday-month').value=b.month; document.getElementById('bday-day').value=b.day; } else { document.getElementById('bday-name').value=''; document.getElementById('bday-month').value='1'; document.getElementById('bday-day').value=''; } document.getElementById('bday-form').classList.add('open'); }
function saveBirthday() { const n=document.getElementById('bday-name').value.trim(); const d=parseInt(document.getElementById('bday-day').value); const m=parseInt(document.getElementById('bday-month').value); if(!n||!d||!m)return; const b=getData('birthdays',[]); if(currentEditId){ const idx=b.findIndex(x=>x.id===currentEditId); if(idx>-1){ b[idx].name=n; b[idx].day=d; b[idx].month=m; } } else { b.push({id:id(),name:n,day:d,month:m,items:[]}); } DB.set('birthdays',b); toggleForm('bday-form'); renderBirthdays(); }
function deleteBirthday(bid) { if(confirm("Silinsin mi?")){ DB.set('birthdays',getData('birthdays',[]).filter(b=>b.id!==bid)); renderBirthdays(); } }
function getBdayCD(m,d) { const t=new Date(); const ty=t.getFullYear(); let n=new Date(ty,m-1,d,23,59,59); if(n<t)n=new Date(ty+1,m-1,d,23,59,59); const diff=Math.floor((n-t)/(86400000)); if(diff===0)return{text:'Bugün!',c:'badge-danger'}; if(diff<=7)return{text:`${diff} gün`,c:'badge-warning'}; return{text:`${diff} gün`,c:'badge-safe'}; }
function renderBirthdays() {
  const b=getData('birthdays',[]); const el=document.getElementById('birthdays-list'); if(!b.length){ el.innerHTML='<div class="empty">Yok</div>'; return; }
  const ty=new Date().getFullYear(); b.forEach(x=>{ let n=new Date(ty,x.month-1,x.day); if(n<new Date())n=new Date(ty+1,x.month-1,x.day); x._n=n.getTime(); });
  b.sort((x,y)=>x._n-y._n);
  el.innerHTML=b.map(x=>{
    const cd=getBdayCD(x.month,x.day); const dateStr=`${new Date(x._n).getFullYear()}-${String(x.month).padStart(2,'0')}-${String(x.day).padStart(2,'0')}`;
    return `<div class="bday-card"><div class="bday-header"><div style="display:flex;align-items:center;gap:12px;"><div class="bday-avatar">${x.name.charAt(0).toUpperCase()}</div><div><div class="bday-name">${esc(x.name)}</div><div class="bday-date">${x.day} ${MONTHS_TR[x.month]}</div><div style="margin-top:4px"><span class="badge ${cd.c}">${cd.text}</span></div></div></div><div style="display:flex;gap:8px;"><button class="btn-icon" onclick="downloadICS('${x.name} Doğum Günü', '${dateStr}', null, 'Kutlama')">&#128197;</button><button class="btn-icon edit" onclick="openBdayForm('${x.id}')">&#9998;</button><button class="btn-icon" onclick="deleteBirthday('${x.id}')">&#10005;</button></div></div></div>`;
  }).join('');
}


// ==================== NOTES & MARKDOWN ====================
let currentNoteId = null;

// Basic Markdown Parser (bold, italic, list items, headings)
function parseMD(text) {
  let html = esc(text);
  html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>')
             .replace(/^## (.*$)/gim, '<h2>$1</h2>')
             .replace(/^# (.*$)/gim, '<h1>$1</h1>')
             .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
             .replace(/\*(.*?)\*/gim, '<em>$1</em>')
             .replace(/^\- (.*$)/gim, '<ul><li>$1</li></ul>')
             .replace(/<\/ul>\n<ul>/gim, '') // merge lists
             .replace(/\n/gim, '<br>');
  return html;
}

function openNote(nid) {
  currentNoteId = nid; const notes = getData('notes', []); const n = nid ? notes.find(x => x.id === nid) : null;
  document.getElementById('note-title-input').value = n ? n.title : '';
  document.getElementById('note-body-input').value = n ? n.body : '';
  switchNoteMode('write');
  document.getElementById('note-editor').classList.add('open');
  if (!nid) currentNoteId = id();
}

function switchNoteMode(mode) {
  document.getElementById('tab-write').classList.remove('active');
  document.getElementById('tab-preview').classList.remove('active');
  document.getElementById('note-body-input').classList.remove('active');
  document.getElementById('note-preview-div').classList.remove('active');
  
  if(mode === 'write') {
    document.getElementById('tab-write').classList.add('active');
    document.getElementById('note-body-input').classList.add('active');
  } else {
    document.getElementById('tab-preview').classList.add('active');
    const md = document.getElementById('note-body-input').value;
    document.getElementById('note-preview-div').innerHTML = md ? parseMD(md) : '<div style="color:var(--muted);font-style:italic">Önizleme yok...</div>';
    document.getElementById('note-preview-div').classList.add('active');
  }
}

function closeNote() {
  const title = document.getElementById('note-title-input').value.trim(); const body = document.getElementById('note-body-input').value.trim();
  if (title || body) {
    const notes = getData('notes', []); const idx = notes.findIndex(n => n.id === currentNoteId);
    const entry = { id: currentNoteId, title: title || 'Başlıksız', body, updated: new Date().toISOString() };
    if (idx >= 0) notes[idx] = entry; else notes.unshift(entry); DB.set('notes', notes);
  }
  document.getElementById('note-editor').classList.remove('open'); renderNotes();
}
function deleteCurrentNote() { if(!confirm("Notu silmek istiyor musunuz?")) return; DB.set('notes', getData('notes', []).filter(n => n.id !== currentNoteId)); document.getElementById('note-editor').classList.remove('open'); renderNotes(); }

function renderNotes() {
  const notes = getData('notes', []); const el = document.getElementById('notes-list');
  if (!notes.length) { el.innerHTML = '<div class="empty">Henüz not yok</div>'; return; }
  el.innerHTML = notes.map(n => `<div class="note-card" onclick="openNote('${n.id}')"><div class="note-card-title">${esc(n.title)}</div><div class="note-card-preview">${esc(n.body)}</div></div>`).join('');
}
