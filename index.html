<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planner Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ================= TEMALAR ================= */
  :root {
    --bg: #1E2228;
    --surface: #272C34;
    --border: #353B45;
    --text: #DFE4EC;
    --muted: #7E8899;
    --accent: #5C9E78; 
    --accent-work: #5C8BB8; 
    --accent-light: rgba(92, 158, 120, 0.15);
    --accent-work-light: rgba(92, 139, 184, 0.15);
    --accent2: #E07B54;
    --accent-warning: #D8A56D; 
    --accent-danger: #D86D6D;  
    --shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  [data-theme="light"] {
    --bg: #F5F5F7; --surface: #FFFFFF; --border: #E5E5E7; --text: #1D1D1F; --muted: #86868B;
    --shadow: 0 4px 15px rgba(0,0,0,0.05);
  }
  [data-theme="sepia"] {
    --bg: #F4ECD8; --surface: #FCF5E5; --border: #E6D8B8; --text: #433422; --muted: #8B7E66;
    --shadow: 0 4px 15px rgba(67, 52, 34, 0.08);
  }
  [data-theme="midnight"] {
    --bg: #000000; --surface: #121212; --border: #1F1F1F; --text: #E1E1E1; --muted: #666666;
    --shadow: none;
  }

  /* ================= GENEL YAPI ================= */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
  .app-shell { display: flex; min-height: 100vh; width: 100%; position: relative; }

  /* ================= YAN MENÜ (SIDEBAR) ================= */
  .sidebar { width: 240px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0 0 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; z-index: 100; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  .sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .sidebar-logo { font-family: 'Instrument Serif', serif; font-size: 28px; color: var(--accent); letter-spacing: -1px; }
  .mobile-close-btn { display: none; font-size: 24px; color: var(--muted); }
  
  .nav-group-title { padding: 14px 20px 8px; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .nav-group-content { display: none; } .nav-group-content.open { display: block; }

  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--muted); border: none; background: none; width: 100%; text-align: left; transition: all 0.2s; }
  .nav-item:hover { color: var(--text); background: rgba(126, 136, 153, 0.05); }
  .nav-item.active { color: var(--text); font-weight: 700; border-right: 4px solid var(--accent); background: var(--accent-light); }
  .nav-item.active-work { border-right-color: var(--accent-work); background: var(--accent-work-light); }
  .nav-icon { font-size: 16px; opacity: 0.8; }

  /* ================= ANA ALAN ================= */
  .main-area { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  header { padding: 24px 32px; display: flex; justify-content: space-between; align-items: center; background: var(--bg); position: sticky; top: 0; z-index: 90; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .hamburger { display: none; font-size: 24px; color: var(--text); background: none; border: none; cursor: pointer; padding: 4px; }
  .app-title { font-family: 'Instrument Serif', serif; font-size: 32px; letter-spacing: -1px; }
  .app-date { font-size: 14px; color: var(--muted); font-weight: 500; margin-left: 8px; }
  .btn-settings { background: var(--surface); border: 1px solid var(--border); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 20px; }
  .btn-settings:hover { color: var(--text); border-color: var(--muted); transform: rotate(45deg); }

  .content { padding: 0 32px 60px; max-width: 800px; }
  .section { display: none; animation: fadeIn 0.3s ease; } .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .section-main-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .context-badge { font-size: 11px; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }

  /* ================= MOBİL (HAMBURGER MENÜ) ================= */
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; backdrop-filter: blur(2px); }
  
  @media (max-width: 768px) {
    .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); width: 280px; box-shadow: var(--shadow); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .hamburger { display: block; }
    .mobile-close-btn { display: block; }
    
    header { padding: 16px 20px; }
    .app-title { font-size: 26px; }
    .app-date { display: none; /* Mobilde yer kazanmak için tarihi gizle */ }
    .content { padding: 0 20px 40px; }
  }

  /* ================= ORTAK BİLEŞENLER ================= */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 12px; position: relative; box-shadow: var(--shadow); }
  .card-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; padding-right: 60px; }
  .card-meta { font-size: 14px; color: var(--muted); }
  .card-note { font-size: 14px; color: var(--muted); margin-top: 8px; line-height: 1.5; white-space: pre-wrap; }
  .card-actions { position: absolute; top: 16px; right: 16px; display: flex; gap: 8px; }
  
  .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; margin-bottom: 8px; }
  .badge-past { background: var(--border); color: var(--muted); }
  .badge-safe { background: var(--accent-light); color: var(--accent); }
  .badge-warning { background: rgba(216, 165, 109, 0.15); color: var(--accent-warning); }
  .badge-danger { background: rgba(216, 109, 109, 0.15); color: var(--accent-danger); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { opacity:1; } 50% { opacity:0.7; } 100% { opacity:1; } }

  .btn-add { display: flex; align-items: center; gap: 8px; width: 100%; background: var(--surface); border: 1px dashed var(--border); border-radius: 12px; padding: 14px 18px; color: var(--muted); cursor: pointer; font-weight: 600; font-size: 15px; margin-bottom: 16px; transition: all 0.2s; }
  .btn-add:hover { border-color: var(--text); color: var(--text); }
  .btn-primary { background: var(--accent); color: #fff; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; font-family: inherit; transition: transform 0.1s; font-size: 14px; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; font-family: inherit; }
  .btn-icon { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; transition: color 0.2s; }
  .btn-icon:hover { color: var(--accent2); }

  .form-row { margin-bottom: 12px; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  input, textarea, select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 15px; font-family: inherit; color: var(--text); outline: none; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-family: 'Instrument Serif', serif; font-size: 20px; font-style: italic; }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .section-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; margin-top: 8px; }

  /* ================= MODÜL SPESİFİK TASARIMLAR ================= */
  .summary-item { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; cursor: pointer; box-shadow: var(--shadow); transition: transform 0.2s; }
  .summary-item:hover { transform: translateX(6px); border-color: var(--muted); }
  .sum-icon { font-size: 22px; width: 44px; height: 44px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); flex-shrink: 0; }

  .todo-item { display: flex; align-items: flex-start; gap: 12px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; transition: opacity 0.2s; border-left: 4px solid var(--border); box-shadow: var(--shadow); }
  .todo-item.priority-high { border-left-color: var(--accent-danger); }
  .todo-item.done { opacity: 0.4; } .todo-item.done .todo-text { text-decoration: line-through; }
  .list-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .list-check.checked { background: var(--accent); border-color: var(--accent); }

  .acc-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .acc-body { display: none; padding-top: 14px; margin-top: 14px; border-top: 1px solid var(--border); }
  .acc-body.open { display: block; animation: fadeIn 0.2s ease; }
  .chevron { transition: transform 0.2s; font-size: 12px; color: var(--muted); } .chevron.open { transform: rotate(180deg); }
  
  .goal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
  .goal-bar-bg { width: 100%; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); margin: 12px 0; }
  .goal-bar-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }
  
  .habit-days { display: flex; gap: 8px; margin-top: 14px; }
  .habit-day { flex: 1; aspect-ratio: 1; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.15s; }
  .habit-day.checked { background: var(--accent); border-color: var(--accent); color: #fff; }
  .habit-day.today { border-color: var(--accent-warning); }

  .bday-avatar { width: 46px; height: 46px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; font-family: 'Instrument Serif', serif; color: var(--accent); flex-shrink: 0; }

  /* NOTES EDITOR */
  .note-editor { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 200; flex-direction: column; max-width: 800px; margin: 0 auto; }
  .note-editor.open { display: flex; animation: fadeIn 0.2s; }
  .note-editor-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .note-editor-title { flex: 1; font-size: 18px; font-weight: 700; background: none; border: none; color: var(--text); }
  .note-tabs { display:flex; border-bottom:1px solid var(--border); background:var(--surface); }
  .note-tab { flex:1; padding:12px; text-align:center; cursor:pointer; font-size:14px; font-weight:600; color:var(--muted); border-bottom: 2px solid transparent;}
  .note-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .note-area { flex:1; padding:20px; overflow-y:auto; background:var(--bg); }
  .note-textarea { width: 100%; height:100%; background: none; border: none; color: var(--text); resize: none; display:none; line-height: 1.6; }
  .note-preview { width: 100%; height:100%; display:none; line-height: 1.6; }
  .note-textarea.active, .note-preview.active { display:block; }
  .note-preview h1, .note-preview h2, .note-preview h3 { font-family: 'Instrument Serif', serif; margin: 15px 0 10px; font-weight:normal; }
  .note-preview ul { margin-left: 20px; margin-bottom: 10px; }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); width: 90%; max-width: 500px; border-radius: 20px; padding: 24px; box-shadow: var(--shadow); border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'Instrument Serif', serif; font-size: 26px; margin-bottom: 20px; }
</style>
</head>
<body data-theme="dark">

<div class="app-shell">

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Planner</div>
      <button class="btn-icon mobile-close-btn" onclick="toggleSidebar()">✕</button>
    </div>
    
    <div style="flex:1; overflow-y:auto;">
      <button class="nav-item active" onclick="switchModule('summary')">
        <span class="nav-icon">🏠</span><span class="nav-label" data-i18n="nav_summary">Özet</span>
      </button>

      <div class="nav-group">
        <div class="nav-group-title" onclick="toggleNavGroup(this)">
          <span data-i18n="nav_work">İŞ DÜNYASI</span><span class="chevron">▼</span>
        </div>
        <div class="nav-group-content open">
          <button class="nav-item" onclick="switchModule('appointments', 'work')"><span class="nav-icon">🗓️</span><span class="nav-label" data-i18n="nav_work_cal">Toplantı & Takvim</span></button>
          <button class="nav-item" onclick="switchModule('todos', 'work')"><span class="nav-icon">💼</span><span class="nav-label" data-i18n="nav_work_todo">İş Görevleri</span></button>
          <button class="nav-item" onclick="switchModule('travels', 'work')"><span class="nav-icon">✈️</span><span class="nav-label" data-i18n="nav_work_travel">İş Seyahati</span></button>
          <button class="nav-item" onclick="switchModule('notes', 'work')"><span class="nav-icon">📄</span><span class="nav-label" data-i18n="nav_work_notes">Şirket Notları</span></button>
        </div>
      </div>

      <div class="nav-group">
        <div class="nav-group-title" onclick="toggleNavGroup(this)">
          <span data-i18n="nav_personal">KİŞİSEL YAŞAM</span><span class="chevron">▼</span>
        </div>
        <div class="nav-group-content open">
          <button class="nav-item" onclick="switchModule('appointments', 'pers')"><span class="nav-icon">📍</span><span class="nav-label" data-i18n="nav_pers_cal">Randevular</span></button>
          <button class="nav-item" onclick="switchModule('todos', 'pers')"><span class="nav-icon">✅</span><span class="nav-label" data-i18n="nav_pers_todo">Görevler</span></button>
          <button class="nav-item" onclick="switchModule('habits', 'pers')"><span class="nav-icon">⚡</span><span class="nav-label" data-i18n="nav_pers_habits">Gelişim & Rutin</span></button>
          <button class="nav-item" onclick="switchModule('lists', 'pers')"><span class="nav-icon">📈</span><span class="nav-label" data-i18n="nav_pers_lists">Hedefler & Listeler</span></button>
          <button class="nav-item" onclick="switchModule('travels', 'pers')"><span class="nav-icon">🎒</span><span class="nav-label" data-i18n="nav_pers_travel">Seyahat Planı</span></button>
          <button class="nav-item" onclick="switchModule('birthdays', 'pers')"><span class="nav-icon">🎂</span><span class="nav-label" data-i18n="nav_pers_bday">Doğum Günleri</span></button>
          <button class="nav-item" onclick="switchModule('notes', 'pers')"><span class="nav-icon">✍️</span><span class="nav-label" data-i18n="nav_pers_notes">Kişisel Notlar</span></button>
        </div>
      </div>
    </div>

    <div style="padding: 20px; border-top: 1px solid var(--border); display:flex; flex-direction:column; gap:10px; background:var(--surface);">
      <button class="btn-ghost" style="width:100%; font-size:13px; padding:10px; border-style:dashed;" onclick="exportData()">💾 <span data-i18n="export">Yedekle (TXT)</span></button>
      <button class="btn-ghost" style="width:100%; font-size:13px; padding:10px; border-style:dashed;" onclick="document.getElementById('imp').click()">📂 <span data-i18n="import">Veri Yükle</span></button>
      <input type="file" id="imp" style="display:none" onchange="importData(event)">
    </div>

  </nav>

  <main class="main-area">
    <header>
      <div class="header-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <span class="app-title">Planner</span>
        <span class="app-date" id="headerDate"></span>
      </div>
      <button class="btn-settings" onclick="openModal('modal-settings')">⚙️</button>
    </header>

    <div class="content">
      
      <div class="section-main-title" id="module-header" style="display:none;">
        <span id="module-title">Modül Adı</span>
        <span id="module-badge" class="context-badge"></span>
      </div>

      <div class="section active" id="sec-summary">
        <div id="summary-list"></div>
      </div>

      <div class="section" id="sec-appointments">
        <button class="btn-add" onclick="openModal('modal-appt')">+ <span data-i18n="add_new">Yeni Ekle</span></button>
        <div id="appt-list"></div>
      </div>

      <div class="section" id="sec-todos">
        <button class="btn-add" onclick="openModal('modal-todo')">+ <span data-i18n="add_new">Yeni Ekle</span></button>
        <div id="todo-list"></div>
      </div>

      <div class="section" id="sec-travels">
        <button class="btn-add" onclick="openModal('modal-travel')">+ <span data-i18n="add_new">Yeni Ekle</span></button>
        <div id="travel-list"></div>
      </div>

      <div class="section" id="sec-habits">
        <button class="btn-add" onclick="openModal('modal-habit')">+ <span data-i18n="add_new">Yeni Ekle</span></button>
        <div id="habit-list"></div>
      </div>

      <div class="section" id="sec-lists">
        <div id="goal-container"></div>
        <div style="display:flex; gap:8px; overflow-x:auto; margin-bottom:16px; padding-bottom:5px;" id="cat-tabs"></div>
        <div id="list-content"></div>
      </div>

      <div class="section" id="sec-birthdays">
        <button class="btn-add" onclick="openModal('modal-bday')">+ <span data-i18n="add_new">Yeni Ekle</span></button>
        <div id="bday-list"></div>
      </div>

      <div class="section" id="sec-notes">
        <button class="btn-add" onclick="openNoteEditor()">+ <span data-i18n="add_new">Yeni Ekle</span></button>
        <div id="notes-list"></div>
      </div>

    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-settings">
  <div class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
      <h2 class="modal-title" style="margin:0;" data-i18n="settings">Ayarlar</h2>
      <button class="btn-icon" onclick="closeModal('modal-settings')" style="font-size:24px;">✕</button>
    </div>
    <div class="form-row">
      <label data-i18n="theme">Görünüm Teması</label>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <button class="btn-ghost theme-btn" onclick="setTheme('dark')" id="t-dark">Koyu</button>
        <button class="btn-ghost theme-btn" onclick="setTheme('light')" id="t-light">Aydınlık</button>
        <button class="btn-ghost theme-btn" onclick="setTheme('sepia')" id="t-sepia">Bej</button>
        <button class="btn-ghost theme-btn" onclick="setTheme('midnight')" id="t-midnight">Gece</button>
      </div>
    </div>
    <div class="form-row" style="margin-top:20px;">
      <label data-i18n="language">Dil / Language</label>
      <select onchange="setLang(this.value)" id="lang-select">
        <option value="tr">Türkçe</option><option value="en">English</option>
      </select>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-appt">
  <div class="modal">
    <div class="modal-title" id="appt-modal-title">Randevu</div>
    <div class="form-row"><label data-i18n="title">Başlık</label><input type="text" id="m-appt-title"></div>
    <div class="form-row-2">
      <div><label data-i18n="date">Tarih</label><input type="date" id="m-appt-date"></div>
      <div><label data-i18n="time">Saat</label><input type="time" id="m-appt-time"></div>
    </div>
    <div class="form-row"><label>Not</label><textarea id="m-appt-note"></textarea></div>
    <div class="form-row-2"><button class="btn-primary" onclick="saveAppt()" id="btn-appt-save">Kaydet</button><button class="btn-ghost" onclick="closeModal('modal-appt')">İptal</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-todo">
  <div class="modal">
    <div class="modal-title" id="todo-modal-title">Görev</div>
    <div class="form-row"><label data-i18n="title">Görev Adı</label><input type="text" id="m-todo-title"></div>
    <div class="form-row-2">
      <div><label>Öncelik</label><select id="m-todo-pri"><option value="normal">Normal</option><option value="high">Yüksek</option></select></div>
      <div><label>Tekrar</label><select id="m-todo-rec"><option value="">Tek Seferlik</option><option value="1">Günlük</option><option value="7">Haftalık</option><option value="30">Aylık</option></select></div>
    </div>

      <div><label>Gün</label><input type="number" id="m-bday-day" min="1" max="31"></div>
    </div>
    <div class="form-row-2"><button class="btn-primary" onclick="saveBday()" id="btn-bday-save">Kaydet</button><button class="btn-ghost" onclick="closeModal('modal-bday')">İptal</button></div>

  <div class="modal">
    <div class="modal-title">Yeni Liste Kategorisi</div>
    <div class="form-row"><label>Kategori Adı</label><input type="text" id="m-newlist-name" placeholder="Örn: Filmler, Market..."></div>
    <div class="form-row-2"><button class="btn-primary" onclick="saveNewListCat()">Oluştur</button><button class="btn-ghost" onclick="closeModal('modal-newlist')">İptal</button></div>

<div class="note-editor" id="note-editor">
  <div class="note-editor-header">
    <button class="btn-icon" onclick="closeNoteEditor()" style="font-size:24px;">&#8592;</button>
    <input class="note-editor-title" id="m-note-title" placeholder="Başlık...">
    <button class="btn-icon" onclick="deleteNote()" style="color:var(--accent-danger);font-size:20px;">&#10005;</button>
  </div>
  <div class="note-tabs">
    <div class="note-tab active" id="tab-write" onclick="switchNoteTab('write')">✏️ Düzenle</div>
    <div class="note-tab" id="tab-preview" onclick="switchNoteTab('preview')">👁️ Önizle</div>
  </div>
  <div class="note-area">
    <textarea class="note-textarea active" id="m-note-body" placeholder="# Markdown Destekli Not\n- Madde 1\n- **Kalın** veya *Eğik*..."></textarea>
    <div class="note-preview" id="m-note-preview"></div>
  </div>
</div>

<script>
// ==================== DİL VE ÇEVİRİ SÖZLÜĞÜ ====================
const translations = {
  tr: {
    nav_summary: "Özet", nav_work: "İş Dünyası", nav_work_cal: "Toplantı & Takvim", nav_work_todo: "İş Görevleri", nav_work_travel: "İş Seyahati", nav_work_notes: "Şirket Notları",
    nav_personal: "Kişisel Yaşam", nav_pers_cal: "Randevular", nav_pers_todo: "Görevler", nav_pers_habits: "Gelişim & Rutin", nav_pers_lists: "Hedef & Listeler", nav_pers_travel: "Seyahat", nav_pers_bday: "Doğum Günleri", nav_pers_notes: "Kişisel Notlar",
    settings: "Ayarlar", theme: "Görünüm Teması", language: "Dil / Language", export: "Yedekle (TXT)", import: "Veri Yükle", add_new: "Yeni Ekle", title: "Başlık", date: "Tarih", time: "Saat", empty: "Şu an planlanmış bir şey yok."
  },
  en: {
    nav_summary: "Overview", nav_work: "Business", nav_work_cal: "Meetings", nav_work_todo: "Work Tasks", nav_work_travel: "Business Trip", nav_work_notes: "Work Notes",
    nav_personal: "Personal", nav_pers_cal: "Appointments", nav_pers_todo: "Tasks", nav_pers_habits: "Habits", nav_pers_lists: "Goals & Lists", nav_pers_travel: "Travel", nav_pers_bday: "Birthdays", nav_pers_notes: "Notes",
    settings: "Settings", theme: "Theme", language: "Language", export: "Export (TXT)", import: "Import", add_new: "Add New", title: "Title", date: "Date", time: "Time", empty: "Nothing here yet."
  }
};
const MONTHS_TR = ['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

// ==================== GLOBAL STATE & UTILS ====================
let currentLang = localStorage.getItem('planner_lang') || 'tr';
let currentTheme = localStorage.getItem('planner_theme') || 'dark';
let currentModule = 'summary'; // appointments, todos, travels, habits, lists, birthdays, notes
let currentContext = ''; // 'work' or 'pers'
let currentEditId = null;

const DB = {
  get: (k, def) => JSON.parse(localStorage.getItem('planner_' + k)) || def,
  set: (k, v) => localStorage.setItem('planner_' + k, JSON.stringify(v)),
  getAll: () => { let d={}; for(let i=0; i<localStorage.length; i++){ let k=localStorage.key(i); if(k.startsWith('planner_')) d[k]=localStorage.getItem(k); } return d; }
};

function id() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(d) { if (!d) return ''; const p = d.split('-'); return `${p[2]}.${p[1]}.${p[0]}`; }

// MODALS & SIDEBAR (MOBILE)
function openModal(mid) { document.getElementById(mid).classList.add('open'); }
function closeModal(mid) { document.getElementById(mid).classList.remove('open'); currentEditId = null; }
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', function(e) { if(e.target===this) closeModal(this.id); }));

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

// THEME & LANG
function setTheme(t) { currentTheme=t; document.body.setAttribute('data-theme', t); localStorage.setItem('planner_theme', t); document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active')); document.getElementById('t-'+t).classList.add('active'); updateThemeColors(); }
function setLang(l) { currentLang=l; localStorage.setItem('planner_lang', l); applyTranslations(); updateHeaderDate(); switchModule(currentModule, currentContext); }
function applyTranslations() { document.querySelectorAll('[data-i18n]').forEach(el => { const k=el.getAttribute('data-i18n'); el.innerText=translations[currentLang][k] || k; }); document.getElementById('lang-select').value=currentLang; }
function updateHeaderDate() { const n=new Date(); const d={tr:['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'],en:['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']}; const m={tr:['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'],en:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']}; document.getElementById('headerDate').textContent = `${d[currentLang][n.getDay()]}, ${n.getDate()} ${m[currentLang][n.getMonth()]}`; }

// ==================== CORE NAVIGATION ====================
function toggleNavGroup(el) { const c=el.nextElementSibling; c.classList.toggle('open'); el.querySelector('.chevron').innerText=c.classList.contains('open')?'▼':'▶'; }

function updateThemeColors() {
  const root = document.querySelector(':root');
  if(currentContext === 'work') {
    root.style.setProperty('--accent', 'var(--accent-work)');
    root.style.setProperty('--accent-light', 'var(--accent-work-light)');
  } else {
    root.style.setProperty('--accent', ''); // reset to CSS defined
    root.style.setProperty('--accent-light', '');
  }
}

function switchModule(mod, ctx = '') {
  currentModule = mod; currentContext = ctx;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + mod).classList.add('active');
  
  // Close sidebar on mobile after selection
  if(window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('open');
  }
  
  // Update sidebar active state
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active', 'active-work'));
  const btnAttr = ctx ? `switchModule('${mod}', '${ctx}')` : `switchModule('${mod}')`;
  const activeBtn = Array.from(document.querySelectorAll('.nav-item')).find(b => b.getAttribute('onclick') === btnAttr);
  if(activeBtn) { activeBtn.classList.add('active'); if(ctx === 'work') activeBtn.classList.add('active-work'); }
  
  // Title & Colors
  const header = document.getElementById('module-header');
  if(mod === 'summary') { header.style.display = 'none'; updateThemeColors(); renderSummary(); return; }
  
  header.style.display = 'flex';
  document.getElementById('module-title').innerText = activeBtn ? activeBtn.querySelector('.nav-label').innerText : mod;
  const badge = document.getElementById('module-badge');
  badge.innerText = ctx === 'work' ? (currentLang==='tr'?'İŞ':'WORK') : (currentLang==='tr'?'KİŞİSEL':'PERSONAL');
  badge.className = 'context-badge ' + (ctx === 'work' ? 'tag-work' : 'tag-personal');
  
  updateThemeColors();

  // Render Module Content
  if(mod === 'appointments') renderAppts();
  if(mod === 'todos') renderTodos();
  if(mod === 'travels') renderTravels();
  if(mod === 'notes') renderNotes();
  if(mod === 'habits') renderHabits();
  if(mod === 'birthdays') renderBdays();
  if(mod === 'lists') { renderGoal(); renderLists(); }
}

// ==================== TIME & EXPORT UTILS ====================
function getCountdown(dateStr, timeStr) {
  if(!dateStr) return null; const t=new Date(dateStr+(timeStr?'T'+timeStr:'T23:59:59')); const ms=t-new Date();
  if(ms<0) return { t: currentLang==='tr'?'Geçti':'Passed', c:'badge-past' };
  const d=Math.floor(ms/86400000); const h=Math.floor((ms%86400000)/3600000);
  if(d>0) return { t:`${d} ${currentLang==='tr'?'gün':'days'}`, c:d>7?'badge-safe':'badge-warning' };
  if(h>0) return { t:`${h} ${currentLang==='tr'?'saat':'hrs'}`, c:'badge-danger' };
  return { t:`${Math.floor((ms%3600000)/60000)} ${currentLang==='tr'?'dk':'mins'}`, c:'badge-danger' };
}
function downloadICS(title, dStr, tStr, note, endStr=null) {
  if(!dStr) return; const fmt=d=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z'; const fmtAll=d=>d.toISOString().split('T')[0].replace(/-/g,'');
  let ics=`BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:${title}\nDESCRIPTION:${note||''}\n`;
  if(endStr&&!tStr){ const s=new Date(dStr); const e=new Date(endStr); if(e>=s){ e.setDate(e.getDate()+1); ics+=`DTSTART;VALUE=DATE:${fmtAll(s)}\nDTEND;VALUE=DATE:${fmtAll(e)}\n`; }else{ ics+=`DTSTART;VALUE=DATE:${fmtAll(s)}\nDTEND;VALUE=DATE:${fmtAll(s)}\n`; } }
  else{ const s=new Date(dStr+(tStr?'T'+tStr:'T00:00')); let e=new Date(s.getTime()+(tStr?3600000:86400000)); ics+=`DTSTART:${fmt(s)}\nDTEND:${fmt(e)}\n`; }
  ics+=`END:VEVENT\nEND:VCALENDAR`;
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${title.replace(/ /g,'_')}.ics`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
function exportData(){ const d={}; for(let i=0;i<localStorage.length;i++){ let k=localStorage.key(i); if(k.startsWith('planner_')) d[k]=localStorage.getItem(k); } const blob=new Blob([JSON.stringify(d,null,2)],{type:'text/plain;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`planner_yedek_${new Date().toISOString().split('T')[0]}.txt`; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
function importData(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{try{const d=JSON.parse(ev.target.result); Object.keys(d).forEach(k=>{if(k.startsWith('planner_'))localStorage.setItem(k,d[k]);}); location.reload();}catch(err){alert("Format error");}}; r.readAsText(f); }

// ==================== 1. SUMMARY ====================
function renderSummary() {
  const el = document.getElementById('summary-list'); let evs = []; const tMs = new Date(new Date().setHours(0,0,0,0)).getTime();
  const pushEv = (key, icon, extractFn) => { DB.get(key,[]).forEach(i => { const e = extractFn(i); if(e && e.t >= tMs-86400000) evs.push({...e, icon, ctx: key.includes('work')?'work':'pers', mod: key.split('_')[1]}); }); };
  
  pushEv('work_appts', '🗓️', i => i.date ? {t:new Date(i.date+'T00:00').getTime(), tObj:new Date(i.date+(i.time?'T'+i.time:'T23:59:59')), title:i.title, sub:formatDate(i.date)+(i.time?' '+i.time:'')} : null);
  pushEv('pers_appts', '📍', i => i.date ? {t:new Date(i.date+'T00:00').getTime(), tObj:new Date(i.date+(i.time?'T'+i.time:'T23:59:59')), title:i.title, sub:formatDate(i.date)+(i.time?' '+i.time:'')} : null);
  pushEv('work_travels', '✈️', i => i.start ? {t:new Date(i.start+'T00:00').getTime(), tObj:new Date(i.start+'T23:59:59'), title:i.dest, sub:formatDate(i.start)} : null);
  pushEv('pers_travels', '🎒', i => i.start ? {t:new Date(i.start+'T00:00').getTime(), tObj:new Date(i.start+'T23:59:59'), title:i.dest, sub:formatDate(i.start)} : null);
  pushEv('work_todos', '💼', i => (i.date && !i.done) ? {t:new Date(i.date+'T00:00').getTime(), tObj:new Date(i.date+'T23:59:59'), title:i.title, sub:formatDate(i.date)} : null);
  pushEv('pers_todos', '✅', i => (i.date && !i.done) ? {t:new Date(i.date+'T00:00').getTime(), tObj:new Date(i.date+'T23:59:59'), title:i.title, sub:formatDate(i.date)} : null);
  
  const ty=new Date().getFullYear(); DB.get('pers_birthdays',[]).forEach(b => { let n=new Date(ty,b.month-1,b.day); if(n.getTime()<tMs) n=new Date(ty+1,b.month-1,b.day); evs.push({t:n.getTime(), tObj:new Date(n.getFullYear(),b.month-1,b.day,23,59,59), title:b.name, sub:`${b.day} ${MONTHS_TR[b.month]}`, icon:'🎂', ctx:'pers', mod:'birthdays'}); });

  evs.sort((a,b) => a.t - b.t);
  if(!evs.length) { el.innerHTML = `<div class="empty">${translations[currentLang].empty}</div>`; return; }
  
  el.innerHTML = evs.map(e => {
    const dStr = e.tObj.toISOString().split('T')[0]; const tStr = e.tObj.toISOString().split('T')[1].substring(0,5);
    const cd = getCountdown(dStr, tStr==='23:59'?null:tStr);
    return `<div class="summary-item" onclick="switchModule('${e.mod}', '${e.ctx}')"><div class="sum-icon">${e.icon}</div><div style="flex:1;"><div class="card-title" style="font-size:15px; margin:0;">${esc(e.title)}</div><div class="card-meta" style="font-size:12px; margin-top:2px;">${e.sub}</div></div>${cd?`<span class="badge ${cd.c}" style="margin:0;">${cd.t}</span>`:''}</div>`;
  }).join('');
}

// ==================== 2. APPOINTMENTS ====================
function getApptKey() { return currentContext + '_appts'; }
function openApptForm(eid=null) { currentEditId=eid; const d=eid?DB.get(getApptKey(),[]).find(x=>x.id===eid):null; document.getElementById('m-appt-title').value=d?d.title:''; document.getElementById('m-appt-date').value=d?d.date:new Date().toISOString().split('T')[0]; document.getElementById('m-appt-time').value=d?d.time||'':''; document.getElementById('m-appt-note').value=d?d.note||'':''; document.getElementById('btn-appt-save').className = 'btn-primary ' + (currentContext==='work'?'btn-work':''); openModal('modal-appt'); }
function saveAppt() { const t=document.getElementById('m-appt-title').value.trim(); if(!t)return; const k=getApptKey(); const arr=DB.get(k,[]); const p={id:currentEditId||id(), title:t, date:document.getElementById('m-appt-date').value, time:document.getElementById('m-appt-time').value, note:document.getElementById('m-appt-note').value.trim()}; if(currentEditId){ const i=arr.findIndex(x=>x.id===currentEditId); if(i>-1)arr[i]=p; }else{arr.push(p);} arr.sort((a,b)=>(a.date+a.time)<(b.date+b.time)?-1:1); DB.set(k,arr); closeModal('modal-appt'); renderAppts(); }
function delAppt(id) { if(!confirm("Silinsin mi?"))return; const k=getApptKey(); DB.set(k, DB.get(k,[]).filter(x=>x.id!==id)); renderAppts(); }
function renderAppts() { const arr=DB.get(getApptKey(),[]); const el=document.getElementById('appt-list'); if(!arr.length){el.innerHTML=`<div class="empty">${translations[currentLang].empty}</div>`;return;}
  el.innerHTML=arr.map(a=>{ const cd=getCountdown(a.date,a.time); return `<div class="card">${cd?`<span class="badge ${cd.c}">${cd.t}</span>`:''}<div class="card-actions"><button class="btn-icon" onclick="openApptForm('${a.id}')">&#9998;</button><button class="btn-icon" onclick="downloadICS('${a.title}','${a.date}','${a.time}','${a.note}')">&#128197;</button><button class="btn-icon" onclick="delAppt('${a.id}')">&#10005;</button></div><div class="card-title">${esc(a.title)}</div><div class="card-meta">${formatDate(a.date)} ${a.time||''}</div>${a.note?`<div class="card-note">${esc(a.note)}</div>`:''}</div>`; }).join('');
}

// ==================== 3. TODOS ====================
function getTodoKey() { return currentContext + '_todos'; }
function openTodoForm(eid=null) { currentEditId=eid; const d=eid?DB.get(getTodoKey(),[]).find(x=>x.id===eid):null; document.getElementById('m-todo-title').value=d?d.title:''; document.getElementById('m-todo-pri').value=d?d.pri||'normal':'normal'; document.getElementById('m-todo-rec').value=d?d.rec||'':''; document.getElementById('m-todo-date').value=d?d.date||'':new Date().toISOString().split('T')[0]; document.getElementById('m-todo-note').value=d?d.note||'':''; document.getElementById('btn-todo-save').className = 'btn-primary ' + (currentContext==='work'?'btn-work':''); openModal('modal-todo'); }
function saveTodo() { const t=document.getElementById('m-todo-title').value.trim(); if(!t)return; const k=getTodoKey(); const arr=DB.get(k,[]); const p={id:currentEditId||id(), title:t, pri:document.getElementById('m-todo-pri').value, rec:parseInt(document.getElementById('m-todo-rec').value)||null, date:document.getElementById('m-todo-date').value, note:document.getElementById('m-todo-note').value.trim(), done:false}; if(currentEditId){ const i=arr.findIndex(x=>x.id===currentEditId); if(i>-1){ p.done=arr[i].done; arr[i]=p; } }else{arr.push(p);} DB.set(k,arr); closeModal('modal-todo'); renderTodos(); }
function toggleTodo(id) { const k=getTodoKey(); const arr=DB.get(k,[]); const o=arr.find(x=>x.id===id); if(o){ if(!o.done&&o.rec&&o.date){ let d=new Date(o.date); d.setDate(d.getDate()+o.rec); o.date=d.toISOString().split('T')[0]; }else{o.done=!o.done;} DB.set(k,arr); renderTodos(); } }
function delTodo(id) { if(confirm("Silinsin mi?")){ const k=getTodoKey(); DB.set(k,DB.get(k,[]).filter(x=>x.id!==id)); renderTodos(); } }
function renderTodos() { const arr=DB.get(getTodoKey(),[]); const el=document.getElementById('todo-list'); if(!arr.length){el.innerHTML=`<div class="empty">${translations[currentLang].empty}</div>`;return;}
  const po={high:0,normal:1}; const un=arr.filter(t=>!t.done).sort((a,b)=>po[a.pri]-po[b.pri]||(a.date>b.date?1:-1)); const dn=arr.filter(t=>t.done);
  const r=(t)=>{ const cd=getCountdown(t.date,null); const rl=t.rec===1?'1 Gün':t.rec===7?'1 Hafta':t.rec===30?'1 Ay':''; return `<div class="todo-item priority-${t.pri} ${t.done?'done':''}"><div class="list-check ${t.done?'checked':''}" onclick="toggleTodo('${t.id}')">${t.done?'✓':''}</div><div style="flex:1;"><div style="font-weight:600;font-size:15px;">${esc(t.title)}</div><div class="card-meta" style="font-size:12px;margin-top:4px;display:flex;gap:6px;align-items:center;">${rl?`<span class="recur-badge">↻ ${rl}</span>`:''}${cd&&!t.done?`<span style="color:var(--accent-danger)">${cd.t}</span>`:formatDate(t.date)}${t.note?`<span>· ${esc(t.note)}</span>`:''}</div></div><button class="btn-icon" onclick="openTodoForm('${t.id}')">&#9998;</button><button class="btn-icon" onclick="delTodo('${t.id}')">&#10005;</button></div>`; };
  el.innerHTML = (un.length?un.map(r).join(''):'<div class="empty">Tüm görevler tamam!</div>') + (dn.length?`<div class="divider"></div><div class="section-label">Tamamlananlar</div>${dn.map(r).join('')}`:'');
}

// ==================== 4. TRAVELS ====================
function getTravKey() { return currentContext + '_travels'; }
function openTravelForm(eid=null) { currentEditId=eid; const d=eid?DB.get(getTravKey(),[]).find(x=>x.id===eid):null; document.getElementById('m-travel-dest').value=d?d.dest:''; document.getElementById('m-travel-start').value=d?d.start:''; document.getElementById('m-travel-end').value=d?d.end:''; document.getElementById('m-travel-note').value=d?d.note||'':''; document.getElementById('btn-travel-save').className = 'btn-primary ' + (currentContext==='work'?'btn-work':''); openModal('modal-travel'); }
function saveTravel() { const t=document.getElementById('m-travel-dest').value.trim(); if(!t)return; const k=getTravKey(); const arr=DB.get(k,[]); const p={id:currentEditId||id(), dest:t, start:document.getElementById('m-travel-start').value, end:document.getElementById('m-travel-end').value, note:document.getElementById('m-travel-note').value.trim(), items:[]}; if(currentEditId){ const i=arr.findIndex(x=>x.id===currentEditId); if(i>-1){ p.items=arr[i].items; arr[i]=p; } }else{arr.push(p);} DB.set(k,arr); closeModal('modal-travel'); renderTravels(); }
function toggleTravelBody(id) { document.getElementById('tb-'+id).classList.toggle('open'); document.getElementById('tc-'+id).classList.toggle('open'); }
function addTravItem(id){ const v=document.getElementById('ti-'+id).value.trim(); if(!v)return; const k=getTravKey(); const arr=DB.get(k,[]); const o=arr.find(x=>x.id===id); if(o){o.items.push({id:id(),t:v,d:false}); DB.set(k,arr); renderTravels(); setTimeout(()=>toggleTravelBody(id),10);} }
function togTravItem(tid,iid){ const k=getTravKey(); const arr=DB.get(k,[]); const o=arr.find(x=>x.id===tid); if(o){const i=o.items.find(x=>x.id===iid); if(i)i.d=!i.d; DB.set(k,arr); renderTravels(); setTimeout(()=>toggleTravelBody(tid),10);} }
function delTravItem(tid,iid){ const k=getTravKey(); const arr=DB.get(k,[]); const o=arr.find(x=>x.id===tid); if(o){o.items=o.items.filter(x=>x.id!==iid); DB.set(k,arr); renderTravels(); setTimeout(()=>toggleTravelBody(tid),10);} }
function delTrav(id){ if(confirm("Silinsin mi?")){ const k=getTravKey(); DB.set(k,DB.get(k,[]).filter(x=>x.id!==id)); renderTravels(); } }
function renderTravels() { const arr=DB.get(getTravKey(),[]); const el=document.getElementById('travel-list'); if(!arr.length){el.innerHTML=`<div class="empty">${translations[currentLang].empty}</div>`;return;}
  el.innerHTML=arr.map(a=>{ const cd=getCountdown(a.start,null); const dr=[a.start&&formatDate(a.start),a.end&&formatDate(a.end)].filter(Boolean).join(' - '); const items=(a.items||[]).map(i=>`<div class="travel-item"><div class="list-check ${i.d?'checked':''}" style="width:16px;height:16px;" onclick="togTravItem('${a.id}','${i.id}')">${i.d?'✓':''}</div><span style="flex:1;font-size:14px;${i.d?'text-decoration:line-through;opacity:0.5':''}">${esc(i.t)}</span><button class="btn-icon" style="font-size:12px;" onclick="delTravItem('${a.id}','${i.id}')">✕</button></div>`).join('');
    return `<div class="card"><div class="acc-header" onclick="toggleTravelBody('${a.id}')"><div>${cd?`<span class="badge ${cd.c}">${cd.t}</span>`:''}<div class="card-title" style="font-size:22px;margin:0;">${esc(a.dest)}</div><div class="card-meta" style="margin-top:4px;">${dr}</div></div><div style="display:flex;gap:12px;align-items:center;"><button class="btn-icon" onclick="event.stopPropagation();downloadICS('${a.dest}','${a.start}',null,'${a.note}','${a.end}')">&#128197;</button><button class="btn-icon" onclick="event.stopPropagation();openTravelForm('${a.id}')">&#9998;</button><span class="chevron" id="tc-${a.id}">▼</span></div></div><div class="acc-body" id="tb-${a.id}">${a.note?`<div class="card-note" style="margin-bottom:10px;">${esc(a.note)}</div>`:''}<div>${items}</div><div style="display:flex;gap:8px;margin-top:10px;"><input type="text" id="ti-${a.id}" placeholder="Not veya rota ekle..." onkeydown="if(event.key==='Enter')addTravItem('${a.id}')" style="padding:8px;font-size:13px;"><button class="btn-primary" style="padding:8px 12px;" onclick="addTravItem('${a.id}')">+</button></div><button class="btn-ghost" style="width:100%;margin-top:10px;border-color:var(--accent-danger);color:var(--accent-danger);" onclick="delTrav('${a.id}')">Seyahati Sil</button></div></div>`;
  }).join('');
}

// ==================== 5. HABITS (Personal Only) ====================
function saveHabit() { const t=document.getElementById('m-habit-name').value.trim(); if(!t)return; const arr=DB.get('pers_habits',[]); arr.push({id:id(), n:t, tg:parseInt(document.getElementById('m-habit-target').value), c:{}}); DB.set('pers_habits',arr); closeModal('modal-habit'); renderHabits(); }
function togHabit(id, dStr) { const arr=DB.get('pers_habits',[]); const o=arr.find(x=>x.id===id); if(o){o.c[dStr]=!o.c[dStr]; DB.set('pers_habits',arr); renderHabits();} }
function delHabit(id) { if(confirm("Silinsin mi?")){ DB.set('pers_habits',DB.get('pers_habits',[]).filter(x=>x.id!==id)); renderHabits(); } }
function renderHabits() { const arr=DB.get('pers_habits',[]); const el=document.getElementById('habit-list'); if(!arr.length){el.innerHTML=`<div class="empty">${translations[currentLang].empty}</div>`;return;}
  const wDays=(()=>{ const t=new Date(); t.setHours(0,0,0,0); const m=new Date(t); m.setDate(t.getDate()-((t.getDay()+6)%7)); const d=[]; const l={tr:['Pt','Sa','Ça','Pe','Cu','Ct','Pz'],en:['Mo','Tu','We','Th','Fr','Sa','Su']}; for(let i=0;i<7;i++){const x=new Date(m); x.setDate(m.getDate()+i); d.push({ds:x.toISOString().split('T')[0], lb:l[currentLang][i], n:x.getDate(), td:x.toDateString()===t.toDateString()});} return d; })();
  el.innerHTML=arr.map(h=>{ const ch=h.c||{}; const dw=wDays.filter(d=>ch[d.ds]).length; const pct=Math.min(100, Math.round((dw/h.tg)*100)); const dots=wDays.map(d=>`<div class="habit-day ${ch[d.ds]?'checked':''} ${d.td?'today':''}" onclick="togHabit('${h.id}','${d.ds}')"><span style="font-size:10px;font-weight:700;opacity:0.8">${d.lb}</span><span style="font-size:13px;font-weight:700">${d.n}</span></div>`).join('');
    return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;"><div><div class="card-title" style="margin:0;">${esc(h.n)}</div><div class="card-meta" style="color:var(--accent);font-weight:700;font-size:12px;margin-top:2px;">${dw}/${h.tg} ${currentLang==='tr'?'hedef':'goal'}</div></div><button class="btn-icon" onclick="delHabit('${h.id}')">&#10005;</button></div><div class="habit-days">${dots}</div><div style="display:flex;align-items:center;gap:10px;margin-top:12px;"><div class="goal-bar-bg" style="margin:0;"><div class="goal-bar-fill" style="width:${pct}%"></div></div><span style="font-size:12px;font-weight:700;color:var(--muted)">%${pct}</span></div></div>`;
  }).join('');
}

// ==================== 6. LISTS & GOALS (Personal Only) ====================
// GOAL
function renderGoal() { const g=DB.get('pers_goal',null); const c=document.getElementById('goal-container'); if(!g){c.innerHTML=`<button class="btn-add" style="border-style:solid;" onclick="editGoal()">+ ${currentLang==='tr'?'Finansal Hedef Ekle':'Add Financial Goal'}</button>`;return;}
  const pct=g.tg>0?Math.min(100,Math.round((g.cr/g.tg)*100)):0; c.innerHTML=`<div class="goal-card"><div style="display:flex;justify-content:space-between;align-items:flex-end;"><div style="font-weight:700;font-size:16px;">${esc(g.t)}</div><div style="font-size:14px;color:var(--muted)"><strong style="color:var(--accent);font-size:16px;">${g.cr.toLocaleString()}</strong> / ${g.tg.toLocaleString()}</div></div><div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${pct}%"></div></div><div style="display:flex;gap:8px;margin-top:12px;"><input type="number" id="goal-val" placeholder="${currentLang==='tr'?'Miktar':'Amount'}" style="padding:8px;font-size:14px;"><button class="btn-primary" style="padding:8px 16px;" onclick="addGoal()">+</button><button class="btn-ghost" style="padding:8px 12px;" onclick="editGoal()">&#9998;</button><button class="btn-ghost" style="padding:8px 12px;color:var(--accent-danger);border-color:var(--accent-danger);" onclick="if(confirm('Silinsin mi?')){DB.set('pers_goal',null);renderGoal();}">&#10005;</button></div></div>`; }
function addGoal(){ const v=parseInt(document.getElementById('goal-val').value); if(!v||v<=0)return; const g=DB.get('pers_goal',null); if(g){g.cr+=v; DB.set('pers_goal',g); renderGoal();} }
function editGoal(){ const g=DB.get('pers_goal',{t:'Hedef',cr:0,tg:0}); const t=prompt("Başlık / Title:",g.t); if(t===null)return; const tg=prompt("Hedef / Target:",g.tg); if(tg===null)return; const c=prompt("Mevcut / Current:",g.cr); if(c===null)return; DB.set('pers_goal',{t:t,tg:parseInt(tg)||0,cr:parseInt(c)||0}); renderGoal(); }

// LISTS
function getCatKeys() { return DB.get('pers_listcats', ['Alışveriş','İzlenecekler','Kitaplar']); }
function getActiveCat() { return DB.get('pers_activecat', getCatKeys()[0]); }
function safe(s) { return s.replace(/[^a-zA-Z0-9]/g,'_'); }
function renderLists() { const cats=getCatKeys(); const ac=getActiveCat(); document.getElementById('cat-tabs').innerHTML=cats.map(c=>`<button class="badge" style="cursor:pointer; font-size:13px; padding:8px 16px; margin:0; flex-shrink:0; ${c===ac?'background:var(--accent);color:#fff;':'background:var(--surface);color:var(--muted);border:1px solid var(--border)'}" onclick="DB.set('pers_activecat','${esc(c)}');renderLists()">${esc(c)}</button>`).join('')+`<button class="badge" style="cursor:pointer; font-size:13px; padding:8px 16px; margin:0; background:transparent; border:1px dashed var(--border); color:var(--text); flex-shrink:0;" onclick="openModal('modal-newlist')">+ Yeni</button>`; renderListItems(ac); }
function saveNewListCat(){ const n=document.getElementById('m-newlist-name').value.trim(); if(!n)return; const c=getCatKeys(); if(!c.includes(n))c.push(n); DB.set('pers_listcats',c); DB.set('pers_activecat',n); closeModal('modal-newlist'); renderLists(); }
function addLItem(cat){ const v=document.getElementById('li-'+safe(cat)).value.trim(); if(!v)return; const arr=DB.get('pers_list_'+cat,[]); arr.push({id:id(),t:v,d:false,p:'',n:''}); DB.set('pers_list_'+cat,arr); renderLists(); }
function togLItem(cat,id){ const arr=DB.get('pers_list_'+cat,[]); const o=arr.find(x=>x.id===id); if(o){o.d=!o.d; DB.set('pers_list_'+cat,arr); renderLists();} }
function delLItem(cat,id){ DB.set('pers_list_'+cat, DB.get('pers_list_'+cat,[]).filter(x=>x.id!==id)); renderLists(); }
function updLItem(cat,id){ const arr=DB.get('pers_list_'+cat,[]); const o=arr.find(x=>x.id===id); if(o){o.p=document.getElementById('lp-'+id).value.trim(); o.n=document.getElementById('ln-'+id).value.trim(); DB.set('pers_list_'+cat,arr);} }
function togLBody(id){ document.getElementById('lb-'+id).classList.toggle('open'); document.getElementById('lc-'+id).classList.toggle('open'); }
function renderListItems(cat) { const el=document.getElementById('list-content'); const arr=DB.get('pers_list_'+cat,[]); 
  const r=(i)=>`<div class="card" style="padding:12px 16px; margin-bottom:8px; ${i.d?'opacity:0.5;box-shadow:none;':''}"><div class="acc-header" onclick="togLBody('${i.id}')"><div class="list-check ${i.d?'checked':''}" style="width:20px;height:20px;" onclick="event.stopPropagation();togLItem('${esc(cat)}','${i.id}')">${i.d?'✓':''}</div><div style="flex:1;font-weight:600;font-size:15px;margin-left:12px;${i.d?'text-decoration:line-through':''}">${esc(i.t)}</div>${i.p&&!i.d?`<span style="font-size:11px;background:var(--bg);padding:2px 6px;border-radius:4px;border:1px solid var(--border);margin-right:10px;color:var(--muted)">${esc(i.p)}</span>`:''}<span class="chevron" id="lc-${i.id}">▼</span></div><div class="acc-body" id="lb-${i.id}"><input type="text" id="lp-${i.id}" value="${esc(i.p)}" placeholder="${currentLang==='tr'?'İlerleme (Örn: Sayfa 4)':'Progress'}" onchange="updLItem('${esc(cat)}','${i.id}')" style="padding:8px;font-size:13px;margin-bottom:8px;"><textarea id="ln-${i.id}" placeholder="${currentLang==='tr'?'Link veya Not':'Note or Link'}" onchange="updLItem('${esc(cat)}','${i.id}')" style="padding:8px;font-size:13px;min-height:50px;margin-bottom:8px;">${esc(i.n)}</textarea><div style="text-align:right"><button class="btn-icon" style="color:var(--accent-danger)" onclick="delLItem('${esc(cat)}','${i.id}')">Sil</button></div></div></div>`;
  const un=arr.filter(i=>!i.d); const dn=arr.filter(i=>i.d);
  el.innerHTML=`<div style="display:flex;gap:8px;margin-bottom:16px;"><input type="text" id="li-${safe(cat)}" placeholder="${esc(cat)}..." onkeydown="if(event.key==='Enter')addLItem('${esc(cat)}')"><button class="btn-primary" onclick="addLItem('${esc(cat)}')">+</button></div>${un.length?un.map(r).join(''):'<div class="empty">Liste boş.</div>'}${dn.length?`<div class="divider"></div><div class="section-label">Tamamlananlar</div>${dn.map(r).join('')}`:''}`;
}

// ==================== 7. BIRTHDAYS (Personal Only) ====================
function saveBday() { const n=document.getElementById('m-bday-name').value.trim(); const m=parseInt(document.getElementById('m-bday-month').value); const d=parseInt(document.getElementById('m-bday-day').value); if(!n||!m||!d)return; const arr=DB.get('pers_birthdays',[]); arr.push({id:id(), name:n, month:m, day:d}); DB.set('pers_birthdays',arr); closeModal('modal-bday'); renderBdays(); }
function delBday(id) { if(confirm("Silinsin mi?")){ DB.set('pers_birthdays',DB.get('pers_birthdays',[]).filter(x=>x.id!==id)); renderBdays(); } }
function getBdayCD(m,d) { const t=new Date(); const ty=t.getFullYear(); let n=new Date(ty,m-1,d,23,59,59); if(n<t)n=new Date(ty+1,m-1,d,23,59,59); const ms=n-t; const diff=Math.floor(ms/86400000); if(diff===0)return{t:currentLang==='tr'?'Bugün!':'Today!',c:'badge-danger'}; if(diff<=7)return{t:`${diff} ${currentLang==='tr'?'gün':'days'}`,c:'badge-warning'}; return{t:`${diff} ${currentLang==='tr'?'gün':'days'}`,c:'badge-safe'}; }
function renderBdays() { const arr=DB.get('pers_birthdays',[]); const el=document.getElementById('bday-list'); if(!arr.length){el.innerHTML=`<div class="empty">${translations[currentLang].empty}</div>`;return;}
  const ty=new Date().getFullYear(); arr.forEach(x=>{ let n=new Date(ty,x.month-1,x.day); if(n.getTime()<new Date().getTime())n=new Date(ty+1,x.month-1,x.day); x._n=n.getTime(); }); arr.sort((a,b)=>a._n-b._n);
  el.innerHTML=arr.map(x=>{ const nDate=new Date(x._n); const cd=getBdayCD(x.month,x.day); const dStr=`${nDate.getFullYear()}-${String(x.month).padStart(2,'0')}-${String(x.day).padStart(2,'0')}`;
    return `<div class="card" style="display:flex;align-items:center;gap:16px;padding:14px 18px;"><div class="bday-avatar">${x.name.charAt(0).toUpperCase()}</div><div style="flex:1;"><div style="font-weight:700;font-size:16px;">${esc(x.name)}</div><div class="card-meta" style="margin-top:2px;">${x.day} ${MONTHS_TR[x.month]}</div></div><div style="text-align:right;"><span class="badge ${cd.c}" style="display:block;margin-bottom:8px;">${cd.t}</span><div style="display:flex;gap:8px;justify-content:flex-end;"><button class="btn-icon" onclick="downloadICS('${x.name} D.Günü','${dStr}',null,'Kutlama')">&#128197;</button><button class="btn-icon" onclick="delBday('${x.id}')">&#10005;</button></div></div></div>`;
  }).join('');
}

// ==================== 8. NOTES & MARKDOWN ====================
function getNoteKey() { return currentContext + '_notes'; }
function parseMD(t) { return esc(t).replace(/^### (.*$)/gim,'<h3>$1</h3>').replace(/^## (.*$)/gim,'<h2>$1</h2>').replace(/^# (.*$)/gim,'<h1>$1</h1>').replace(/\*\*(.*?)\*\*/gim,'<strong>$1</strong>').replace(/\*(.*?)\*/gim,'<em>$1</em>').replace(/^\- (.*$)/gim,'<ul><li>$1</li></ul>').replace(/<\/ul>\n<ul>/gim,'').replace(/\n/gim,'<br>'); }
function openNoteEditor(eid=null) { currentEditId=eid; const n=eid?DB.get(getNoteKey(),[]).find(x=>x.id===eid):null; document.getElementById('m-note-title').value=n?n.title:''; document.getElementById('m-note-body').value=n?n.body:''; switchNoteTab('write'); document.getElementById('note-editor').classList.add('open'); if(!eid)currentEditId=id(); }
function switchNoteTab(m) { document.getElementById('tab-write').classList.remove('active'); document.getElementById('tab-preview').classList.remove('active'); document.getElementById('m-note-body').classList.remove('active'); document.getElementById('m-note-preview').classList.remove('active'); if(m==='write'){ document.getElementById('tab-write').classList.add('active'); document.getElementById('m-note-body').classList.add('active'); }else{ document.getElementById('tab-preview').classList.add('active'); const md=document.getElementById('m-note-body').value; document.getElementById('m-note-preview').innerHTML=md?parseMD(md):'<div style="color:var(--muted);font-style:italic">Boş...</div>'; document.getElementById('m-note-preview').classList.add('active'); } }
function closeNoteEditor() { const t=document.getElementById('m-note-title').value.trim(); const b=document.getElementById('m-note-body').value.trim(); if(t||b){ const k=getNoteKey(); const arr=DB.get(k,[]); const idx=arr.findIndex(x=>x.id===currentEditId); const e={id:currentEditId, title:t||'İsimsiz', body:b, d:new Date().toISOString()}; if(idx>-1)arr[idx]=e; else arr.unshift(e); DB.set(k,arr); } document.getElementById('note-editor').classList.remove('open'); renderNotes(); }
function deleteNote() { if(confirm("Silinsin mi?")){ const k=getNoteKey(); DB.set(k,DB.get(k,[]).filter(x=>x.id!==currentEditId)); document.getElementById('note-editor').classList.remove('open'); renderNotes(); } }
function renderNotes() { const arr=DB.get(getNoteKey(),[]); const el=document.getElementById('notes-list'); if(!arr.length){el.innerHTML=`<div class="empty">${translations[currentLang].empty}</div>`;return;} el.innerHTML=arr.map(n=>{ const d=new Date(n.d); return `<div class="card" style="cursor:pointer;" onclick="openNoteEditor('${n.id}')"><div class="card-title">${esc(n.title)}</div><div style="font-size:14px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;">${esc(n.body)}</div><div style="font-size:11px;color:var(--muted);margin-top:10px;font-weight:700;">${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}</div></div>`; }).join(''); }

// ==================== BAŞLATMA ====================
function init() {
  setTheme(currentTheme); applyTranslations(); updateHeaderDate(); switchModule('summary');
  setInterval(() => { if(currentModule==='summary') renderSummary(); }, 60000);
}
init();
</script>
